<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Débloquer VIP</title>
</head>
<body style="background:#141414;color:white;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="text-align:center;width:300px;">
<h2>Activation VIP</h2>

<input id="code" placeholder="CODE" style="width:100%;padding:10px;margin-top:10px;">
<button id="btn" style="width:100%;padding:10px;margin-top:10px;background:red;color:white;">Activer</button>

<p id="msg"></p>
</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const CODES = {
MEDICVIP: "MEDICOPTER",
CLOWNVIP: "LECLOWN"
};

let userRef = null;

onAuthStateChanged(auth, (user) => {
if (!user) return window.location.href = "login.html";
userRef = doc(db, "users", user.uid);
});

document.getElementById("btn").onclick = async () => {

const code = document.getElementById("code").value.trim().toUpperCase();
const msg = document.getElementById("msg");

const serieId = CODES[code];

if (!serieId) {
msg.innerText = "Code invalide";
msg.style.color = "red";
return;
}

const snap = await getDoc(userRef);
let unlocked = snap.exists() ? snap.data().seriesUnlocked || [] : [];

if (!unlocked.includes(serieId)) {
unlocked.push(serieId);

await setDoc(userRef, {
seriesUnlocked: unlocked
}, { merge: true });

msg.innerText = "✔ Débloqué !";
msg.style.color = "lime";
} else {
msg.innerText = "Déjà débloqué";
}

setTimeout(() => {
window.location.href = "index.html";
}, 1000);
};

</script>

</body>
</html>
