<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicopter VIP</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

#vipPopup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:#1c1c1c;
padding:25px;
border-radius:10px;
text-align:center;
width:300px;
}

.btn{
background:#e50914;
color:white;
border:none;
padding:12px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

.episodes{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1c1c1c;
padding:10px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- POPUP -->
<div id="vipPopup">
  <div class="popup-box">
    <h2>🎉 Félicitation</h2>
    <p>Débloquez la série VIP complète</p>
    <button id="unlockBtn" class="btn">🔓 Débloquer</button>
  </div>
</div>

<h1 style="padding:20px;">Medicopter VIP</h1>

<div class="episodes" id="episodes"></div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const serieId = "MEDICOPTER";

/* 🔐 PROTECTION PAGE */
onAuthStateChanged(auth, async (user) => {

if (!user) {
window.location.href = "login.html";
return;
}

console.log("CONNECTÉ :", user.uid);

const ref = doc(db, "users", user.uid);
const snap = await getDoc(ref);

if (snap.exists()) {
const data = snap.data();

if (data.vipMode || data.seriesUnlocked?.includes(serieId)) {
document.getElementById("vipPopup").style.display = "none";
}
}
});

/* 🔓 DEBLOCAGE VIP */
document.getElementById("unlockBtn").onclick = async () => {

const user = auth.currentUser;

if (!user) {
window.location.href = "login.html";
return;
}

const ref = doc(db, "users", user.uid);
const snap = await getDoc(ref);

let unlocked = snap.exists() ? (snap.data().seriesUnlocked || []) : [];

if (!unlocked.includes(serieId)) {
unlocked.push(serieId);
}

await setDoc(ref, {
seriesUnlocked: unlocked,
vipMode: true
}, { merge: true });

document.getElementById("vipPopup").style.display = "none";

alert("🎉 VIP débloqué !");
};

/* 🎬 EPISODES TEST */
function loadEpisodes(){
const container = document.getElementById("episodes");

for(let i=1;i<=10;i++){
const div = document.createElement("div");
div.className = "card";
div.innerHTML = "Episode " + i;
container.appendChild(div);
}
}

loadEpisodes();

</script>

</body>
</html>
