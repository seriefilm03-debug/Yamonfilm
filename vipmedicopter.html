    <style>
        *{ box-sizing:border-box; margin:0; padding:0; font-family:Arial, sans-serif; }
        body{ background:#0f0f0f; color:white; overflow-x: hidden; }

        .navbar{
            position:fixed; top:0; left:0; width:100%; height:60px;
            display:flex; justify-content:space-between; align-items:center;
            padding:0 20px;
            z-index:1000;
        }
        .logo{ color:#e50914; font-size:28px; font-weight:bold; text-decoration:none; }
        .menu-btn{ font-size:28px; cursor:pointer; }

        .overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.6); opacity:0; pointer-events:none; transition:0.3s; z-index:1500; }
        .overlay.show{ opacity:1; pointer-events:auto; }

        .side-menu{ position:fixed; top:0; right:-100%; width:300px; height:100%; background:#111; padding:80px 20px 20px; transition:0.3s; z-index:2000; }
        .side-menu.open{ right:0; }

        .episodes{ display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; padding:20px 5%; }

        .card{ background:#1c1c1c; border-radius:8px; overflow:hidden; cursor:pointer; }

        #video-overlay{ display:none; position:fixed; inset:0; background:black; z-index:3000; }
        #video-overlay iframe{ width:100%; height:90%; border:none; }

    </style>
</head>

function renderEpisodes(){
    const c = document.getElementById("episodes");
    c.innerHTML = "";

    currentEpisodes = Array.from({length:9}, (_,i)=>i+1);

    currentEpisodes.forEach(ep=>{
        const card = document.createElement("div");
        card.className="card";
        card.innerHTML = `<div style="padding:20px">Episode ${ep}</div>`;
        card.onclick = ()=>openVideo(currentS, ep);
        c.appendChild(card);
    });
}

window.openVideo = (s,e)=>{
    const url = videasSources[s]?.[e];
    if(!url){
        alert("Vidéo indisponible");
        return;
    }
    document.getElementById("video-iframe").src = url;
    document.getElementById("video-overlay").style.display="block";
};

window.closeVideo = ()=>{
    document.getElementById("video-overlay").style.display="none";
};

window.toggleMenu = ()=>{
    document.querySelector(".side-menu")?.classList.toggle("open");
};

renderEpisodes();
