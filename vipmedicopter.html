<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicopter VIP</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;}

.btn-main{
background:#e50914;color:white;border:none;
padding:12px 20px;border-radius:5px;cursor:pointer;
}

/* POPUP */
#vipPopup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:#1c1c1c;
padding:25px;
border-radius:10px;
text-align:center;
max-width:350px;
}

/* EPISODES */
.episodes{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1c1c1c;
padding:10px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- POPUP VIP -->
<div id="vipPopup">
  <div class="popup-box">
    <h2>🎉 Félicitation !</h2>
    <p>Débloquez la série VIP complète</p>
    <button id="unlockPopupBtn" class="btn-main">🔓 Débloquer</button>
  </div>
</div>

<h1 style="padding:20px;">Medicopter 117 VIP</h1>

<div class="episodes" id="episodes"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ---------------- FIREBASE ---------------- */

const firebaseConfig = {
apiKey: "AIzaSyA...",
authDomain: "yamonfilm-fead8.firebaseapp.com",
projectId: "yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ---------------- VARIABLES ---------------- */

let currentUser = null;
const serieId = "MEDICOPTER";

/* ---------------- AUTH ---------------- */

onAuthStateChanged(auth, async (user) => {

currentUser = user;

/* 🔴 SI PAS CONNECTÉ → LOGIN */
if (!user) {
window.location.href = "login.html";
return;
}

console.log("✅ connecté :", user.uid);

const ref = doc(db, "users", user.uid);
const snap = await getDoc(ref);

if (snap.exists()) {
const data = snap.data();

/* cacher popup si VIP */
if (data.vipMode === true || data.seriesUnlocked?.includes(serieId)) {
document.getElementById("vipPopup").style.display = "none";
}
}
});

/* ---------------- BOUTON POPUP ---------------- */

document.getElementById("unlockPopupBtn").onclick = async () => {

const user = auth.currentUser;

/* 🔴 sécurité */
if (!user) {
window.location.href = "login.html";
return;
}

const ref = doc(db, "users", user.uid);
const snap = await getDoc(ref);

let unlocked = snap.exists() ? (snap.data().seriesUnlocked || []) : [];

/* ajout série */
if (!unlocked.includes(serieId)) {
unlocked.push(serieId);
}

/* sauvegarde VIP */
await setDoc(ref, {
seriesUnlocked: unlocked,
vipMode: true
}, { merge: true });

/* fermer popup */
document.getElementById("vipPopup").style.display = "none";

alert("🎉 VIP débloqué !");
};

/* ---------------- EPISODES TEST ---------------- */

function loadEpisodes(){
const container = document.getElementById("episodes");

for(let i=1;i<=10;i++){
const div = document.createElement("div");
div.className="card";
div.innerHTML = "Episode " + i;
container.appendChild(div);
}
}

loadEpisodes();

</script>

</body>
</html>
