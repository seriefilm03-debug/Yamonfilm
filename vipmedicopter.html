<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicopter 117 - YAMONFILM</title>

<style>
*{ box-sizing:border-box; margin:0; padding:0; font-family:Arial,sans-serif; }
body{ background:#0f0f0f; color:white; overflow-x:hidden; }

.navbar{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
z-index:1000;
}

.logo{
color:#e50914;
font-size:28px;
font-weight:bold;
text-decoration:none;
}

.nav-right{
display:flex;
align-items:center;
gap:15px;
}

.menu-btn{
font-size:28px;
cursor:pointer;
z-index:2100;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(6px);
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:1500;
}

.overlay.show{
opacity:1;
pointer-events:auto;
}

.side-menu{
position:fixed;
top:0;
right:-100%;
width:300px;
height:100%;
background:#111;
padding:80px 20px 20px;
display:flex;
flex-direction:column;
gap:15px;
transition:0.3s;
z-index:2000;
border-left:1px solid #333;
}

.side-menu.open{
right:0;
}

.side-menu a,
.side-menu button{
color:white;
text-decoration:none;
background:none;
border:none;
font-size:18px;
padding:10px 0;
cursor:pointer;
text-align:left;
border-bottom:1px solid #222;
}

.promo-section{
margin-top:10px;
padding:10px 0;
border-bottom:1px solid #222;
}

.promo-input{
width:100%;
padding:12px;
background:#222;
border:1px solid #444;
color:white;
border-radius:4px;
margin-top:10px;
font-size:14px;
}

.activate-btn{
background:#e50914;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:4px;
margin-top:10px;
font-weight:bold;
cursor:pointer;
}

#video-overlay{
display:none;
position:fixed;
inset:0;
background:black;
z-index:3000;
flex-direction:column;
justify-content:center;
align-items:center;
}

#video-overlay iframe{
width:100%;
height:90%;
border:none;
}

.close-video{
position:absolute;
top:15px;
right:25px;
font-size:35px;
color:white;
cursor:pointer;
}

.hero{
height:65vh;
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:40px 5%;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:
linear-gradient(to top,#0f0f0f, transparent 50%),
linear-gradient(to right,#0f0f0f, transparent);
}

.hero-content{
position:relative;
z-index:2;
max-width:700px;
}

.episodes{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:20px 5%;
}

.card{
background:#1c1c1c;
border-radius:8px;
overflow:hidden;
cursor:pointer;
position:relative;
transition:0.3s;
border:1px solid #333;
}

.card:hover{
transform:scale(1.05);
border-color:#e50914;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.progress-bar{
position:absolute;
bottom:0;
left:0;
height:4px;
background:#e50914;
width:0%;
}

.watched-tag{
position:absolute;
top:5px;
right:5px;
background:rgba(0,0,0,0.7);
color:#00ff00;
font-size:10px;
padding:2px 5px;
border-radius:3px;
font-weight:bold;
}

.btn-main{
background:#e50914;
color:white;
padding:12px 25px;
border-radius:5px;
font-weight:bold;
cursor:pointer;
border:none;
margin-top:10px;
display:inline-flex;
align-items:center;
}

.season-menu{
background:#1c1c1c;
border:1px solid #333;
position:absolute;
display:none;
z-index:10;
border-radius:5px;
}

.season-menu div{
padding:12px 20px;
cursor:pointer;
border-bottom:1px solid #222;
}

.show{
display:block;
}

.btn-group{
display:flex;
gap:15px;
flex-wrap:wrap;
align-items:center;
margin-top:15px;
}

/* ================= POPUP AJOUTÉ (SEUL AJOUT) ================= */

#vipPopup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.vip-box{
background:#1c1c1c;
padding:25px;
border-radius:10px;
width:90%;
max-width:420px;
text-align:center;
border:1px solid #444;
}

.vip-box h2{
color:#e50914;
margin-bottom:10px;
}

.vip-box p{
color:#ccc;
margin-bottom:20px;
}

.vip-box button{
background:#e50914;
border:none;
color:white;
padding:12px 18px;
margin:5px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<!-- ================= POPUP (AJOUT UNIQUEMENT) ================= -->
<div id="vipPopup">
  <div class="vip-box">
    <h2>🎉 Félicitations</h2>
    <p>Vous avez obtenu la série complète en VF.<br>
    Accès sécurisé disponible.</p>

    <button onclick="unlockVip()">▶ Visionnage</button>
    <button onclick="closeVip()">Plus tard</button>
  </div>
</div>

<!-- ===== TON CODE ORIGINAL SANS CHANGEMENT ===== -->

<div class="navbar">
<a href="index.html" class="logo">YAMONFILM</a>
<div class="nav-right">
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="side-menu" id="menu">
<a href="account.html">Mon compte</a>
<a href="series.html">Mes séries</a>

<div class="promo-section">
<span style="color:#666;font-size:12px;">ACTIVER UN CODE</span>
<input type="text" id="promoCode" class="promo-input" placeholder="Entrez votre code...">
<button id="activateBtnMenu" class="activate-btn">Activer</button>
</div>

<button id="logoutBtn" style="margin-top:auto;color:#e50914;">
Déconnexion
</button>
</div>

<div id="video-overlay">
<span class="close-video" onclick="closeVideo()">&times;</span>
<iframe id="video-iframe" src="" allowfullscreen></iframe>
</div>

<section class="hero" id="hero">
<div class="hero-content">
<h1 style="font-size:3rem;margin-bottom:10px;">Medicopter 117</h1>
<p id="overview"></p>
</div>
</section>

<div class="episodes" id="episodes"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
authDomain:"yamonfilm-fead8.firebaseapp.com",
projectId:"yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const serieId = "MEDICOPTER";
let unlocked = false;

/* ===== AJOUT MINIMAL ===== */
function showVipPopup(){
document.getElementById("vipPopup").style.display="flex";
}

window.closeVip = () => {
document.getElementById("vipPopup").style.display="none";
};

window.unlockVip = async () => {
const user = auth.currentUser;
if(!user) return;

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

let arr = snap.exists() ? (snap.data().seriesUnlocked || []) : [];

if(!arr.includes(serieId)){
arr.push(serieId);
await setDoc(ref,{seriesUnlocked:arr},{merge:true});
}

window.location.href="vipmedicopter.html";
};

/* ===== TON LOGIQUE INCHANGÉE ===== */
onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location.href="login.html";
return;
}

const snap = await getDoc(doc(db,"users",user.uid));

if(snap.exists()){
const data = snap.data();
if(data.seriesUnlocked?.includes(serieId)){
unlocked = true;
}
}

/* ===== SEULE AJOUT ICI ===== */
if(!unlocked){
showVipPopup();
}

});

</script>

</body>
</html>
