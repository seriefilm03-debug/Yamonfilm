<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicopter 117 - YAMONFILM</title>

<style>
*{ box-sizing:border-box; margin:0; padding:0; font-family:Arial, sans-serif; }
body{ background:#0f0f0f; color:white; overflow-x: hidden; }

.navbar{
position:fixed; top:0; left:0; width:100%; height:60px;
display:flex; justify-content:space-between; align-items:center;
padding:0 20px;
background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
z-index:1000;
}

.logo{ color:#e50914; font-size:28px; font-weight:bold; text-decoration:none; }
.menu-btn{ font-size:28px; cursor:pointer; z-index:2100; }

.overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); opacity:0; pointer-events:none; transition:0.3s; z-index:1500; }
.overlay.show{ opacity:1; pointer-events:auto; }

.side-menu{ position:fixed; top:0; right:-100%; width:300px; height:100%; background:#111; padding:80px 20px 20px; display:flex; flex-direction:column; gap:15px; transition:0.3s; z-index:2000; border-left:1px solid #333;}
.side-menu.open{ right:0; }

.side-menu a, .side-menu button{ color:white; text-decoration:none; background:none; border:none; font-size:18px; padding:10px 0; cursor:pointer; text-align:left; border-bottom:1px solid #222;}

.promo-section{ margin-top:10px; padding:10px 0; border-bottom:1px solid #222; }
.promo-input{ width:100%; padding:12px; background:#222; border:1px solid #444; color:white; border-radius:4px; margin-top:10px; }
.activate-btn{ background:#e50914; color:white; border:none; padding:12px; width:100%; border-radius:4px; margin-top:10px; font-weight:bold; cursor:pointer; }

#video-overlay{ display:none; position:fixed; inset:0; background:black; z-index:3000; flex-direction:column; justify-content:center; align-items:center; }
#video-overlay iframe{ width:100%; height:90%; border:none; }
.close-video{ position:absolute; top:15px; right:25px; font-size:35px; cursor:pointer; }

.hero{ height:65vh; background-size:cover; background-position:center; display:flex; align-items:flex-end; padding:40px 5%; position:relative; }
.hero::after{ content:""; position:absolute; inset:0; background:linear-gradient(to top,#0f0f0f,transparent 50%),linear-gradient(to right,#0f0f0f,transparent); }

.hero-content{ position:relative; z-index:2; max-width:700px; }

.episodes{ display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; padding:20px 5%; }

.card{ background:#1c1c1c; border-radius:8px; overflow:hidden; cursor:pointer; transition:0.3s; border:1px solid #333; position:relative; }
.card:hover{ transform:scale(1.05); border-color:#e50914; }

.card img{ width:100%; height:140px; object-fit:cover; }

.watched-tag{ position:absolute; top:5px; right:5px; background:rgba(0,0,0,0.7); color:#00ff00; font-size:10px; padding:2px 5px; }

.progress-bar{ position:absolute; bottom:0; left:0; height:4px; background:#e50914; width:0%; }

.btn-main{ background:#e50914; color:white; padding:12px 25px; border-radius:5px; font-weight:bold; cursor:pointer; border:none; margin-top:10px; }

.season-menu{ background:#1c1c1c; border:1px solid #333; position:absolute; display:none; z-index:10; border-radius:5px; }
.season-menu div{ padding:12px 20px; cursor:pointer; border-bottom:1px solid #222; }

.show{ display:block; }

/* ===== POPUP UNLOCK ===== */
#unlockModal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:4000;
}

.modal-box{
background:#111;
border:1px solid #333;
padding:25px;
border-radius:10px;
text-align:center;
max-width:400px;
}

.modal-box h2{ color:#00ff00; margin-bottom:10px; }
.modal-box p{ color:#ccc; margin-bottom:20px; }

.modal-btn{
background:#e50914;
border:none;
padding:12px 20px;
color:white;
cursor:pointer;
border-radius:5px;
}
</style>
</head>

<body>

<div class="navbar">
<a class="logo" href="index.html">YAMONFILM</a>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="side-menu" id="menu">
<a href="account.html">Mon compte</a>
<a href="series.html">Mes séries</a>

<div class="promo-section">
<span style="font-size:12px;color:#666;">CODE</span>
<input id="promoCode" class="promo-input">
<button class="activate-btn" id="activateBtnMenu">Activer</button>
<p id="promoMsgMenu"></p>
</div>

<button id="logoutBtn">Déconnexion</button>
</div>

<div id="video-overlay">
<span class="close-video" onclick="closeVideo()">×</span>
<iframe id="video-iframe"></iframe>
</div>

<!-- POPUP -->
<div id="unlockModal">
<div class="modal-box">
<h2>🎉 Félicitations !</h2>
<p>Vous avez obtenu la série complète.</p>
<button class="modal-btn" id="watchNow">Regarder maintenant</button>
</div>
</div>

<section class="hero" id="hero">
<div class="hero-content">
<h1>Medicopter 117</h1>
<p id="overview"></p>

<button id="resumeBtn" class="btn-main" style="display:none;background:white;color:black;">Reprendre</button>
<button id="unlockBtn" class="btn-main">Débloquer VIP</button>
</div>
</section>

<div style="padding:20px 5%;position:relative;">
<button class="btn-main" id="seasonBtn">Saison 1</button>
<div class="season-menu" id="seasonMenu"></div>
</div>

<div class="episodes" id="episodes"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,doc,setDoc,getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
authDomain:"yamonfilm-fead8.firebaseapp.com",
projectId:"yamonfilm-fead8"
});

const auth = getAuth(app);
const db = getFirestore(app);

let userProgress = { watched:[], lastBySerie:{} };
const serieId = "MEDICOPTER";

let currentEpisodes=[];
let currentS=1;

const videasSources = { /* TON GROS OBJET RESTE INTACT */ };

window.toggleMenu = ()=>{
document.getElementById("menu").classList.toggle("open");
document.getElementById("overlay").classList.toggle("show");
};

/* ===== POPUP ===== */
function showUnlockPopup(){
document.getElementById("unlockModal").style.display="flex";
}

document.getElementById("watchNow").onclick = async ()=>{
const user = auth.currentUser;
const ref = doc(db,"users",user.uid);

let snap = await getDoc(ref);
let unlocked = snap.data().seriesUnlocked || [];

if(!unlocked.includes(serieId)){
unlocked.push(serieId);
await setDoc(ref,{seriesUnlocked:unlocked},{merge:true});
}

document.getElementById("unlockModal").style.display="none";
document.getElementById("unlockBtn").style.display="none";
};

onAuthStateChanged(auth,async(user)=>{
if(!user) return location.href="login.html";

const snap = await getDoc(doc(db,"users",user.uid));

if(snap.exists()){
const data=snap.data();
if(data.progress) userProgress=data.progress;

if(data.seriesUnlocked?.includes(serieId)){
document.getElementById("unlockBtn").style.display="none";
}
}

loadSeries();
});

document.getElementById("unlockBtn").onclick = ()=>{
showUnlockPopup();
};

/* ===== SERIES TMDB ===== */
const apiKey="182c7173698e34803715eacab5c693a7";
const tmdbId=40996;

async function loadSeries(){
const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}?api_key=${apiKey}&language=fr-FR`);
const data = await res.json();

document.getElementById("overview").innerText=data.overview;
document.getElementById("hero").style.backgroundImage=`url(https://image.tmdb.org/t/p/original${data.backdrop_path})`;

/* IMPORTANT FIX SAISON */
const menu=document.getElementById("seasonMenu");
menu.innerHTML="";

for(let i=1;i<=data.number_of_seasons;i++){
const div=document.createElement("div");
div.innerText="Saison "+i;
div.onclick=()=>{ currentS=i; loadEpisodes(i); menu.classList.remove("show"); };
menu.appendChild(div);
}

loadEpisodes(1);
}

async function loadEpisodes(s){
const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${s}?api_key=${apiKey}&language=fr-FR`);
const data = await res.json();
currentEpisodes=data.episodes;
renderEpisodes();
}

function renderEpisodes(){
const c=document.getElementById("episodes");
c.innerHTML="";

currentEpisodes.forEach(ep=>{
const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="https://image.tmdb.org/t/p/w300${ep.still_path}">
<div style="padding:10px">${ep.name}</div>
`;

card.onclick=()=>openVideo(currentS,ep.episode_number);
c.appendChild(card);
});
}

window.openVideo=(s,e)=>{
const url=videasSources?.[s]?.[e];
if(!url) return;

document.getElementById("video-iframe").src=url;
document.getElementById("video-overlay").style.display="flex";
};

window.closeVideo=()=>{
document.getElementById("video-overlay").style.display="none";
document.getElementById("video-iframe").src="";
};

document.getElementById("seasonBtn").onclick=()=>{
document.getElementById("seasonMenu").classList.toggle("show");
};

</script>
</body>
</html>
