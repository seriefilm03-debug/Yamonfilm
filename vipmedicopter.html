<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicopter 117 - YAMONFILM</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    overflow-x:hidden;
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    z-index:1000;
}

.logo{
    color:#e50914;
    font-size:28px;
    font-weight:bold;
    text-decoration:none;
}

.nav-right{
    display:flex;
    align-items:center;
    gap:15px;
}

.menu-btn{
    font-size:28px;
    cursor:pointer;
}

/* MENU */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    z-index:1500;
}

.overlay.show{
    opacity:1;
    pointer-events:auto;
}

.side-menu{
    position:fixed;
    top:0;
    right:-100%;
    width:300px;
    height:100%;
    background:#111;
    padding:80px 20px 20px;
    display:flex;
    flex-direction:column;
    gap:15px;
    transition:0.3s;
    z-index:2000;
    border-left:1px solid #333;
}

.side-menu.open{
    right:0;
}

.side-menu a,
.side-menu button{
    color:white;
    text-decoration:none;
    background:none;
    border:none;
    font-size:18px;
    padding:10px 0;
    cursor:pointer;
    text-align:left;
    border-bottom:1px solid #222;
}

/* CODE VIP */
.promo-section{
    margin-top:10px;
    padding:10px 0;
    border-bottom:1px solid #222;
}

.promo-input{
    width:100%;
    padding:12px;
    background:#222;
    border:1px solid #444;
    color:white;
    border-radius:4px;
    margin-top:10px;
}

.activate-btn{
    background:#e50914;
    color:white;
    border:none;
    padding:12px;
    width:100%;
    border-radius:4px;
    margin-top:10px;
    font-weight:bold;
    cursor:pointer;
}

/* HERO */
.hero{
    height:65vh;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:flex-end;
    padding:40px 5%;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top,#0f0f0f,transparent 50%),
               linear-gradient(to right,#0f0f0f,transparent);
}

.hero-content{
    position:relative;
    z-index:2;
    max-width:700px;
}

.btn-main{
    background:#e50914;
    color:white;
    padding:12px 25px;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
    border:none;
    margin-top:10px;
}

/* EPISODES */
.episodes{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    padding:20px 5%;
}

.card{
    background:#1c1c1c;
    border-radius:8px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
    border:1px solid #333;
    position:relative;
}

.card:hover{
    transform:scale(1.03);
    border-color:#e50914;
}

.card img{
    width:100%;
    height:140px;
    object-fit:cover;
}

.watched-tag{
    position:absolute;
    top:5px;
    right:5px;
    background:rgba(0,0,0,0.8);
    color:#00ff00;
    font-size:10px;
    padding:2px 5px;
    border-radius:3px;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- 🔥 POPUP VIP -->
<div id="vipPopup"
style="
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
">

<div style="background:#1c1c1c;padding:25px;border-radius:10px;text-align:center;width:300px;">
<h2>🎉 Félicitation</h2>

<p style="margin:10px 0;color:#ccc;">
Vous avez obtenu la série complète<br>
Bon visionnage !
</p>

<button id="vipOkBtn"
style="background:#e50914;color:white;border:none;padding:12px;width:100%;border-radius:5px;font-weight:bold;cursor:pointer;">
OK
</button>
</div>

</div>

<!-- NAV -->
<div class="navbar">
<a href="index.html" class="logo">YAMONFILM</a>
<div class="nav-right">
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="side-menu" id="menu">
<a href="index.html">Accueil</a>
<a href="account.html">Mon compte</a>
</div>

<section class="hero" id="hero">
<div class="hero-content">
<h1>Medicopter 117</h1>
</div>
</section>

<div class="episodes" id="episodes"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
authDomain: "yamonfilm-fead8.firebaseapp.com",
projectId: "yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const serieId = "MEDICOPTER";

let currentUser = null;

/* MENU */
window.toggleMenu = () => {
document.getElementById("menu").classList.toggle("open");
document.getElementById("overlay").classList.toggle("show");
};

/* AUTH */
onAuthStateChanged(auth, async (user) => {

if (!user) {
window.location.href = "login.html";
return;
}

currentUser = user;

const ref = doc(db, "users", user.uid);
const snap = await getDoc(ref);

if (snap.exists()) {

const data = snap.data();
const unlocked = data.seriesUnlocked || [];

/* 🔥 POPUP SI PAS DEBLOQUE */
if (!unlocked.includes(serieId)) {
document.getElementById("vipPopup").style.display = "flex";
}

}
});

/* BOUTON OK POPUP */
document.getElementById("vipOkBtn").onclick = async () => {

if (!currentUser) return;

const ref = doc(db, "users", currentUser.uid);
const snap = await getDoc(ref);

let unlocked = [];

if (snap.exists()) {
unlocked = snap.data().seriesUnlocked || [];
}

if (!unlocked.includes(serieId)) {
unlocked.push(serieId);
}

await setDoc(ref, {
seriesUnlocked: unlocked
}, { merge:true });

document.getElementById("vipPopup").style.display = "none";
alert("Série débloquée !");
};

</script>

</body>
</html>
