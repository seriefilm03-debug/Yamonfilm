<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicopter 117 - YAMONFILM</title>
    <style>
        /* --- STYLE GLOBAL --- */
        *{ box-sizing:border-box; margin:0; padding:0; font-family:Arial, sans-serif; }
        body{ background:#0f0f0f; color:white; overflow-x: hidden; }

        .navbar{
            position:fixed; top:0; left:0; width:100%; height:60px;
            display:flex; justify-content:space-between; align-items:center;
            padding:0 20px; background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index:1000;
        }
        .logo{ color:#e50914; font-size:28px; font-weight:bold; text-decoration:none; }

        /* --- LECTEUR VIDEO --- */
        #video-overlay { display: none; position: fixed; inset: 0; background: black; z-index: 3000; flex-direction: column; justify-content: center; align-items: center; }
        #video-overlay iframe { width: 100%; height: 90%; border: none; }
        .close-video { position: absolute; top: 15px; right: 25px; font-size: 35px; color: white; cursor: pointer; }

        /* --- HERO & EPISODES --- */
        .hero{ height:60vh; background-size:cover; background-position:center; display:flex; align-items:flex-end; padding:40px 5%; position:relative; }
        .hero::after{ content:""; position:absolute; inset:0; background:linear-gradient(to top,#0f0f0f,transparent); }
        .hero-content{ position:relative; z-index:2; max-width:700px; }
        
        .episodes{ display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; padding:20px 5%; }
        .card{ background:#1c1c1c; border-radius:8px; overflow:hidden; cursor:pointer; position: relative; transition: 0.3s; border: 1px solid #333;}
        .card:hover{ transform: scale(1.05); border-color: #e50914; }
        .card img{ width:100%; height:140px; object-fit:cover; }
        
        /* Barre de progression Netflix Style */
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: #e50914; width: 0%; transition: 0.3s; }
        .watched-tag { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); color: #00ff00; font-size: 10px; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        
        .btn-main{ background:#e50914; color:white; padding:12px 20px; border-radius:5px; font-weight:bold; cursor:pointer; border:none; margin-top:10px; margin-right: 10px;}
        .season-menu{ background:#1c1c1c; border:1px solid #333; position:absolute; display:none; z-index:10; }
        .season-menu div{ padding:10px 20px; cursor:pointer; }
        .show{ display:block; }
    </style>
</head>
<body>

<div class="navbar"><a href="index.html" class="logo">YAMONFILM</a></div>

<div id="video-overlay">
    <span class="close-video" onclick="closeVideo()">&times;</span>
    <iframe id="video-iframe" src="" allowfullscreen></iframe>
</div>

<section class="hero" id="hero">
    <div class="hero-content">
        <h1 id="title">Medicopter 117</h1>
        <p id="overview" style="color:#ccc; margin:10px 0;"></p>
        <div style="display: flex; flex-wrap: wrap; gap: 10px;">
            <button id="unlockBtn" class="btn-main">🔓 Débloquer la série VIP</button>
            <button id="resumeBtn" class="btn-main" style="display:none; background:white; color:black;">▶ Reprendre l'épisode</button>
        </div>
        <p id="unlockMsg" style="font-size: 14px; margin-top: 10px; font-weight: bold;"></p>
    </div>
</section>

<div style="padding:20px 5%;">
    <button class="btn-main" id="seasonBtn">Saison 1 ▼</button>
    <div class="season-menu" id="seasonMenu"></div>
</div>

<div class="episodes" id="episodes"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE", authDomain: "yamonfilm-fead8.firebaseapp.com", projectId: "yamonfilm-fead8" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userProgress = { watched: [], lastBySerie: {} };
    const serieId = "MEDICOPTER"; 

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                if (userData.progress) {
                    userProgress = userData.progress;
                    if(!userProgress.lastBySerie) userProgress.lastBySerie = {};
                    checkResume();
                }
                // Cacher le bouton si déjà débloqué
                if (userData.seriesUnlocked && userData.seriesUnlocked.includes(serieId)) {
                    document.getElementById("unlockBtn").style.display = "none";
                }
            }
            loadSeries();
        } else { window.location.href = "login.html"; }
    });

    // --- BOUTON DEBLOCAGE RAPIDE ---
    document.getElementById("unlockBtn").onclick = async () => {
        const user = auth.currentUser;
        if (!user) return;

        const msg = document.getElementById("unlockMsg");
        const userRef = doc(db, "users", user.uid);
        
        try {
            const snap = await getDoc(userRef);
            let unlocked = [];
            if (snap.exists() && snap.data().seriesUnlocked) {
                unlocked = snap.data().seriesUnlocked;
            }

            if (!unlocked.includes(serieId)) {
                unlocked.push(serieId);
                await setDoc(userRef, { seriesUnlocked: unlocked }, { merge: true });
                msg.style.color = "#00ff00";
                msg.innerText = "Série ajoutée à 'Mes Séries' !";
                document.getElementById("unlockBtn").style.display = "none";
            } else {
                msg.innerText = "Déjà dans votre liste.";
            }
        } catch (e) {
            msg.style.color = "red";
            msg.innerText = "Erreur lors du déblocage.";
        }
    };

    window.saveProgress = async (s, e, title, img) => {
        const user = auth.currentUser;
        if(!user) return;
        const epKey = `${serieId}-S${s}E${e}`;
        if(!userProgress.watched.includes(epKey)) userProgress.watched.push(epKey);
        
        userProgress.lastBySerie[serieId] = { 
            s, e, title, img, 
            serieName: "Medicopter 117", 
            link: window.location.pathname,
            timestamp: Date.now() 
        };

        await setDoc(doc(db, "users", user.uid), { progress: userProgress }, { merge: true });
        renderEpisodes();
        checkResume();
    };

    function checkResume() {
        const last = userProgress.lastBySerie[serieId];
        if(last) {
            const btn = document.getElementById("resumeBtn");
            btn.style.display = "block";
            btn.innerText = `▶ Reprendre S${last.s}E${last.e}`;
            btn.onclick = () => window.openVideo(last.s, last.e, last.title, last.img);
        }
    }

    const videasSources = { 1: {1:"https://app.videas.fr/embed/media/9be0c38d-cc48-406b-9c77-97926b985b98/", 2:"https://app.videas.fr/embed/media/7c3cfb1b-2488-4fc6-9a59-5fa244fa30f9/", 3:"https://app.videas.fr/embed/media/7dc76559-de0a-48e9-8942-0970e9377ae4/", 4:"https://app.videas.fr/embed/media/44384b82-075b-49cc-b5ee-fed4f829c6ae/", 5:"https://app.videas.fr/embed/media/c7e8d288-d36c-4fa0-a806-f10ff9e22d3f/", 6:"https://app.videas.fr/embed/media/47639575-5d6e-4af1-85dd-3cc413fefc14/", 7:"https://app.videas.fr/embed/media/d58e220c-4ab3-4fa2-b512-38a244378c6b/", 8:"https://app.videas.fr/embed/media/d08e7378-1a28-4c18-a379-e8f23b933065/", 9:"https://app.videas.fr/embed/media/a5c5e356-c9f6-4d38-ae7b-e745419ab987/"}, 2: {1:"https://app.videas.fr/embed/media/bfb96819-1bef-430e-8aa7-6a49f3156ab1/", 2:"https://app.videas.fr/embed/media/f5eeae69-8fb6-4f2d-bde2-bd462e001135/", 3:"https://app.videas.fr/embed/media/543af54a-088f-4327-afb9-e631d4183d53/", 4:"https://app.videas.fr/embed/media/47fddca2-74ca-4ff3-8f58-8ce9d5429294/", 5:"https://app.videas.fr/embed/media/4f967d73-23bc-484b-b5df-28c4c541d75d/", 6:"https://app.videas.fr/embed/media/93d34c39-c0d5-4a53-a4fa-32d9de3a1f2c/", 7:"https://app.videas.fr/embed/media/c219d3be-8265-465d-a033-21a4d5a4c15d/", 8:"https://app.videas.fr/embed/media/76577c4e-2acd-4829-b9df-e85844f40fc7/", 9:"https://app.videas.fr/embed/media/f2545d37-a0f6-4a72-a271-707b6def596e/", 10:"https://app.videas.fr/embed/media/90a02b52-32da-4525-893e-675ecce1f539/", 11:"https://app.videas.fr/embed/media/096714fb-bbac-4612-ac35-e56000ac725a/", 12:"https://app.videas.fr/embed/media/e645f2b6-6714-41e1-b10d-26a54176e38b/", 13:"https://app.videas.fr/embed/media/389ff0fe-9599-4104-ad39-1bbb6fba9a4b/"}, 3: {1:"https://app.videas.fr/embed/media/e645f2b6-6714-41e1-b10d-26a54176e38b/", 2:"https://app.videas.fr/embed/media/12b9fbbc-08a0-4d6a-b4df-0c8e5b6ee0f6/", 3:"https://app.videas.fr/embed/media/451033c3-6284-4844-92da-5db171d0b546/", 4:"https://app.videas.fr/embe /app.videas.fr/embed/media/2d708889-cf48-42ff-a2e1-15e53e7d2fcb/", 6:"https://app.videas.fr/embed/media/331955bf-3522-46d0-9c15-845566a9bc70/", 7:"https://app.videas.fr/embed/media/ef602a2e-9418-47e6-854b-a3b96008c45f/", 8:"https://app.videas.fr/embed/media/f57dd93f-6971-4e35-afb8-7f5b160687ae/", 9:"https://app.videas.fr/embed/media/ce9c5b3e-75fc-402d-ada7-718402c06165/", 10:"https://app.videas.fr/embed/media/b5f8a00d-a0df-4243-a714-db0989f3ee73/", 11:"https://app.videas.fr/embed/media/096714fb-bbac-4612-ac35-e56000ac725a/", 12:"https://app.videas.fr/embed/media/a1ed75d4-f54e-4b21-81fe-3d501557c1a1/", 13:"https://app.videas.fr/embed/media/cac57cc6-9099-4770-a5f3-b6bf11b650af/"}, 6: {1:"https://app.videas.fr/embed/media/793717a8-4260-4a02-927b-ba06c745a4c2/", 2:"https://app.videas.fr/embed/media/02b48818-4130-45ba-8bdb-57fbdee93bc3/", 3:"https://app.videas.fr/embed/media/91a0a2be-a66b-4cf1-b5a3-f1e7747e0733/", 4:"https://app.videas.fr/embed/media/5842bf4a-7458-46ab-8f4e-0d0227082c1e/", 5:"https://app.videas.fr/embed/media/51350a8a-fc5f-4120-a979-3bad000910e8/", 6:"https://app.videas.fr/embed/media/22f6b8fb-7f96-491c-866e-06aeea286e2a/", 7:"https://app.videas.fr/embed/media/5efb6cd3-78ed-46be-a042-70f187466f51/", 8:"https://app.videas.fr/embed/media/f00996a7-b39c-4269-93da-7ceb24cb8135/", 9:"https://app.videas.fr/embed/media/28f487fa-1c26-46b9-9bca-20f9d5869cd5/", 10:"https://app.videas.fr/embed/media/2944cd04-203f-4767-9150-60747d45d2c4/", 11:"https://app.videas.fr/embed/media/f285cf68-65a4-4bea-b633-53b990ebdd52/", 12:"https://app.videas.fr/embed/media/d9bb420a-3e91-445b-9236-29a3f5c92c48/", 13:"https://app.videas.fr/embed/media/01de00a1-40b1-4e07-9be4-97a4eb6e4b50/"}, 7: {1:"https://app.videas.fr/embed/media/43c9eb20-c820-4642-9d93-a05d5db3d1c4/", 2:"https://app.videas.fr/embed/media/12a52ed4-0926-4a59-bb98-526810c015a0/", 3:"https://app.videas.fr/embed/media/6ac74ffd-f2cd-41ea-8e6d-11c1a94c8fba/", 4:"https://app.videas.fr/embed/media/b9fdb94b-4141-489e-8ba8-708063d4a361/", 5:"https://app.videas.fr/embed/media/06e5d177-0d30-40f2-a815-0318703beded/", 6:"https://app.videas.fr/embed/media/2a17bac7-97ee-46ed-97e7-80a02fb3ca53/", 7:"https://app.videas.fr/embed/media/92c4f6d6-db0b-46ea-bc66-c9696c4bd144/", 8:"https://app.videas.fr/embed/media/2f73e6bf-42e3-4431-8ccc-bf8835fa203a/"} };
    const apiKey = "182c7173698e34803715eacab5c693a7";
    const tmdbId = 40996;
    let currentEpisodes = [];
    let currentS = 1;

    async function loadSeries() {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}?api_key=${apiKey}&language=fr-FR`);
        const data = await res.json();
        document.getElementById("overview").innerText = data.overview;
        document.getElementById("hero").style.backgroundImage = `url(https://image.tmdb.org/t/p/original${data.backdrop_path})`;
        
        const menu = document.getElementById("seasonMenu");
        for(let i=1; i<=data.number_of_seasons; i++) {
            const d = document.createElement("div"); d.innerText = "Saison "+i;
            d.onclick = () => { currentS = i; document.getElementById("seasonBtn").innerText = "Saison "+i+" ▼"; loadEpisodes(i); menu.classList.remove("show"); };
            menu.appendChild(d);
        }
        loadEpisodes(1);
    }

    async function loadEpisodes(s) {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${s}?api_key=${apiKey}&language=fr-FR`);
        const data = await res.json();
        currentEpisodes = data.episodes;
        renderEpisodes();
    }

    function renderEpisodes() {
        const container = document.getElementById("episodes");
        container.innerHTML = "";
        currentEpisodes.forEach(ep => {
            const epKey = `${serieId}-S${currentS}E${ep.episode_number}`;
            const isWatched = userProgress.watched.includes(epKey);
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="https://image.tmdb.org/t/p/w300${ep.still_path}">
                ${isWatched ? '<div class="watched-tag">VU</div>' : ''}
                <div class="progress-bar" style="width: ${isWatched ? '100%' : '0%'}"></div>
                <div style="padding:10px;"><b>E${ep.episode_number}</b> - ${ep.name}</div>
            `;
            card.onclick = () => window.openVideo(currentS, ep.episode_number, ep.name, ep.still_path);
            container.appendChild(card);
        });
    }

    window.openVideo = (s, e, title, img) => {
        const url = videasSources[s][e];
        if(url) {
            document.getElementById("video-iframe").src = url;
            document.getElementById("video-overlay").style.display = "flex";
            window.saveProgress(s, e, title, img);
        }
    };

    window.closeVideo = () => { document.getElementById("video-overlay").style.display="none"; document.getElementById("video-iframe").src=""; };
    document.getElementById("seasonBtn").onclick = () => document.getElementById("seasonMenu").classList.toggle("show");
</script>
</body>
</html>
