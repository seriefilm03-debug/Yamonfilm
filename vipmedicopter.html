<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicopter 117 - YAMONFILM</title>

<style>
/* --- TON STYLE ORIGINAL INCHANGÉ --- */
*{ box-sizing:border-box; margin:0; padding:0; font-family:Arial, sans-serif; }
body{ background:#0f0f0f; color:white; overflow-x: hidden; }

.navbar{
    position:fixed; top:0; left:0; width:100%; height:60px;
    display:flex; justify-content:space-between; align-items:center;
    padding:0 20px;
    background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    z-index:1000;
}
.logo{ color:#e50914; font-size:28px; font-weight:bold; text-decoration:none; }
.menu-btn{ font-size:28px; cursor:pointer; z-index:2100; }

.overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); opacity:0; pointer-events:none; transition:0.3s; z-index:1500; }
.overlay.show{ opacity:1; pointer-events:auto; }

.side-menu{ position:fixed; top:0; right:-100%; width:300px; height:100%; background:#111; padding:80px 20px; display:flex; flex-direction:column; gap:15px; transition:0.3s; z-index:2000; }
.side-menu.open{ right:0; }

.hero{
    height:65vh;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:flex-end;
    padding:40px 5%;
    position:relative;
}
.hero::after{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(to top,#0f0f0f, transparent 50%);
}
.hero-content{ position:relative; z-index:2; max-width:700px; }

.episodes{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    padding:20px 5%;
}
.card{
    background:#1c1c1c;
    border-radius:8px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
    border:1px solid #333;
}
.card:hover{ transform:scale(1.05); border-color:#e50914; }
.card img{ width:100%; height:140px; object-fit:cover; }

/* VIDEO */
#video-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    z-index:3000;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}
#video-overlay iframe{ width:100%; height:90%; border:none; }
.close-video{ position:absolute; top:15px; right:25px; font-size:35px; cursor:pointer; }

/* --- POPUP VIP --- */
#vipPopup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    z-index:5000;
    justify-content:center;
    align-items:center;
}
.vip-box{
    background:#111;
    padding:25px;
    border-radius:10px;
    width:90%;
    max-width:400px;
    text-align:center;
    border:1px solid #e50914;
}
.vip-box button{
    margin-top:15px;
    width:100%;
    padding:12px;
    background:#e50914;
    border:none;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
<a class="logo">YAMONFILM</a>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="side-menu" id="menu">
<a href="#">Mon compte</a>
<a href="#">Mes séries</a>
</div>

<!-- VIDEO -->
<div id="video-overlay">
<span class="close-video" onclick="closeVideo()">&times;</span>
<iframe id="video-iframe"></iframe>
</div>

<!-- POPUP VIP -->
<div id="vipPopup">
<div class="vip-box">
<h2>🎉 Félicitations</h2>
<p>Vous avez obtenu la série complète</p>
<button onclick="unlockSerie()">Regarder maintenant</button>
</div>
</div>

<!-- HERO (INCHANGÉ) -->
<section class="hero" id="hero">
<div class="hero-content">
<h1 id="title">Medicopter 117</h1>
<p id="overview"></p>
</div>
</section>

<!-- EPISODES (INCHANGÉ) -->
<div class="episodes" id="episodes"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
authDomain:"yamonfilm-fead8.firebaseapp.com",
projectId:"yamonfilm-fead8"
});

const auth = getAuth(app);
const db = getFirestore(app);

const serieId = "MEDICOPTER";
let unlocked = false;

/* 🔥 IMPORTANT : TES DONNÉES ORIGINALES RESTENT */
const videasSources = {
1:{1:"https://app.videas.fr/embed/media/9be0c38d-cc48-406b-9c77-97926b985b98/"}
};

let currentEpisodes = [];
let currentS = 1;

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
if(!user) return location.href="login.html";

const snap = await getDoc(doc(db,"users",user.uid));

if(snap.exists()){
const data = snap.data();
unlocked = data.seriesUnlocked?.includes(serieId) || false;

/* POPUP SI PAS DÉBLOQUÉ */
if(!unlocked){
document.getElementById("vipPopup").style.display="flex";
}
}

loadSeries();
});

/* MENU */
window.toggleMenu = ()=>{
menu.classList.toggle("open");
overlay.classList.toggle("show");
};

/* 🔥 NE TOUCHE PAS À TES EPISODES / TMDB / IMAGES */
async function loadSeries(){
const res = await fetch(`https://api.themoviedb.org/3/tv/40996?api_key=182c7173698e34803715eacab5c693a7&language=fr-FR`);
const data = await res.json();

document.getElementById("overview").innerText = data.overview;
document.getElementById("hero").style.backgroundImage =
`url(https://image.tmdb.org/t/p/original${data.backdrop_path})`;

loadEpisodes();
}

async function loadEpisodes(){
const container = document.getElementById("episodes");
container.innerHTML="";

/* TEST SIMPLE (tu gardes ton vrai renderEpisodes si tu veux) */
for(let i=1;i<=12;i++){
let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="https://image.tmdb.org/t/p/w300/placeholder.jpg">
<div style="padding:10px">Episode ${i}</div>
`;

card.onclick=()=>openEpisode(1,i);
container.appendChild(card);
}
}

/* OPEN EP */
window.openEpisode=(s,e)=>{
if(!unlocked){
document.getElementById("vipPopup").style.display="flex";
return;
}

const url = videasSources[s]?.[e];
if(url){
document.getElementById("video-iframe").src=url;
document.getElementById("video-overlay").style.display="flex";
}
};

window.closeVideo=()=>{
document.getElementById("video-overlay").style.display="none";
document.getElementById("video-iframe").src="";
};

/* 🔥 DÉBLOCAGE GLOBAL FIREBASE */
window.unlockSerie = async () => {
const user = auth.currentUser;
if(!user) return;

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

let list = snap.exists() ? (snap.data().seriesUnlocked || []) : [];

if(!list.includes(serieId)){
list.push(serieId);
await setDoc(ref,{ seriesUnlocked:list },{ merge:true });
}

unlocked = true;
document.getElementById("vipPopup").style.display="none";
};

</script>

</body>
</html>
