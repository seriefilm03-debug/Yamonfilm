<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicopter 117 - YAMONFILM</title>

<style>
/* --- TON DESIGN INCHANGÉ --- */
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    overflow-x:hidden;
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    z-index:1000;
}

.logo{
    color:#e50914;
    font-size:28px;
    font-weight:bold;
    text-decoration:none;
}

.menu-btn{
    font-size:28px;
    cursor:pointer;
    z-index:2100;
}

/* OVERLAY */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    z-index:1500;
}

.overlay.show{
    opacity:1;
    pointer-events:auto;
}

/* MENU */
.side-menu{
    position:fixed;
    top:0;
    right:-100%;
    width:300px;
    height:100%;
    background:#111;
    padding:80px 20px 20px;
    display:flex;
    flex-direction:column;
    gap:15px;
    transition:0.3s;
    z-index:2000;
}

.side-menu.open{
    right:0;
}

.side-menu a, .side-menu button{
    color:white;
    background:none;
    border:none;
    font-size:18px;
    padding:10px 0;
    cursor:pointer;
    text-align:left;
    border-bottom:1px solid #222;
}

/* VIP POPUP (AJOUTÉ) */
#vipPopup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup-box{
    background:#1c1c1c;
    padding:25px;
    border-radius:10px;
    text-align:center;
    width:300px;
}

.btn-popup{
    background:#e50914;
    color:white;
    border:none;
    padding:12px;
    margin-top:15px;
    width:100%;
    cursor:pointer;
}

/* HERO */
.hero{
    height:65vh;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:flex-end;
    padding:40px 5%;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top,#0f0f0f,transparent 50%);
}

.hero-content{
    position:relative;
    z-index:2;
}

/* EPISODES */
.episodes{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    padding:20px 5%;
}

.card{
    background:#1c1c1c;
    border-radius:8px;
    overflow:hidden;
    cursor:pointer;
    border:1px solid #333;
}

.card img{
    width:100%;
    height:140px;
    object-fit:cover;
}
</style>
</head>

<body>

<!-- POPUP VIP -->
<div id="vipPopup">
    <div class="popup-box">
        <h2>🎉 Félicitations</h2>
        <p>Vous avez obtenu la série complète<br>Bon visionnage !</p>
        <button class="btn-popup" id="unlockPopupBtn">OK / Débloquer</button>
    </div>
</div>

<div class="navbar">
    <a href="index.html" class="logo">YAMONFILM</a>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="side-menu" id="menu">
    <a href="account.html">Mon compte</a>
    <a href="series.html">Mes séries</a>
</div>

<section class="hero" id="hero">
    <div class="hero-content">
        <h1>Medicopter 117</h1>
        <p id="overview"></p>
    </div>
</section>

<div class="episodes" id="episodes"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
    apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
    authDomain: "yamonfilm-fead8.firebaseapp.com",
    projectId: "yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const serieId = "MEDICOPTER";

let userRef = null;

/* MENU */
window.toggleMenu = () => {
    document.getElementById("menu").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
};

/* AUTH */
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    let unlocked = snap.exists() ? (snap.data().seriesUnlocked || []) : [];

    /* 👉 POPUP SI PAS DEBLOQUE */
    if (!unlocked.includes(serieId)) {
        document.getElementById("vipPopup").style.display = "flex";
    }

    loadSeries();
});

/* POPUP BUTTON = DEBLOCAGE */
document.getElementById("unlockPopupBtn").onclick = async () => {

    const snap = await getDoc(userRef);

    let unlocked = snap.exists() ? (snap.data().seriesUnlocked || []) : [];

    if (!unlocked.includes(serieId)) {
        unlocked.push(serieId);
    }

    await setDoc(userRef, {
        seriesUnlocked: unlocked
    }, { merge:true });

    document.getElementById("vipPopup").style.display = "none";

    alert("Série débloquée !");
};

/* TMDB */
const apiKey = "182c7173698e34803715eacab5c693a7";
const tmdbId = 40996;

/* LOAD */
async function loadSeries(){

    const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}?api_key=${apiKey}&language=fr-FR`);
    const data = await res.json();

    document.getElementById("overview").innerText = data.overview;

    document.getElementById("hero").style.backgroundImage =
        `url(https://image.tmdb.org/t/p/original${data.backdrop_path})`;

    loadEpisodes(1);
}

/* EPISODES SIMPLE VERSION */
async function loadEpisodes(s){

    const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${s}?api_key=${apiKey}&language=fr-FR`);
    const data = await res.json();

    const container = document.getElementById("episodes");
    container.innerHTML = "";

    data.episodes.forEach(ep => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="https://image.tmdb.org/t/p/w300${ep.still_path}">
            <div style="padding:10px;">E${ep.episode_number} - ${ep.name}</div>
        `;

        container.appendChild(div);
    });
}

</script>

</body>
</html>
