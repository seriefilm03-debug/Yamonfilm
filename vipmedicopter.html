<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicopter 117 - YAMONFILM</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:15px 40px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

.logo{
  font-size:22px;
  font-weight:bold;
  color:#e50914;
  text-decoration:none;
}

/* HERO */
.hero{
  margin-top:70px;
  height:80vh;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  padding:80px;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:60%;
  background:linear-gradient(to top,#0f0f0f,transparent);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:600px;
}

.hero h1{font-size:55px;margin-bottom:15px;}
.meta{color:#ccc;margin-bottom:15px;}

/* SAISON */
.season-section{padding:40px 80px 20px;}

.season-menu{
  position:absolute;
  background:#1c1c1c;
  border-radius:8px;
  margin-top:10px;
  display:none;
}

.season-menu div{
  padding:12px 20px;
  cursor:pointer;
}

.season-menu div:hover{background:#e50914;}
.show{display:block}

/* EPISODES */
.episodes{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px 80px 80px;
}

.card{
  background:#1c1c1c;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}

.card:hover{transform:scale(1.05);}
.card img{width:100%;height:150px;object-fit:cover;}
.card-content{padding:15px;}

@media(max-width:768px){
  .hero{padding:40px;height:70vh}
  .hero h1{font-size:32px}
  .season-section{padding:20px 40px}
  .episodes{padding:20px 40px}
}
</style>
</head>

<body>

<header>
  <a href="index.html" class="logo">YAMONFILM</a>
</header>

<section class="hero" id="hero">
  <div class="hero-content">
    <h1 id="title">Chargement...</h1>
    <p class="meta" id="meta"></p>
    <p id="overview"></p>
  </div>
</section>

<div class="season-section">
  <button id="seasonBtn">Saison 1 ▼</button>
  <div class="season-menu" id="seasonMenu"></div>
</div>

<div class="episodes" id="episodes"></div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
});

const auth = getAuth(app);

// 🔥 PROTECTION PAGE
let loaded = false;

onAuthStateChanged(auth,(user)=>{
  if(user){
    loaded = true;
    loadSeries(); // lance le site seulement si connecté
  } else if(loaded){
    window.location.href = "login.html";
  }
});

// ===== TON CODE NORMAL =====
const apiKey="182c7173698e34803715eacab5c693a7";
const seriesId=40996;
const imgBase="https://image.tmdb.org/t/p/original";

const hero = document.getElementById("hero");
const title = document.getElementById("title");
const meta = document.getElementById("meta");
const overview = document.getElementById("overview");
const seasonMenu = document.getElementById("seasonMenu");
const seasonBtn = document.getElementById("seasonBtn");
const episodesContainer = document.getElementById("episodes");

async function loadSeries(){
  const res = await fetch(`https://api.themoviedb.org/3/tv/${seriesId}?api_key=${apiKey}&language=fr-FR`);
  const data = await res.json();

  title.textContent = data.name;
  meta.textContent = `⭐ ${data.vote_average} • ${data.first_air_date} • ${data.number_of_seasons} saisons`;
  overview.textContent = data.overview;
  hero.style.backgroundImage = `url(${imgBase}${data.backdrop_path})`;

  loadSeasons(data.number_of_seasons);
}

function loadSeasons(total){
  seasonMenu.innerHTML="";
  for(let i=1;i<=total;i++){
    const div=document.createElement("div");
    div.textContent="Saison "+i;
    div.onclick=()=>{
      seasonBtn.innerHTML="Saison "+i+" ▼";
      seasonMenu.classList.remove("show");
      loadEpisodes(i);
    };
    seasonMenu.appendChild(div);
  }
  loadEpisodes(1);
}

async function loadEpisodes(season){
  episodesContainer.innerHTML="";
  const res = await fetch(`https://api.themoviedb.org/3/tv/${seriesId}/season/${season}?api_key=${apiKey}&language=fr-FR`);
  const data = await res.json();

  data.episodes.forEach(ep=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${imgBase+ep.still_path}">
      <div class="card-content">
        <h4>${ep.episode_number}. ${ep.name}</h4>
      </div>
    `;

    episodesContainer.appendChild(card);
  });
}

seasonBtn.onclick=()=>seasonMenu.classList.toggle("show");
</script>

</body>
</html>
