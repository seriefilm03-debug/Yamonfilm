<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicopter 117 - YAMONFILM</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    overflow-x:hidden;
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    z-index:1000;
}

.logo{
    color:#e50914;
    font-size:28px;
    font-weight:bold;
    text-decoration:none;
}

.nav-right{
    display:flex;
    align-items:center;
    gap:15px;
}

.menu-btn{
    font-size:28px;
    cursor:pointer;
}

/* MENU */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    z-index:1500;
}

.overlay.show{
    opacity:1;
    pointer-events:auto;
}

.side-menu{
    position:fixed;
    top:0;
    right:-100%;
    width:300px;
    height:100%;
    background:#111;
    padding:80px 20px 20px;
    display:flex;
    flex-direction:column;
    gap:15px;
    transition:0.3s;
    z-index:2000;
    border-left:1px solid #333;
}

.side-menu.open{
    right:0;
}

.side-menu a,
.side-menu button{
    color:white;
    text-decoration:none;
    background:none;
    border:none;
    font-size:18px;
    padding:10px 0;
    cursor:pointer;
    text-align:left;
    border-bottom:1px solid #222;
}

/* CODE VIP */
.promo-section{
    margin-top:10px;
    padding:10px 0;
    border-bottom:1px solid #222;
}

.promo-input{
    width:100%;
    padding:12px;
    background:#222;
    border:1px solid #444;
    color:white;
    border-radius:4px;
    margin-top:10px;
}

.activate-btn{
    background:#e50914;
    color:white;
    border:none;
    padding:12px;
    width:100%;
    border-radius:4px;
    margin-top:10px;
    font-weight:bold;
    cursor:pointer;
}

/* HERO */
.hero{
    height:65vh;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:flex-end;
    padding:40px 5%;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top,#0f0f0f,transparent 50%),
               linear-gradient(to right,#0f0f0f,transparent);
}

.hero-content{
    position:relative;
    z-index:2;
    max-width:700px;
}

.btn-main{
    background:#e50914;
    color:white;
    padding:12px 25px;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
    border:none;
    margin-top:10px;
}

/* EPISODES */
.episodes{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    padding:20px 5%;
}

.card{
    background:#1c1c1c;
    border-radius:8px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
    border:1px solid #333;
    position:relative;
}

.card:hover{
    transform:scale(1.03);
    border-color:#e50914;
}

.card img{
    width:100%;
    height:140px;
    object-fit:cover;
}

.progress-bar{
    position:absolute;
    bottom:0;
    left:0;
    height:4px;
    background:#e50914;
}

.watched-tag{
    position:absolute;
    top:5px;
    right:5px;
    background:rgba(0,0,0,0.8);
    color:#00ff00;
    font-size:10px;
    padding:2px 5px;
    border-radius:3px;
    font-weight:bold;
}

/* VIDEO */
#video-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    z-index:3000;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#video-overlay iframe{
    width:100%;
    height:90%;
    border:none;
}

.close-video{
    position:absolute;
    top:15px;
    right:25px;
    font-size:35px;
    cursor:pointer;
}

/* SAISONS */
.season-menu{
    background:#1c1c1c;
    border:1px solid #333;
    position:absolute;
    display:none;
    z-index:10;
    border-radius:5px;
}

.season-menu div{
    padding:12px 20px;
    cursor:pointer;
    border-bottom:1px solid #222;
}

.show{
    display:block;
}
</style>
</head>

<body>

<div class="navbar">
    <a href="index.html" class="logo">YAMONFILM</a>

    <div class="nav-right">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="side-menu" id="menu">

    <a href="index.html">Accueil</a>
    <a href="account.html">Mon compte</a>

    <div class="promo-section">
        <span style="color:#666;font-size:12px;">ACTIVER UN CODE</span>

        <input
            type="text"
            id="promoCode"
            class="promo-input"
            placeholder="Entrer le code VIP"
        >

        <button id="activateBtnMenu" class="activate-btn">
            Activer
        </button>

        <p id="promoMsgMenu"
           style="font-size:12px;margin-top:8px;text-align:center;">
        </p>
    </div>

    <button id="logoutBtn"
            style="margin-top:auto;color:#e50914;">
        Déconnexion
    </button>

</div>

<!-- VIDEO -->
<div id="video-overlay">
    <span class="close-video" onclick="closeVideo()">&times;</span>

    <iframe id="video-iframe"
            src=""
            allowfullscreen>
    </iframe>
</div>

<!-- HERO -->
<section class="hero" id="hero">

    <div class="hero-content">

        <h1 style="font-size:3rem;">
            Medicopter 117
        </h1>

        <p id="overview"
           style="margin-top:15px;color:#ccc;">
        </p>

        <button id="resumeBtn"
                class="btn-main"
                style="display:none;background:white;color:black;">
            ▶ Reprendre
        </button>

    </div>

</section>

<!-- SAISONS -->
<div style="padding:20px 5%;position:relative;">

    <button class="btn-main" id="seasonBtn">
        Saison 1 ▼
    </button>

    <div class="season-menu" id="seasonMenu"></div>

</div>

<!-- EPISODES -->
<div class="episodes" id="episodes"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
    getFirestore,
    doc,
    getDoc,
    setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {
    apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
    authDomain: "yamonfilm-fead8.firebaseapp.com",
    projectId: "yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* MENU */

window.toggleMenu = () => {
    document.getElementById("menu").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
};

/* LOGOUT */

document.getElementById("logoutBtn").onclick = async () => {
    await signOut(auth);
    window.location.href = "login.html";
};

/* VARIABLES */

const serieId = "MEDICOPTER";

let userProgress = {
    watched: [],
    lastBySerie: {}
};

let currentEpisodes = [];
let currentS = 1;

/* AUTH */

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    const userRef = doc(db, "users", user.uid);

    const snap = await getDoc(userRef);

    if (snap.exists()) {

        const data = snap.data();

        if (data.progress) {
            userProgress = data.progress;
        }

        checkResume();
    }

    loadSeries();

});

/* CODE VIP */

document.getElementById("activateBtnMenu").onclick = async () => {

    const user = auth.currentUser;

    if (!user) return;

    const code = document
        .getElementById("promoCode")
        .value
        .trim()
        .toUpperCase();

    const msg = document.getElementById("promoMsgMenu");

    if (code !== "MEDICVIP") {

        msg.style.color = "red";
        msg.innerText = "Code invalide";

        return;
    }

    const ref = doc(db, "users", user.uid);

    const snap = await getDoc(ref);

    let unlocked = [];

    if (snap.exists()) {
        unlocked = snap.data().seriesUnlocked || [];
    }

    if (!unlocked.includes("MEDICOPTER")) {
        unlocked.push("MEDICOPTER");
    }

    await setDoc(ref, {
        seriesUnlocked: unlocked
    }, { merge:true });

    msg.style.color = "lime";
    msg.innerText = "Medicopter VIP débloqué 🔥";

};

/* API */

const apiKey = "182c7173698e34803715eacab5c693a7";
const tmdbId = 40996;

/* HERO */

async function loadSeries(){

    const res = await fetch(
        `https://api.themoviedb.org/3/tv/${tmdbId}?api_key=${apiKey}&language=fr-FR`
    );

    const data = await res.json();

    document.getElementById("overview").innerText =
        data.overview;

    document.getElementById("hero").style.backgroundImage =
        `url(https://image.tmdb.org/t/p/original${data.backdrop_path})`;

    const menu = document.getElementById("seasonMenu");

    for(let i=1;i<=data.number_of_seasons;i++){

        const div = document.createElement("div");

        div.innerText = "Saison " + i;

        div.onclick = () => {

            currentS = i;

            document.getElementById("seasonBtn").innerText =
                "Saison " + i + " ▼";

            loadEpisodes(i);

            menu.classList.remove("show");
        };

        menu.appendChild(div);
    }

    loadEpisodes(1);
}

/* LOAD EPISODES */

async function loadEpisodes(s){

    const res = await fetch(
        `https://api.themoviedb.org/3/tv/${tmdbId}/season/${s}?api_key=${apiKey}&language=fr-FR`
    );

    const data = await res.json();

    currentEpisodes = data.episodes;

    renderEpisodes();
}

/* RENDER */

function renderEpisodes(){

    const container = document.getElementById("episodes");

    container.innerHTML = "";

    currentEpisodes.forEach(ep => {

        const epKey =
            `${serieId}-S${currentS}E${ep.episode_number}`;

        const watched =
            userProgress.watched.includes(epKey);

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `
            <img src="https://image.tmdb.org/t/p/w300${ep.still_path}">

            ${watched ? `<div class="watched-tag">VU</div>` : ""}

            <div class="progress-bar"
                 style="width:${watched ? "100%" : "0%"}">
            </div>

            <div style="padding:10px;">
                <b>E${ep.episode_number}</b>
                - ${ep.name}
            </div>
        `;

        card.onclick = () => {

            openVideo(
                currentS,
                ep.episode_number,
                ep.name,
                ep.still_path
            );

        };

        container.appendChild(card);

    });

}

/* VIDEO */

const videasSources = {
    1:{
        1:"https://app.videas.fr/embed/media/9be0c38d-cc48-406b-9c77-97926b985b98/"
    }
};

window.openVideo = async (s,e,title,img) => {

    const url = videasSources[s]?.[e];

    if(!url) return;

    document.getElementById("video-overlay").style.display =
        "flex";

    document.getElementById("video-iframe").src =
        url;

    await saveProgress(s,e,title,img);

};

window.closeVideo = () => {

    document.getElementById("video-overlay").style.display =
        "none";

    document.getElementById("video-iframe").src = "";

};

/* SAVE PROGRESS */

async function saveProgress(s,e,title,img){

    const user = auth.currentUser;

    if(!user) return;

    const epKey = `${serieId}-S${s}E${e}`;

    if(!userProgress.watched.includes(epKey)){

        userProgress.watched.push(epKey);

    }

    userProgress.lastBySerie[serieId] = {
        s,
        e,
        title,
        img,
        serieName:"Medicopter 117",
        link:"medicopter.html",
        timestamp:Date.now()
    };

    await setDoc(
        doc(db,"users",user.uid),
        {
            progress:userProgress
        },
        { merge:true }
    );

    renderEpisodes();

    checkResume();
}

/* REPRENDRE */

function checkResume(){

    const last =
        userProgress.lastBySerie?.[serieId];

    if(!last) return;

    const btn =
        document.getElementById("resumeBtn");

    btn.style.display = "inline-flex";

    btn.innerText =
        `▶ Reprendre S${last.s}E${last.e}`;

    btn.onclick = () => {

        openVideo(
            last.s,
            last.e,
            last.title,
            last.img
        );

    };
}

/* MENU SAISON */

document.getElementById("seasonBtn").onclick = () => {

    document.getElementById("seasonMenu")
        .classList.toggle("show");

};

</script>

</body>
</html>
