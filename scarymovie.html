<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scary Movie - YAMONFILM</title>
    <style>
        *{ box-sizing:border-box; margin:0; padding:0; font-family:Arial, sans-serif; }
        body{ background:#141414; color:white; overflow-x: hidden; padding-bottom: 50px; }

        /* NAVBAR & SIDE MENU */
        .navbar{
            position:fixed; top:0; left:0; width:100%; height:60px;
            display:flex; justify-content:space-between; align-items:center;
            padding:0 20px; background:rgba(0,0,0,0.95); z-index:1000;
            border-bottom: 1px solid #222;
        }
        .logo{ color:#e50914; font-size:28px; font-weight:bold; text-decoration:none; }
        .menu-btn{ font-size:28px; cursor:pointer; z-index: 2100; }

        .overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); opacity:0; pointer-events:none; transition:0.3s; z-index:1500; }
        .overlay.show{ opacity:1; pointer-events:auto; }
        .side-menu{ position:fixed; top:0; right:-100%; width:300px; height:100%; background:#111; padding:80px 20px 20px; display:flex; flex-direction:column; gap:15px; transition:0.3s; z-index:2000; border-left: 1px solid #333;}
        .side-menu.open{ right:0; }
        .side-menu a, .side-menu button{ color:white; text-decoration:none; background:none; border:none; font-size:18px; padding:10px 0; cursor:pointer; text-align:left; border-bottom: 1px solid #222;}

        .menu-nav-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .menu-nav-row a { border-bottom: none; }
        .see-all-link { font-size: 13px !important; color: #e50914 !important; font-weight: bold; }

        /* HERO & CONTENT */
        .container { margin-top: 80px; padding: 0 5%; max-width: 1200px; margin-left: auto; margin-right: auto; }
        
        .movie-header {
            display: flex; gap: 30px; margin-bottom: 30px; flex-wrap: wrap;
        }
        .poster {
            width: 250px; height: 375px; object-fit: cover; border-radius: 8px; border: 1px solid #333; flex-shrink: 0;
        }
        .movie-details { flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 15px; }
        .movie-title { font-size: 2.5rem; font-weight: bold; color: white; }
        .badge-free { display: inline-block; background: #00ff00; color: #000; font-weight: bold; padding: 4px 10px; border-radius: 4px; font-size: 14px; width: fit-content; }
        .description { color: #ccc; line-height: 1.6; font-size: 15px; }

        /* PLAYER SECTION */
        .player-container {
            width: 100%; background: #000; border-radius: 8px; overflow: hidden;
            border: 1px solid #222; aspect-ratio: 16/9; position: relative; margin-top: 20px;
        }
        .player-container iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="index.html" class="logo">YAMONFILM</a>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="menu">
    <a href="account.html">Mon compte</a>
    
    <div class="menu-nav-row">
        <a href="series.html">Mes séries</a>
        <a href="serie.html" class="see-all-link">Voir tout ›</a>
    </div>

    <div class="menu-nav-row">
        <a href="films.html">Mes films</a>
        <a href="film.html" class="see-all-link">Voir tout ›</a>
    </div>

    <button id="logoutBtn" style="margin-top: auto; color: #e50914; text-align: left; padding: 10px 0;">Déconnexion</button>
</div>

<div class="container">
    <div class="movie-header">
        <img class="poster" src="https://www.themoviedb.org/t/p/w1280/gIComZ1TfZdWmuD4L4mJ8sEv0km.jpg" alt="Scary Movie">
        <div class="movie-details">
            <h1 class="movie-title">Scary Movie</h1>
            <span class="badge-free">Gratuit</span>
            <p class="description">
                Le grand retour de la franchise parodique culte. Préparez-vous à revoir vos films d'horreur préférés détournés avec un humour décapant et sans filtre.
            </p>
        </div>
    </div>

    <h2>Regarder le film</h2>
    <div class="player-container">
        <!-- Remplacez le lien src par votre lien d'intégration vidéo (embed) -->
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE", authDomain: "yamonfilm-fead8.firebaseapp.com", projectId: "yamonfilm-fead8" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.toggleMenu = () => {
        document.getElementById("menu").classList.toggle("open");
        document.getElementById("overlay").classList.toggle("show");
    };

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "login.html";
        }
    });

    document.getElementById("logoutBtn").onclick = () => {
        signOut(auth).then(() => { window.location.href = "login.html"; });
    };
</script>
</body>
</html>
