<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes séries</title>

<style>
body{
  background:#141414;
  color:white;
  font-family:Arial;
}

header{
  padding:15px;
  background:black;
  color:#e50914;
  font-weight:bold;
}

.container{
  padding:80px 20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

.card{
  background:#1c1c1c;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card p{
  padding:10px;
}

.empty{
  opacity:0.6;
}
</style>
</head>

<body>

<header>YAMONFILM - MES SÉRIES</header>

<div class="container">
  <div class="grid" id="grid"></div>
  <p class="empty" id="empty">Aucune série débloquée</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
});

const auth = getAuth(app);
const db = getFirestore(app);

const grid = document.getElementById("grid");
const empty = document.getElementById("empty");

const series = {
  MEDICOPTER:{
    title:"Medicopter 117",
    img:"s-l1200.jpg",
    link:"medicopter.html"
  }
};

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href="login.html";
    return;
  }

  const snap = await getDoc(doc(db,"users",user.uid));

  const data = snap.exists() ? snap.data() : {};
  const unlocked = data.seriesUnlocked || [];

  load(unlocked);
});

function load(unlocked){

  grid.innerHTML="";

  if(unlocked.length === 0){
    empty.style.display="block";
    return;
  }

  empty.style.display="none";

  unlocked.forEach(code=>{
    const s = series[code];
    if(!s) return;

    const card = document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${s.img}">
      <p>${s.title}</p>
    `;

    card.onclick=()=>{
      window.location.href=s.link;
    };

    grid.appendChild(card);
  });
}
</script>

</body>
</html>
