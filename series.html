<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes séries - YAMONFILM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#141414;
  color:white;
}

header{
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#000;
  position:sticky;
  top:0;
}

h1{
  font-size:20px;
  color:#e50914;
}

.back{
  color:white;
  text-decoration:none;
  font-size:14px;
  opacity:0.8;
}

.movies{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
}

.movie{
  height:180px;
  border-radius:8px;
  background-size:cover;
  display:flex;
  align-items:flex-end;
  padding:10px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  background-color:#222;
  transition:0.2s;
}

.movie:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<header>
  <h1>Mes séries</h1>
  <a class="back" href="index.html">⬅ Retour</a>
</header>

<section class="movies" id="seriesContainer">
  <!-- séries ici -->
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
});

const auth = getAuth(app);
const db = getFirestore(app);

const container = document.getElementById("seriesContainer");

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const snap = await getDoc(doc(db, "users", user.uid));

  if (!snap.exists()) {
    container.innerHTML = "<p>Aucune série débloquée</p>";
    return;
  }

  const data = snap.data();
  const series = data.seriesUnlocked || [];

  renderSeries(series);
});

function renderSeries(series){

  container.innerHTML = "";

  // 🎬 MEDICOPTER
  if(series.includes("MEDICOPTER")){
    container.innerHTML += `
      <a href="vipmedicopter.html" class="movie"
         style="background-image:url('s-l1200.jpg')">
        Medicopter VIP
      </a>
    `;
  }

  // ➕ AJOUTE D’AUTRES SERIES ICI PLUS TARD
}
</script>

</body>
</html>
