<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Clown - YAMONFILM</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
padding:15px 40px;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
color:#e50914;
text-decoration:none;
}

/* LECTEUR VIDEO (MODAL) */
#video-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: black;
    z-index: 3000;
    justify-content: center;
    align-items: center;
}
#video-overlay iframe {
    width: 100%;
    height: 100%;
    border: none;
}
.close-video {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 40px;
    color: white;
    cursor: pointer;
    z-index: 3001;
    text-shadow: 0 0 10px black;
}

/* HERO */
.hero{
margin-top:0;
height:80vh;
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:80px;
position:relative;
}

.hero::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:60%;
background:linear-gradient(to top,#0f0f0f,transparent);
}

.hero-content{
position:relative;
z-index:2;
max-width:600px;
}

.hero h1{
font-size:55px;
margin-bottom:15px;
}

.meta{
color:#ccc;
margin-bottom:15px;
}

/* SAISON */
.season-section{
padding:40px 80px 20px;
}

.btn-main{
display:inline-block;
background:#e50914;
color:white;
text-decoration:none;
padding:12px 25px;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
border:none;
}

.season-dropdown{
position:relative;
display:inline-block;
}

.season-menu{
position:absolute;
background:#1c1c1c;
border-radius:8px;
margin-top:10px;
display:none;
overflow-y:auto;
max-height: 300px;
width: 150px;
z-index: 100;
}

.season-menu div{
padding:12px 20px;
cursor:pointer;
}

.season-menu div:hover{
background:#e50914;
}

.show{display:block}

/* EPISODES */
.episodes{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:20px 80px 80px;
}

.card{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.3s;
border: 1px solid transparent;
}

.card:hover{
transform:scale(1.05);
border-color: #e50914;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.badge{
font-size:12px;
background:#e50914;
padding:4px 8px;
border-radius:5px;
}

@media(max-width:768px){
.hero{padding:40px}
.episodes, .season-section{padding:20px}
}
</style>
</head>
<body>

<header>
<a href="index.html" class="logo">YAMONFILM</a>
</header>

<div id="video-overlay">
    <span class="close-video" onclick="closeVideo()">&times;</span>
    <iframe id="video-iframe" src="" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin allow-top-navigation"></iframe>
</div>

<section class="hero" id="hero">
<div class="hero-content">
<h1 id="title">Chargement...</h1>
<p class="meta" id="meta"></p>
<p id="overview"></p>
</div>
</section>

<div class="season-section">
    <h3>Saisons</h3>
    <div class="season-dropdown">
        <button class="btn-main" id="seasonBtn">Saison 1 ▼</button>
        <div class="season-menu" id="seasonMenu"></div>
    </div>
</div>

<div class="episodes" id="episodes"></div>

<script>
const apiKey="182c7173698e34803715eacab5c693a7";
const seriesId=16678; // ID du Clown
const imgBase="https://image.tmdb.org/t/p/original";

const hero=document.getElementById("hero");
const title=document.getElementById("title");
const meta=document.getElementById("meta");
const overview=document.getElementById("overview");
const seasonMenu=document.getElementById("seasonMenu");
const seasonBtn=document.getElementById("seasonBtn");
const episodesContainer=document.getElementById("episodes");
const videoOverlay=document.getElementById("video-overlay");
const videoIframe=document.getElementById("video-iframe");

/* FONCTIONS LECTEUR */
function openVideo(s, e) {
    // On génère le lien automatique vidsrc (S=Saison, E=Episode)
    const url = `https://vidsrc.me/embed/tv?tmdb=${seriesId}&season=${s}&episode=${e}`;
    videoIframe.src = url;
    videoOverlay.style.display = "flex";
    document.body.style.overflow = "hidden"; // Stop scroll
}

function closeVideo() {
    videoOverlay.style.display = "none";
    videoIframe.src = "";
    document.body.style.overflow = "auto";
}

/* Charger infos série */
async function loadSeries(){
const res=await fetch(`https://api.themoviedb.org/3/tv/${seriesId}?api_key=${apiKey}&language=fr-FR`);
const data=await res.json();

title.textContent=data.name;
meta.textContent=`⭐ ${data.vote_average} • ${data.first_air_date} • ${data.number_of_seasons} saisons`;
overview.textContent=data.overview;
hero.style.backgroundImage=`url(${imgBase}${data.backdrop_path})`;

loadSeasons(data.number_of_seasons);
}

/* Charger menu saisons */
function loadSeasons(total){
seasonMenu.innerHTML="";
for(let i=1;i<=total;i++){
    const div=document.createElement("div");
    div.textContent="Saison "+i;
    div.onclick=()=>{
        seasonBtn.innerHTML="Saison "+i+" ▼";
        seasonMenu.classList.remove("show");
        loadEpisodes(i);
    };
    seasonMenu.appendChild(div);
}
loadEpisodes(1);
}

/* Charger épisodes dynamiques */
async function loadEpisodes(seasonNumber){
episodesContainer.innerHTML="<p>Chargement des épisodes...</p>";
const res=await fetch(`https://api.themoviedb.org/3/tv/${seriesId}/season/${seasonNumber}?api_key=${apiKey}&language=fr-FR`);
const data=await res.json();

episodesContainer.innerHTML="";

data.episodes.forEach(ep=>{
    let imageUrl=ep.still_path?imgBase+ep.still_path: "https://via.placeholder.com/500x281?text=Episode";

    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
        <img src="${imageUrl}">
        <div class="card-content">
            <span class="badge">S${seasonNumber} - E${ep.episode_number}</span>
            <h4>${ep.name}</h4>
        </div>
    `;

    // AU CLIC : On ouvre le lecteur automatique
    card.onclick=()=> openVideo(seasonNumber, ep.episode_number);

    episodesContainer.appendChild(card);
});
}

seasonBtn.onclick=()=>{seasonMenu.classList.toggle("show");}

loadSeries();
</script>

</body>
</html>
