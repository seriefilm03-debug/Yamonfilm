<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion</title>

<style>
body{
  background:#141414;color:white;
  display:flex;justify-content:center;align-items:center;
  height:100vh;font-family:Arial;
}
.box{
  background:#222;padding:30px;border-radius:10px;
  display:flex;flex-direction:column;gap:15px;width:300px;
}
input{padding:10px;border:none;border-radius:5px;}
button{padding:10px;background:#e50914;color:white;border:none;border-radius:5px;cursor:pointer;}
</style>
</head>

<body>

<div class="box">
  <h2>Connexion</h2>
  <input type="email" id="email">
  <input type="password" id="password">
  <button onclick="login()">Se connecter</button>
  <p id="msg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
});

const auth = getAuth(app);

window.login = ()=>{
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  signInWithEmailAndPassword(auth, email, password)
  .then(()=>{
    window.location.href="index.html";
  })
  .catch(err=>{
    document.getElementById("msg").innerText = err.message;
  });
};
</script>

</body>
</html>
