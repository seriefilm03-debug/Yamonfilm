<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YAMONFILM - Accès</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color:white;
  overflow:hidden;
}

/* animation fond */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(45deg,#e50914,#000,#141414,#e50914);
  animation:moveBg 10s infinite linear;
  opacity:0.15;
}

@keyframes moveBg{
  0%{transform:translate(0,0);}
  50%{transform:translate(-25%,-25%);}
  100%{transform:translate(0,0);}
}

/* BOX PRINCIPALE */
.container{
  position:relative;
  width:100%;
  max-width:420px;
  padding:20px;
}

/* carte */
.card{
  background:rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  border-radius:15px;
  padding:40px;
  box-shadow:0 0 25px rgba(229,9,20,0.4);
}

/* titre */
h1{
  text-align:center;
  margin-bottom:20px;
  color:#e50914;
  letter-spacing:2px;
}

/* onglets */
.tabs{
  display:flex;
  margin-bottom:20px;
  border-radius:10px;
  overflow:hidden;
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  cursor:pointer;
  background:#111;
  transition:0.3s;
}

.tab.active{
  background:#e50914;
}

/* inputs */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
  outline:none;
}

input:focus{
  border:1px solid #e50914;
}

/* boutons */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#e50914;
  color:white;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
  background:#ff1b2d;
}

/* erreur */
#error{
  color:#ff4d4d;
  margin-top:10px;
  text-align:center;
  font-size:14px;
}

/* responsive TV / PC / mobile */
@media (min-width: 1600px){
  .container{
    transform:scale(1.3);
  }
}

@media (max-width: 500px){
  .card{
    padding:25px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>YAMONFILM</h1>

    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="showLogin()">Connexion</div>
      <div class="tab" id="tabRegister" onclick="showRegister()">Inscription</div>
    </div>

    <!-- LOGIN -->
    <div id="loginBox">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Mot de passe">
      <button onclick="login()">Se connecter</button>
    </div>

    <!-- REGISTER -->
    <div id="registerBox" style="display:none;">
      <input type="email" id="registerEmail" placeholder="Email">
      <input type="password" id="registerPassword" placeholder="Mot de passe">
      <button onclick="register()">S'inscrire</button>
    </div>

    <p id="error"></p>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LOGIN */
window.login = () => {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "index.html";
    })
    .catch(err => {
      document.getElementById("error").innerText = err.message;
    });
};

/* REGISTER */
window.register = () => {
  const email = document.getElementById("registerEmail").value;
  const password = document.getElementById("registerPassword").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "index.html";
    })
    .catch(err => {
      document.getElementById("error").innerText = err.message;
    });
};

/* SWITCH UI */
window.showLogin = () => {
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("registerBox").style.display = "none";

  document.getElementById("tabLogin").classList.add("active");
  document.getElementById("tabRegister").classList.remove("active");
};

window.showRegister = () => {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("registerBox").style.display = "block";

  document.getElementById("tabRegister").classList.add("active");
  document.getElementById("tabLogin").classList.remove("active");
};
</script>

</body>
</html>
