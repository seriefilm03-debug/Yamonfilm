- tmdbId = 586
- serieId = SERIE586
- vidéo S1E1 changée
- FIX auth (pas de boucle login)
-->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
 authDomain: "yamonfilm-fead8.firebaseapp.com",
 projectId: "yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ✅ MODIFS */
const tmdbId = 586;
const apiKey = "182c7173698e34803715eacab5c693a7";
const serieId = "SERIE586";

/* état utilisateur */
let userProgress = { watched: [], lastBySerie: {} };
let currentS = 1;

/* 🎬 TA VIDÉO */
const videasSources = {
    1: {
        1: "https://app.videas.fr/embed/media/da8697ea-9c6e-4056-ba3b-0ef81ad8552f/"
    }
};

/* 🔐 FIX AUTH (IMPORTANT) */
let authReady = false;

onAuthStateChanged(auth, async (user) => {
    if (user) {
        authReady = true;

        const userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);

        if (snap.exists() && snap.data().progress) {
            userProgress = snap.data().progress;
        }

        loadSeries();
    } else {
        setTimeout(() => {
            if (!auth.currentUser && !authReady) {
                window.location.href = "login.html";
            }
        }, 2000);
    }
});

/* 🔓 logout */
document.getElementById("logoutBtn").onclick = () => {
    signOut(auth).then(() => {
        window.location.href = "login.html";
    });
};

/* 📺 charger série */
async function loadSeries() {
    const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}?api_key=${apiKey}&language=fr-FR`);
    const data = await res.json();

    document.getElementById("title").innerText = data.name;
    document.getElementById("overview").innerText = data.overview;

    loadEpisodes();
}

/* 📺 charger épisodes */
async function loadEpisodes() {
    const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/1?api_key=${apiKey}&language=fr-FR`);
    const data = await res.json();

    const container = document.getElementById("episodes");
    container.innerHTML = "";

    data.episodes.forEach(ep => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<div style="padding:10px;"><b style="color:#e50914;">E${ep.episode_number}</b> - ${ep.name}</div>`;

        if (ep.episode_number === 1) {
            div.onclick = () => openVideo(1, 1, ep.name);
        } else {
            div.onclick = showPopup;
        }

        container.appendChild(div);
    });
}

/* ▶️ ouvrir vidéo */
function openVideo(s, e, title) {
    document.getElementById("video-iframe").src = videasSources[s][e];
    document.getElementById("video-overlay").style.display = "flex";
    saveProgress(s, e, title);
}

/* 💾 sauvegarde progression */
async function saveProgress(s, e, title) {
    const user = auth.currentUser;
    if (!user) return;

    const key = `${serieId}-S${s}E${e}`;

    if (!userProgress.watched.includes(key)) {
        userProgress.watched.push(key);
    }

    userProgress.lastBySerie[serieId] = { s, e, title };

    await setDoc(doc(db, "users", user.uid), {
        progress: userProgress
    }, { merge: true });
}

/* ❌ fermer vidéo */
function closeVideo() {
    document.getElementById("video-overlay").style.display = "none";
    document.getElementById("video-iframe").src = "";
}

/* 🔒 popup */
function showPopup() {
    document.getElementById("popupMessage").classList.add("show");
}
function closePopup() {
    document.getElementById("popupMessage").classList.remove("show");
}

window.toggleMenu = () => {
    document.getElementById("menu").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
};
</script>
