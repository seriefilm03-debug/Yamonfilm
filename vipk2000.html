<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Rebelle - YAMONFILM</title>
    <style>
        /* --- STYLE GLOBAL --- */
        *{ box-sizing:border-box; margin:0; padding:0; font-family:Arial, sans-serif; }
        body{ background:#0f0f0f; color:white; overflow-x: hidden; }

        /* NAV & MENU */
        .navbar{
            position:fixed; top:0; left:0; width:100%; height:60px;
            display:flex; justify-content:space-between; align-items:center;
            padding:0 20px; background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index:1000;
        }
        .logo{ color:#e50914; font-size:28px; font-weight:bold; text-decoration:none; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .menu-btn{ font-size:28px; cursor:pointer; z-index: 2100; }

        /* OVERLAY & SIDE MENU */
        .overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); opacity:0; pointer-events:none; transition:0.3s; z-index:1500; }
        .overlay.show{ opacity:1; pointer-events:auto; }
        .side-menu{ position:fixed; top:0; right:-100%; width:300px; height:100%; background:#111; padding:80px 20px 20px; display:flex; flex-direction:column; gap:15px; transition:0.3s; z-index:2000; border-left: 1px solid #333;}
        .side-menu.open{ right:0; }
        .side-menu a, .side-menu button{ color:white; text-decoration:none; background:none; border:none; font-size:18px; padding:10px 0; cursor:pointer; text-align:left; border-bottom: 1px solid #222;}

        /* STYLE BARRE DROITE PROMO */
        .promo-section { margin-top: 10px; padding: 10px 0; border-bottom: 1px solid #222; }
        .promo-input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; margin-top: 10px; font-size: 14px; }
        .activate-btn { background: #e50914; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; margin-top: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }

        /* --- LECTEUR VIDEO --- */
        #video-overlay { display: none; position: fixed; inset: 0; background: black; z-index: 3000; flex-direction: column; justify-content: center; align-items: center; }
        #video-overlay iframe { width: 100%; height: 90%; border: none; }
        .close-video { position: absolute; top: 15px; right: 25px; font-size: 35px; color: white; cursor: pointer; }

        /* --- HERO & EPISODES --- */
        .hero{ height:65vh; background-size:cover; background-position:center; display:flex; align-items:flex-end; padding:40px 5%; position:relative; }
        .hero::after{ content:""; position:absolute; inset:0; background:linear-gradient(to top,#0f0f0f, transparent 50%), linear-gradient(to right, #0f0f0f, transparent); }
        .hero-content{ position:relative; z-index:2; max-width:700px; }
        
        .episodes{ display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; padding:20px 5%; }
        .card{ background:#1c1c1c; border-radius:8px; overflow:hidden; cursor:pointer; position: relative; transition: 0.3s; border: 1px solid #333;}
        .card:hover{ transform: scale(1.05); border-color: #e50914; }
        .card img{ width:100%; height:140px; object-fit:cover; }
        
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: #e50914; width: 0%; transition: 0.3s; }
        .watched-tag { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); color: #00ff00; font-size: 10px; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        
        .btn-main{ background:#e50914; color:white; padding:12px 25px; border-radius:5px; font-weight:bold; cursor:pointer; border:none; margin-top:10px; display: inline-flex; align-items: center; transition: 0.2s; }
        .btn-main:hover { transform: scale(1.02); opacity: 0.9; }
        
        .season-menu{ background:#1c1c1c; border:1px solid #333; position:absolute; display:none; z-index:10; border-radius: 5px; }
        .season-menu div{ padding:12px 20px; cursor:pointer; border-bottom: 1px solid #222; }
        .show{ display:block; }

        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; margin-top: 15px; }

        /* --- POPUP / MODAL DEBLOCAGE --- */
        .unlock-modal {
            display: none; position: fixed; inset: 0; 
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            z-index: 4000; align-items: center; justify-content: center; padding: 20px;
        }
        .unlock-modal-content {
            background: #181818; border: 1px solid #333; border-radius: 10px;
            max-width: 450px; width: 100%; padding: 30px; text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }
        .unlock-modal-content h2 { font-size: 24px; margin-bottom: 15px; color: #fff; }
        .unlock-modal-content p { color: #aaa; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .unlock-modal-content .btn-main { width: 100%; justify-content: center; padding: 14px; font-size: 16px; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="index.html" class="logo">YAMONFILM</a>
    <div class="nav-right">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="menu">
    <a href="account.html">Mon compte</a>
    <a href="series.html">Mes séries</a>
    
    <div class="promo-section">
        <span style="color: #666; font-size: 12px;">ACTIVER UN CODE</span>
        <input type="text" id="promoCode" class="promo-input" placeholder="Entrez votre code...">
        <button id="activateBtnMenu" class="activate-btn">Activer</button>
        <p id="promoMsgMenu" style="font-size: 11px; margin-top: 5px; text-align: center;"></p>
    </div>

    <button id="logoutBtn" style="margin-top: auto; color: #e50914; text-align: left; padding: 10px 0;">Déconnexion</button>
</div>

<div id="unlockModal" class="unlock-modal">
    <div class="unlock-modal-content">
        <h2>Série Verrouillée 🔒</h2>
        <p>Cette série fait partie de la Zone VIP. Clique sur le bouton ci-dessous pour la débloquer instantanément et l'ajouter à ta bibliothèque.</p>
        <button id="unlockBtn" class="btn-main">🔓 Débloquer la série VIP</button>
        <p id="unlockMsg" style="font-size: 14px; margin-top: 15px; font-weight: bold;"></p>
    </div>
</div>

<div id="video-overlay">
    <span class="close-video" onclick="closeVideo()">&times;</span>
    <iframe id="video-iframe" src="" allowfullscreen></iframe>
</div>

<section class="hero" id="hero">
    <div class="hero-content">
        <h1 id="title" style="font-size: 3rem; margin-bottom: 10px;">Le Rebelle</h1>
        <p id="overview" style="color:#ccc; margin:10px 0; font-size: 1.1rem; line-height: 1.5;"></p>
        
        <div class="btn-group">
            <button id="resumeBtn" class="btn-main" style="display:none; background:white; color:black;">▶ Reprendre l'épisode</button>
        </div>
    </div>
</section>

<div style="padding:20px 5%;">
    <div style="position: relative;">
        <button class="btn-main" id="seasonBtn">Saison 1 ▼</button>
        <div class="season-menu" id="seasonMenu"></div>
    </div>
</div>

<div class="episodes" id="episodes"></div>

        }
    };

    let currentEpisodes = [];
    let currentS = 1;

    window.toggleMenu = () => {
        document.getElementById("menu").classList.toggle("open");
        document.getElementById("overlay").classList.toggle("show");
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                if (userData.progress) {
                    userProgress = userData.progress;
                    if(!userProgress.lastBySerie) userProgress.lastBySerie = {};
                    checkResume();
                }
                
                // POP-UP : Affichage dynamique uniquement si NON DEBLOQUÉ
                if (userData.seriesUnlocked && userData.seriesUnlocked.includes(serieId)) {
                    document.getElementById("unlockModal").style.display = "none";
                } else {
                    document.getElementById("unlockModal").style.display = "flex";
                }
            } else {
                document.getElementById("unlockModal").style.display = "flex";
            }
            loadSeries();
        } else { window.location.href = "login.html"; }
    });

    document.getElementById("logoutBtn").onclick = () => {
        signOut(auth).then(() => { window.location.href = "login.html"; });
    };

    // ACTION DU BOUTON DANS LA POP-UP
    document.getElementById("unlockBtn").onclick = async () => {
        const user = auth.currentUser;
        if (!user) return;
        
        const msg = document.getElementById("unlockMsg");
        const userRef = doc(db, "users", user.uid);
        
        try {
            await updateDoc(userRef, {
                seriesUnlocked: arrayUnion(serieId)
            });

            msg.style.color = "#00ff00";
            msg.innerText = "Série débloquée ! Redirection...";
            document.getElementById("unlockBtn").style.display = "none";
            
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1500);

        } catch (e) { 
            console.error(e);
            try {
                await setDoc(userRef, { seriesUnlocked: [serieId] }, { merge: true });
                msg.style.color = "#00ff00";
                msg.innerText = "Série débloquée ! Redirection...";
                document.getElementById("unlockBtn").style.display = "none";
                setTimeout(() => { window.location.href = "index.html"; }, 1500);
            } catch(err) {
                msg.style.color = "red"; 
                msg.innerText = "Erreur de mise à jour."; 
            }
        }
    };

    document.getElementById("activateBtnMenu").onclick = async () => {
        const code = document.getElementById("promoCode").value.trim().toUpperCase();
        const msg = document.getElementById("promoMsgMenu");
        if (!code || !auth.currentUser) return;
        
        let serieToUnlock = (code === "REBELVIP") ? serieId : "";
        if (!serieToUnlock) { msg.style.color="red"; msg.innerText="Code invalide."; return; }
        
        const userRef = doc(db, "users", auth.currentUser.uid);
        try {
            await updateDoc(userRef, {
                seriesUnlocked: arrayUnion(serieToUnlock)
            });
            msg.style.color="lime"; msg.innerText="Débloqué !";
            setTimeout(() => window.location.href = "index.html", 1000);
        } catch(err) {
            msg.innerText="Erreur ou déjà actif.";
        }
    };

    window.saveProgress = async (s, e, title, img) => {
        const user = auth.currentUser;
        if(!user) return;
        const epKey = `${serieId}-S${s}E${e}`;
        if(!userProgress.watched.includes(epKey)) userProgress.watched.push(epKey);
        userProgress.lastBySerie[serieId] = { 
            s, e, title, img, 
            serieName: "Le Rebelle", 
            link: pageLink,
            timestamp: Date.now() 
        };
        await setDoc(doc(db, "users", user.uid), { progress: userProgress }, { merge: true });
        renderEpisodes();
        checkResume();
    };

    function checkResume() {
        const last = userProgress.lastBySerie[serieId];
        if(last) {
            const btn = document.getElementById("resumeBtn");
            btn.style.display = "inline-flex";
            btn.innerText = `▶ Reprendre S${last.s}E${last.e}`;
            btn.onclick = () => window.openVideo(last.s, last.e, last.title, last.img);
        }
    }

    async function loadSeries() {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}?api_key=${apiKey}&language=fr-FR`);
        const data = await res.json();
        document.getElementById("overview").innerText = data.overview;
        if (data.backdrop_path) {
            document.getElementById("hero").style.backgroundImage = `url(https://image.tmdb.org/t/p/original${data.backdrop_path})`;
        }
        
        const menu = document.getElementById("seasonMenu");
        menu.innerHTML = "";
        for(let i=1; i<=data.number_of_seasons; i++) {
            const d = document.createElement("div"); d.innerText = "Saison "+i;
            d.onclick = () => { currentS = i; document.getElementById("seasonBtn").innerText = "Saison "+i+" ▼"; loadEpisodes(i); menu.classList.remove("show"); };
            menu.appendChild(d);
        }
        loadEpisodes(1);
    }

    async function loadEpisodes(s) {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${s}?api_key=${apiKey}&language=fr-FR`);
        const data = await res.json();
        currentEpisodes = data.episodes || [];
        renderEpisodes();
    }

    function renderEpisodes() {
        const container = document.getElementById("episodes");
        container.innerHTML = "";
        currentEpisodes.forEach(ep => {
            const epKey = `${serieId}-S${currentS}E${ep.episode_number}`;
            const isWatched = userProgress.watched.includes(epKey);
            const card = document.createElement("div");
            card.className = "card";
            const posterSrc = ep.still_path 
                ? `https://image.tmdb.org/t/p/w300${ep.still_path}` 
                : 'https://via.placeholder.com/300x140/222/fff?text=Pas+d%27image';

            card.innerHTML = `
                <img src="${posterSrc}">
                ${isWatched ? '<div class="watched-tag">VU</div>' : ''}
                <div class="progress-bar" style="width: ${isWatched ? '100%' : '0%'}"></div>
                <div style="padding:10px;"><b>E${ep.episode_number}</b> - ${ep.name}</div>
            `;
            card.onclick = () => window.openVideo(currentS, ep.episode_number, ep.name, ep.still_path);
            container.appendChild(card);
        });
    }

    window.openVideo = (s, e, title, img) => {
        const url = videasSources[s] ? videasSources[s][e] : null;
        if(url) {
            document.getElementById("video-iframe").src = url;
            document.getElementById("video-overlay").style.display = "flex";
            window.saveProgress(s, e, title, img);
        } else {
            alert("Lecteur vidéo non configuré pour cet épisode.");
        }
    };

    window.closeVideo = () => { document.getElementById("video-overlay").style.display="none"; document.getElementById("video-iframe").src=""; };
    document.getElementById("seasonBtn").onclick = () => document.getElementById("seasonMenu").classList.toggle("show");
</script>
