<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- =========================
MODIFIER ICI LE NOM DE LA SÉRIE
========================= -->
<title>Medicopter 117 - YAMONFILM</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial,sans-serif;
    background:#0f0f0f;
    color:white;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    width:100%;
    padding:15px 40px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
}

.logo{
    font-size:22px;
    font-weight:bold;
    color:#e50914;
    text-decoration:none;
}

/* HERO */
.hero{
    margin-top:70px;
    height:80vh;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:flex-end;
    padding:80px;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:60%;
    background:linear-gradient(to top,#0f0f0f,transparent);
}

.hero-content{
    position:relative;
    z-index:2;
    max-width:600px;
}

.hero h1{
    font-size:55px;
    margin-bottom:15px;
}

.meta{
    color:#ccc;
    margin-bottom:15px;
}

/* BOUTONS */
.btn-group{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-top:15px;
}

.btn-main{
    display:inline-block;
    background:#e50914;
    color:white;
    text-decoration:none;
    padding:15px 35px;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
    border:none;
}

.btn-main:hover{
    background:#ff2e2e;
}

/* SAISONS */
.season-section{
    padding:40px 80px 20px;
}

.season-dropdown{
    position:relative;
    display:inline-block;
}

.season-menu{
    position:absolute;
    background:#1c1c1c;
    border-radius:8px;
    margin-top:10px;
    display:none;
    overflow:hidden;
}

.season-menu div{
    padding:12px 20px;
    cursor:pointer;
}

.season-menu div:hover{
    background:#e50914;
}

.show{
    display:block;
}

/* ÉPISODES */
.episodes{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    padding:20px 80px 80px;
}

.card{
    background:#1c1c1c;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.badge{
    font-size:12px;
    background:#e50914;
    padding:4px 8px;
    border-radius:5px;
}

/* POPUP */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:2000;
    opacity:0;
    pointer-events:none;
    transition:.3s;
}

.popup.show{
    opacity:1;
    pointer-events:auto;
}

.popup-box{
    background:#1c1c1c;
    padding:30px;
    border-radius:12px;
    text-align:center;
    max-width:400px;
    border:1px solid #e50914;
}

.popup-box p{
    margin-bottom:20px;
}

.popup-box button{
    background:#e50914;
    border:none;
    color:white;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

/* RESPONSIVE */
@media(max-width:768px){

    .hero{
        padding:40px;
        height:70vh;
    }

    .hero h1{
        font-size:32px;
    }

    .episodes{
        padding:20px;
    }

}
</style>
</head>
<body>

<header>
    <a href="index.html" class="logo">YAMONFILM</a>
</header>

<section class="hero" id="hero">
    <div class="hero-content">

        <h1 id="title">Chargement...</h1>

        <p class="meta" id="meta"></p>

        <p id="overview"></p>

        <div class="btn-group">

            <a href="https://buy.stripe.com/3cI14m3LXaxrd2v8KCf3a0g" class="btn-main">
                Regarder la série maintenant
            </a>

            <a href="mes series.html" class="btn-main">
                J’ai déjà payé
            </a>

        </div>

    </div>
</section>

<!-- SAISONS -->
<div class="season-section">

    <div class="season-dropdown">

        <button class="btn-main" id="seasonBtn">
            Saison 1 ▼
        </button>

        <div class="season-menu" id="seasonMenu"></div>

    </div>

</div>

<!-- ÉPISODES -->
<div class="episodes" id="episodes"></div>

<!-- POPUP -->
<div id="popupMessage" class="popup">

    <div class="popup-box">

        <p>
            Pour voir tous les épisodes, veuillez cliquer sur
            <strong>"Regarder la série maintenant"</strong>.
        </p>

        <button onclick="closePopup()">
            Fermer
        </button>

    </div>

</div>

<script>

/* =========================================================
===========================================================
        ZONE ULTRA SIMPLE À MODIFIER
===========================================================
========================================================= */

/*
POUR CHANGER DE SÉRIE :

1. Va sur TMDB
2. Cherche ta série
3. Dans l'URL tu verras un nombre

Exemple :
https://www.themoviedb.org/tv/40996-medicopter-117

Le nombre = 40996
*/

const CONFIG = {

    // ID TMDB DE LA SÉRIE
    serieId : 40996,

    // LIENS DES ÉPISODES
    // FORMAT :
    // saison -> épisode -> lien

    liensEpisodes : {

        1 : {

            1 : "https://app.videas.fr/embed/media/9be0c38d-cc48-406b-9c77-97926b985b98/",

            2 : "https://TON-LIEN-EPISODE-2.com",

            3 : "https://TON-LIEN-EPISODE-3.com"

        },

        2 : {

            1 : "https://TON-LIEN-SAISON2-EP1.com"

        }

    }

};

/* =========================================================
        FIN ZONE SIMPLE À MODIFIER
========================================================= */

const apiKey = "182c7173698e34803715eacab5c693a7";

const imgBase = "https://image.tmdb.org/t/p/original";

const hero = document.getElementById("hero");

const title = document.getElementById("title");

const meta = document.getElementById("meta");

const overview = document.getElementById("overview");

const seasonMenu = document.getElementById("seasonMenu");

const seasonBtn = document.getElementById("seasonBtn");

const episodesContainer = document.getElementById("episodes");

/* POPUP */

function showPopup(){

    document.getElementById("popupMessage").classList.add("show");

}

function closePopup(){

    document.getElementById("popupMessage").classList.remove("show");

}

/* CHARGER LA SÉRIE */

async function loadSeries(){

    const response = await fetch(
        `https://api.themoviedb.org/3/tv/${CONFIG.serieId}?api_key=${apiKey}&language=fr-FR`
    );

    const data = await response.json();

    title.textContent = data.name;

    meta.textContent =
        `⭐ ${data.vote_average} • ${data.first_air_date} • ${data.number_of_seasons} saisons`;

    overview.textContent = data.overview;

    hero.style.backgroundImage =
        `url(${imgBase}${data.backdrop_path})`;

    createSeasons(data.number_of_seasons);

}

/* CRÉER LES SAISONS */

function createSeasons(total){

    seasonMenu.innerHTML = "";

    for(let i = 1; i <= total; i++){

        const div = document.createElement("div");

        div.textContent = "Saison " + i;

        div.onclick = () => {

            seasonBtn.innerHTML = "Saison " + i + " ▼";

            seasonMenu.classList.remove("show");

            loadEpisodes(i);

        };

        seasonMenu.appendChild(div);

    }

    loadEpisodes(1);

}

/* CHARGER LES ÉPISODES */

async function loadEpisodes(season){

    episodesContainer.innerHTML = "";

    const response = await fetch(
        `https://api.themoviedb.org/3/tv/${CONFIG.serieId}/season/${season}?api_key=${apiKey}&language=fr-FR`
    );

    const data = await response.json();

    data.episodes.forEach(ep => {

        let imageUrl =
            ep.still_path
            ? imgBase + ep.still_path
            : "https://via.placeholder.com/500x281?text=Episode";

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `

            <img src="${imageUrl}">

            <div class="card-content">

                <span class="badge">
                    ⭐ ${ep.vote_average || "N/A"}
                </span>

                <h4>
                    ${ep.episode_number}. ${ep.name}
                </h4>

                <small>
                    ${ep.air_date || ""}
                </small>

            </div>

        `;

        /*
        ON CHERCHE SI UN LIEN EXISTE
        */

       const lienEpisode =
    CONFIG.liensEpisodes?.[season]?.[ep.episode_number];

/*
SEUL LE PREMIER ÉPISODE EST GRATUIT
*/

if(season == 1 && ep.episode_number == 1 && lienEpisode){

    // PREMIER ÉPISODE = OUVERT

    card.style.border = "2px solid #e50914";

    card.onclick = () => {

        window.location.href = lienEpisode;

    };

}else{

    // TOUS LES AUTRES = POPUP

    card.onclick = () => {

        showPopup();

    };

}

            // PAS DE LIEN

            card.onclick = () => {

                showPopup();

            };

        }

        episodesContainer.appendChild(card);

    });

}

/* MENU SAISON */

seasonBtn.onclick = () => {

    seasonMenu.classList.toggle("show");

};

/* DÉMARRER */

loadSeries();

</script>

</body>
</html>
