<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAMONFILM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#141414;color:white;display:flex;flex-direction:column;}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0; left:0;
  height:100vh;
  width:220px;
  background:#141414;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
  transition:transform 0.3s ease;
  z-index:1000;
}
.sidebar.collapsed{transform:translateX(-100%);}
.sidebar a{
  color:white;text-decoration:none;padding:10px;border-radius:5px;transition:0.2s;font-weight:bold;
}
.sidebar a:hover{background:#e50914;}

/* TOGGLE BUTTON */
#menuToggle{
  display:none;
  position:fixed;
  top:15px;
  left:15px;
  z-index:1100;
  background:#e50914;color:white;border:none;padding:10px;border-radius:5px;cursor:pointer;
}

/* MAIN CONTENT */
.main{
  margin-left:220px;
  padding-top:70px;
  transition:margin-left 0.3s ease;
}

/* NAVBAR */
.navbar{width:100%;padding:20px 5%;font-size:clamp(18px,3vw,30px);font-weight:bold;color:#e50914;background:linear-gradient(to bottom,rgba(0,0,0,0.9),transparent);position:fixed;z-index:999;top:0;left:0;}

/* HERO */
.hero{
  position:relative;width:100%;height:80vh;display:flex;flex-direction:column;justify-content:center;padding:0 5%;background:linear-gradient(to right, rgba(0,0,0,0.85), rgba(0,0,0,0.3)), url("s-l1200.jpg");background-size:cover;background-position:center;
}
.hero::after{content:"";position:absolute;bottom:0;left:0;width:100%;height:20vh;background:linear-gradient(to top,#141414,transparent);}
.hero h1{font-size:clamp(26px,5vw,70px);z-index:2;color:white;}
.hero p{margin-top:20px;font-size:clamp(14px,2vw,22px);max-width:500px;z-index:2;color:white;}
.play{margin-top:20px;padding:14px 30px;font-size:clamp(14px,2vw,18px);border:none;border-radius:5px;font-weight:bold;cursor:pointer;background:white;color:black;transition:0.3s;}
.play:hover{background:#e50914;color:white;transform:scale(1.05);}

/* CODE BOX */
.codebox{
  position:fixed;top:20px;right:20px;background:rgba(0,0,0,0.7);padding:15px 20px;border-radius:8px;display:flex;align-items:center;gap:10px;z-index:1001;box-shadow:0 0 15px rgba(0,0,0,0.5);
}
.codebox input{padding:8px 12px;border:none;border-radius:5px;background:#222;color:white;outline:none;width:150px;font-size:14px;}
.codebox input::placeholder{color:#aaa;}
.codebox button{padding:8px 15px;background:#e50914;color:white;border:none;border-radius:5px;cursor:pointer;font-weight:bold;font-size:14px;transition:0.2s;}
.codebox button:hover{background:#f40612;}
.codebox p{margin:0;color:#fff;font-size:14px;margin-left:10px;}

/* SECTION FILMS */
.movies{padding:30px 5%;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:20px;}
.movie{height:clamp(200px,30vw,300px);border-radius:8px;display:flex;align-items:flex-end;justify-content:center;text-decoration:none;color:white;font-weight:bold;transition:0.3s;position:relative;overflow:hidden;background-size:cover;background-position:center;}
.movie span{position:absolute;bottom:10px;left:10px;z-index:2;}
.movie::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,0.3);}
.movie:hover{transform:scale(1.05);}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .main{margin-left:0;}
  #menuToggle{display:block;}
}
</style>
</head>

<body>
<!-- MENU TOGGLE -->
<button id="menuToggle">☰ Menu</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">YAMONFILM</div>
  <a href="account.html">Mon compte</a>
  <a href="series.html">Mes séries</a>
  <a href="#" id="logoutBtn">Déconnexion</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">
  <div class="navbar">YAMONFILM</div>

  <!-- CODE BOX -->
  <div class="codebox">
    <input type="text" id="code" placeholder="Entrer le code">
    <button onclick="unlock()">Valider</button>
    <p id="msg"></p>
  </div>

  <!-- HERO -->
  <section class="hero">
    <h1>Medicopter 117</h1>
    <p>Découvrez la série la plus regardée du moment.</p>
    <a id="serieCompleteLink" href="vipmedicopter.html" style="display:none;">
      <button class="play">🔥 Série Complète</button>
    </a>
  </section>

  <!-- SECTION FILMS -->
  <section class="movies">
    <a id="serieCompleteCard" href="vipmedicopter.html" class="movie" style="background-image:url('s-l1200.jpg'); display:none;">
      <span>🔥 Série Complète</span>
    </a>
  </section>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, updateDoc, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const CODE = "MEDICOPTER";

const sidebar = document.getElementById('sidebar');
const toggleBtn = document.getElementById('menuToggle');
toggleBtn.addEventListener('click',()=>{ sidebar.classList.toggle('collapsed'); });

// Vérifie connexion
onAuthStateChanged(auth, (user)=>{
    if(!user){
        alert("Connecte-toi pour accéder !");
        window.location.href="login.html";
    } else { checkAccess(user); }
});

// Déblocage code
window.unlock = async ()=>{
  const input = document.getElementById("code").value.trim();
  const user = auth.currentUser;
  if(!user){ alert("Connecte-toi !"); return; }

  if(input === CODE){
    await updateDoc(doc(db,"users",user.uid), { seriesUnlocked: arrayUnion("MEDICOPTER") });
    document.getElementById("msg").innerText="Code validé 🔥";
    checkAccess(user);
  } else { document.getElementById("msg").innerText="Code invalide ❌"; }
};

async function checkAccess(user){
  const docRef = doc(db,"users",user.uid);
  const docSnap = await getDoc(docRef);
  if(docSnap.exists()){
    const data = docSnap.data();
    if(data.seriesUnlocked && data.seriesUnlocked.includes("MEDICOPTER")){
      document.getElementById("serieCompleteLink").style.display="block";
      document.getElementById("serieCompleteCard").style.display="block";
      document.getElementById("msg").innerText="Série débloquée !";
    }
  }
}

// Déconnexion
document.getElementById("logoutBtn").addEventListener("click",()=>{
  signOut(auth).then(()=>{ window.location.href="login.html"; });
});
</script>
</body>
</html>
