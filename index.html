<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAMONFILM</title>

<style>
:root{
  --bg:#141414;
  --red:#e50914;
  --text:#fff;
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  font-size:clamp(14px, 1.2vw, 18px);
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:clamp(55px, 6vh, 80px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 2vw;
  background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
  z-index:1000;
}

.logo{
  color:var(--red);
  font-size:clamp(18px, 2vw, 32px);
  font-weight:bold;
}

.menu-btn{
  font-size:clamp(24px, 3vw, 40px);
  cursor:pointer;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}
.overlay.show{
  opacity:1;
  pointer-events:auto;
}

/* MENU */
.side-menu{
  position:fixed;
  top:0;
  right:-100%;
  width:min(320px, 85vw);
  height:100%;
  background:#111;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:18px;
  transition:0.3s;
  z-index:2000;
}
.side-menu.open{right:0;}

.side-menu a,
.side-menu button{
  color:white;
  text-decoration:none;
  border:none;
  background:none;
  font-size:clamp(14px, 1.2vw, 18px);
  cursor:pointer;
  padding:10px 0;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:0 6%;
  margin-top:clamp(55px, 6vh, 80px);

  background:
    linear-gradient(to right, rgba(0,0,0,0.85), rgba(0,0,0,0.3)),
    url("s-l1200.jpg");
  background-size:cover;
  background-position:center;
}

.hero h1{
  font-size:clamp(28px, 5vw, 80px);
}

.hero p{
  margin-top:12px;
  font-size:clamp(14px, 2vw, 22px);
  opacity:0.9;
}

/* BUTTON */
.play{
  margin-top:20px;
  padding:clamp(10px,1vw,18px) clamp(18px,2vw,40px);
  border:none;
  border-radius:8px;
  background:white;
  font-weight:bold;
  cursor:pointer;
  font-size:clamp(14px,1.2vw,20px);
  transition:0.2s;
}

.play:hover{
  background:var(--red);
  color:white;
}

/* MOVIES GRID */
.movies{
  padding:30px 5%;
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
  gap:16px;
}

.movie{
  aspect-ratio:2/3;
  background-size:cover;
  background-position:center;
  border-radius:10px;
  display:flex;
  align-items:flex-end;
  padding:10px;
  font-size:clamp(12px,1vw,16px);
  transition:transform 0.2s;
}

.movie:hover{
  transform:scale(1.05);
}

/* HIDDEN */
.hidden{display:none;}

/* ========================= */
/* 📱 MOBILE */
@media(max-width:600px){
  .hero{
    padding:0 4%;
    text-align:left;
  }

  .movies{
    grid-template-columns:repeat(2,1fr);
  }
}

/* ========================= */
/* 📺 TABLET */
@media(min-width:601px) and (max-width:1024px){
  .movies{
    grid-template-columns:repeat(3,1fr);
  }
}

/* ========================= */
/* 🖥️ TV / 4K / LARGE SCREENS */
@media(min-width:1600px){
  body{
    font-size:20px;
  }

  .hero{
    padding:0 10%;
  }

  .movies{
    grid-template-columns:repeat(6,1fr);
    gap:25px;
  }

  .movie{
    border-radius:16px;
  }

  .play{
    font-size:22px;
    padding:18px 40px;
  }
}

/* ULTRA TV 4K+ */
@media(min-width:2500px){
  .movies{
    grid-template-columns:repeat(8,1fr);
  }

  .hero h1{
    font-size:100px;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">YAMONFILM</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="overlay" id="overlay"></div>

<div class="side-menu" id="menu">
  <a href="account.html">Mon compte</a>
  <a href="series.html">Mes séries</a>
  <button id="logoutBtn">Déconnexion</button>

  <input type="text" id="code" placeholder="Code">
  <button onclick="unlock()">Valider</button>
  <p id="msg"></p>
</div>

<section class="hero">

  <div id="normalSection">
    <h1>Medicopter 117</h1>
    <p>Découvrez la série la plus regardée</p>

    <a href="mediopter.html">
      <button class="play">▶ Voir Medicopter</button>
    </a>
  </div>

  <div id="vipSection" class="hidden">
    <h1>Medicopter 🔥</h1>
    <p>Accès débloqué</p>

    <a href="vipmedicopter.html">
      <button class="play">▶ Voir VIP</button>
    </a>
  </div>

</section>

<section class="movies">

  <a id="normalCard" href="medicopter.html" class="movie" style="background-image:url('s-l1200.jpg')">
    <span>Medicopter</span>
  </a>

  <a id="vipCard" href="vipmedicopter.html" class="movie hidden" style="background-image:url('s-l1200.jpg')">
    <span>Série VIP</span>
  </a>

</section>

</body>
</html>
