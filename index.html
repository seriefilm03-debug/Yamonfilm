<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAMONFILM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#141414;color:white;}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
  z-index:1000;
}

.logo{
  color:#e50914;
  font-size:24px;
  font-weight:bold;
}

/* BOUTON MENU */
.menu-btn{
  font-size:24px;
  cursor:pointer;
}

/* MENU DROITE */
.side-menu{
  position:fixed;
  top:0;
  right:-300px;
  width:260px;
  height:100%;
  background:#111;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
  transition:0.3s;
  z-index:2000;
}

.side-menu.open{
  right:0;
}

.side-menu a, .side-menu button{
  color:white;
  text-decoration:none;
  background:none;
  border:none;
  font-size:16px;
  text-align:left;
  cursor:pointer;
}

.side-menu a:hover, .side-menu button:hover{
  color:#e50914;
}

/* CODE BOX DANS MENU */
.codebox{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:20px;
}

.codebox input{
  padding:8px;
  border:none;
  border-radius:5px;
  background:#222;
  color:white;
}

.codebox button{
  padding:8px;
  background:#e50914;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
}

#msg{font-size:12px;}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:0 5%;
  background:
    linear-gradient(to right, rgba(0,0,0,0.85), rgba(0,0,0,0.3)),
    url("s-l1200.jpg");
  background-size:cover;
  margin-top:60px;
}

.hero h1{font-size:clamp(25px,5vw,60px);}
.hero p{margin-top:20px;}

.play{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:5px;
  background:white;
  cursor:pointer;
}

.play:hover{
  background:#e50914;
  color:white;
}

/* FILMS */
.movies{
  padding:30px 5%;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:15px;
}

.movie{
  height:200px;
  background-size:cover;
  border-radius:8px;
  display:flex;
  align-items:flex-end;
  padding:10px;
}

/* RESPONSIVE */
@media(max-width:600px){
  .side-menu{width:100%;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">YAMONFILM</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<!-- MENU DROITE -->
<div class="side-menu" id="menu">
  <a href="account.html">Mon compte</a>
  <a href="series.html">Mes séries</a>
  <button id="logoutBtn">Déconnexion</button>

  <!-- CODE -->
  <div class="codebox">
    <input type="text" id="code" placeholder="Entrer code">
    <button onclick="unlock()">Valider</button>
    <p id="msg"></p>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Medicopter 117</h1>
  <p>Découvrez la série la plus regardée</p>

  <a id="serieCompleteLink" href="vipmedicopter.html" style="display:none;">
    <button class="play">🔥 Série Complète</button>
  </a>
</section>

<!-- FILMS -->
<section class="movies">
  <a id="serieCompleteCard" href="vipmedicopter.html" class="movie" style="background-image:url('s-l1200.jpg'); display:none;">
    <span>🔥 Série Complète</span>
  </a>
</section>

<!-- SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, updateDoc, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
});

const auth = getAuth(app);
const db = getFirestore(app);
const CODE = "MEDICOPTER";

// MENU
window.toggleMenu = ()=>{
  document.getElementById("menu").classList.toggle("open");
};

// AUTH
onAuthStateChanged(auth,(user)=>{
  if(!user){
    window.location.href="login.html";
  } else {
    checkAccess(user);
  }
});

// CODE
window.unlock = async ()=>{
  const input = document.getElementById("code").value;
  const user = auth.currentUser;

  if(input === CODE){
    await updateDoc(doc(db,"users",user.uid), {
      seriesUnlocked: arrayUnion("MEDICOPTER")
    });
    document.getElementById("msg").innerText="OK 🔥";
    checkAccess(user);
  } else {
    document.getElementById("msg").innerText="Erreur ❌";
  }
};

async function checkAccess(user){
  const snap = await getDoc(doc(db,"users",user.uid));
  if(snap.exists()){
    const data = snap.data();
    if(data.seriesUnlocked && data.seriesUnlocked.includes("MEDICOPTER")){
      document.getElementById("serieCompleteLink").style.display="block";
      document.getElementById("serieCompleteCard").style.display="block";
    }
  }
}

// LOGOUT
document.getElementById("logoutBtn").onclick = ()=>{
  signOut(auth).then(()=> window.location.href="login.html");
};
</script>

</body>
</html>
