<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAMONFILM</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
body{ background:#141414; color:white; }

/* BARRE CODE */
#codeBox{
  position:fixed;
  top:15px;
  right:20px;
  display:flex;
  gap:5px;
  z-index:9999;
}

#vipInput{
  padding:8px;
  background:#222;
  border:1px solid #444;
  color:white;
  border-radius:6px;
  outline:none;
  width:150px;
}

#vipBtn{
  padding:8px 10px;
  background:red;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* CARD */
.card{
  display:inline-block;
  width:200px;
  height:120px;
  margin:10px;
  background:#222;
  color:white;
  text-decoration:none;
  padding:10px;
  border-radius:8px;
  border:2px solid transparent;
}

.card.vip{
  border:2px solid red;
}
</style>
</head>

<body>

<!-- CODE VIP -->
<div id="codeBox">
  <input id="vipInput" placeholder="Code VIP">
  <button id="vipBtn">OK</button>
</div>

<h1>🎬 Séries</h1>

<a id="medicCard" href="medicopter.html" class="card">Medicopter 117</a>
<a id="clownCard" href="le clown.html" class="card">Le Clown</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
authDomain: "yamonfilm-fead8.firebaseapp.com",
projectId: "yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userRef;
let unlocked = [];

function updateUI(){
  if (unlocked.includes("MEDICOPTER")) {
    document.getElementById("medicCard").classList.add("vip");
    document.getElementById("medicCard").href = "vipmedicopter.html";
  }

  if (unlocked.includes("LECLOWN")) {
    document.getElementById("clownCard").classList.add("vip");
    document.getElementById("clownCard").href = "vipleclown.html";
  }
}

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  userRef = doc(db, "users", user.uid);

  const snap = await getDoc(userRef);
  if (!snap.exists()) return;

  unlocked = snap.data().seriesUnlocked || [];

  updateUI();
});

/* 🔥 FONCTION CODE */
async function checkCode(){

  const code = document.getElementById("vipInput").value.trim().toUpperCase();

  if (!userRef) return alert("Utilisateur pas chargé");

  const snap = await getDoc(userRef);
  unlocked = snap.data().seriesUnlocked || [];

  if (code === "MEDICOPTER" && !unlocked.includes("MEDICOPTER")) {

    await updateDoc(userRef, {
      seriesUnlocked: arrayUnion("MEDICOPTER")
    });

    unlocked.push("MEDICOPTER");
    alert("🎉 MEDICOPTER débloqué !");
  }

  else if (code === "LECLOWN" && !unlocked.includes("LECLOWN")) {

    await updateDoc(userRef, {
      seriesUnlocked: arrayUnion("LECLOWN")
    });

    unlocked.push("LECLOWN");
    alert("🎉 LE CLOWN débloqué !");
  }

  else {
    alert("❌ Mauvais code ou déjà utilisé");
  }

  document.getElementById("vipInput").value = "";
  updateUI();
}

/* BUTTON */
document.getElementById("vipBtn").addEventListener("click", checkCode);

/* ENTER */
document.getElementById("vipInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") checkCode();
});
</script>

</body>
</html>
