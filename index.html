<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAMONFILM</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
body{ background:#141414; color:white; overflow-x:hidden; }

/* NAV */
.navbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  background:rgba(0,0,0,0.8);
  z-index:1000;
}

.logo{
  color:#e50914;
  font-size:28px;
  font-weight:bold;
  text-decoration:none;
}

.menu-btn{
  font-size:28px;
  cursor:pointer;
}

/* MENU */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  opacity:0;
  pointer-events:none;
  transition:0.3s;
  z-index:1500;
}

.overlay.show{
  opacity:1;
  pointer-events:auto;
}

.side-menu{
  position:fixed;
  top:0;
  right:-100%;
  width:280px;
  height:100%;
  background:#111;
  padding:80px 20px;
  display:flex;
  flex-direction:column;
  gap:15px;
  transition:0.3s;
  z-index:2000;
}

.side-menu.open{
  right:0;
}

.side-menu a,
.side-menu button{
  color:white;
  text-decoration:none;
  background:none;
  border:none;
  font-size:18px;
  padding:10px 0;
  cursor:pointer;
  text-align:left;
  border-bottom:1px solid #222;
}

/* CONTENU */
.container{
  padding:100px 20px;
}

/* SERIES */
.card{
  display:inline-block;
  width:200px;
  height:120px;
  margin:10px;
  border-radius:8px;
  background:#222;
  padding:10px;
  text-decoration:none;
  color:white;
  border:2px solid transparent;
  transition:0.2s;
}

.card:hover{
  background:#333;
}

.card.vip{
  border:2px solid red;
}

/* CODE BOX */
#codeBox{
  position:fixed;
  top:15px;
  right:20px;
  display:flex;
  gap:5px;
  z-index:9999;
}

#vipInput{
  padding:8px;
  background:#222;
  border:1px solid #444;
  color:white;
  border-radius:6px;
  width:150px;
}

#vipBtn{
  padding:8px 10px;
  background:red;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔥 CODE VIP -->
<div id="codeBox">
  <input id="vipInput" placeholder="Code VIP">
  <button id="vipBtn">OK</button>
</div>

<!-- NAV -->
<div class="navbar">
  <a href="index.html" class="logo">YAMONFILM</a>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="side-menu" id="menu">
  <a href="account.html">Mon compte</a>
  <a href="series.html">Mes séries</a>
  <button id="logoutBtn">Déconnexion</button>
</div>

<!-- SERIES -->
<div class="container">
  <h1>🎬 Nos séries</h1>

  <a id="medicCard" href="medicopter.html" class="card">Medicopter 117</a>
  <a id="clownCard" href="le clown.html" class="card">Le Clown</a>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userRef;
let unlocked = [];

/* MENU */
window.toggleMenu = () => {
  document.getElementById("menu").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth).then(() => window.location.href = "login.html");
};

/* UPDATE UI */
function updateUI(){

  if (unlocked.includes("MEDICOPTER")) {
    document.getElementById("medicCard").classList.add("vip");
    document.getElementById("medicCard").href = "vipmedicopter.html";
  }

  if (unlocked.includes("LECLOWN")) {
    document.getElementById("clownCard").classList.add("vip");
    document.getElementById("clownCard").href = "vipleclown.html";
  }
}

/* LOGIN */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  userRef = doc(db, "users", user.uid);

  const snap = await getDoc(userRef);
  if (!snap.exists()) return;

  unlocked = snap.data().seriesUnlocked || [];

  updateUI();
});

/* CODE VIP */
async function checkCode(){

  const code = document.getElementById("vipInput").value.trim().toUpperCase();

  const snap = await getDoc(userRef);
  unlocked = snap.data().seriesUnlocked || [];

  if (code === "MEDICOPTER" && !unlocked.includes("MEDICOPTER")) {

    await updateDoc(userRef, {
      seriesUnlocked: arrayUnion("MEDICOPTER")
    });

    unlocked.push("MEDICOPTER");
    alert("🎉 Medicopter débloqué !");
  }

  else if (code === "LECLOWN" && !unlocked.includes("LECLOWN")) {

    await updateDoc(userRef, {
      seriesUnlocked: arrayUnion("LECLOWN")
    });

    unlocked.push("LECLOWN");
    alert("🎉 Le Clown débloqué !");
  }

  else {
    alert("❌ Code invalide ou déjà utilisé");
  }

  document.getElementById("vipInput").value = "";
  updateUI();
}

/* EVENTS */
document.getElementById("vipBtn").addEventListener("click", checkCode);

document.getElementById("vipInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") checkCode();
});
</script>

</body>
</html>
