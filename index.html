<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>YAMONFILM</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#141414;
    color:white;
}

/* NAVBAR */
.navbar{
    padding:20px;
    color:#e50914;
    font-size:24px;
    font-weight:bold;
}

/* HERO */
.hero{
    height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:40px;
    background:url("s-l1200.jpg") center/cover;
}

.play{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    background:white;
    cursor:pointer;
}

/* FILMS */
.movies{
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:20px;
}

.movie{
    height:200px;
    background-size:cover;
    display:flex;
    align-items:end;
    padding:10px;
}
</style>
</head>

<body>

<div class="navbar">
  YAMONFILM
  <button onclick="logout()" style="float:right;">Déconnexion</button>
</div>

<section class="hero">
  <h1>Medicopter 117</h1>
  <a href="mediopter.html"><button class="play">▶ Lecture</button></a>
</section>

<section class="movies">
  <a href="mediopter.html" class="movie" style="background-image:url('s-l1200.jpg')">Medicopter</a>
  <a href="#" class="movie" style="background-image:url('film2.jpg')">Film 2</a>
</section>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// BLOQUER SI PAS CONNECTÉ
onAuthStateChanged(auth, user => {
  if(!user){
    window.location.href = "login.html";
  }
});

// DÉCONNEXION
window.logout = () => {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>

</body>
</html>
