<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAMONFILM - Streaming Auto</title>

<style>
/* --- TON STYLE D'ORIGINE CONSERVÉ --- */
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:Arial, sans-serif; background:#141414; color:white; overflow-x: hidden; }

.navbar{
    position:fixed; top:0; width:100%; padding:20px 5%;
    font-size:clamp(18px, 3vw, 30px); font-weight:bold; color:#e50914;
    background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); z-index:1000;
}

.hero{
    position:relative; width:100%; height:80vh; display:flex;
    flex-direction:column; justify-content:center; align-items:flex-start;
    padding:0 5%; background: linear-gradient(to right, rgba(0,0,0,0.85), rgba(0,0,0,0.3)), url("s-l1200.jpg");
    background-size: cover; background-position: center;
}

.hero::after{
    content:""; position:absolute; bottom:0; left:0; width:100%; height:20vh;
    background:linear-gradient(to top, #141414, transparent);
}

.hero h1{ font-size:clamp(26px, 5vw, 70px); max-width:700px; z-index:2; }
.hero p{ margin-top:20px; font-size:clamp(14px, 2vw, 22px); max-width:500px; z-index:2; }

/* --- NOUVELLE BARRE DE RECHERCHE --- */
.search-container {
    padding: 30px 5%;
    text-align: center;
    background: #141414;
}

.search-container input {
    padding: 12px 20px;
    width: 300px;
    border-radius: 25px;
    border: 1px solid #333;
    background: #222;
    color: white;
    font-size: 16px;
    outline: none;
}

.search-container button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: #e50914;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-left: 10px;
}

/* --- SECTION FILMS DYNAMIQUE --- */
.movies{
    padding:20px 5%;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
    gap:25px;
}

.movie-card {
    cursor: pointer;
    transition: 0.3s;
    border-radius: 8px;
    overflow: hidden;
    background: #222;
    position: relative;
}

.movie-card:hover { transform: scale(1.08); z-index: 10; }

.movie-card img { width: 100%; height: 270px; object-fit: cover; }

.movie-card .title {
    padding: 10px;
    font-size: 14px;
    text-align: center;
    font-weight: bold;
}

/* --- LECTEUR (MODAL) --- */
#player-modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 2000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#player-modal iframe {
    width: 90%;
    max-width: 900px;
    height: 500px;
    border: 2px solid #333;
}

.close-btn {
    margin-bottom: 20px;
    padding: 10px 20px;
    background: #e50914;
    color: white;
    cursor: pointer;
    font-weight: bold;
    border-radius: 5px;
}

@media(max-width:768px){
    .hero{ align-items:center; text-align:center; }
    .search-container input { width: 70%; }
}
</style>
</head>
<body>

<div class="navbar">YAMONFILM</div>

<section class="hero">
    <h1>Medicopter 117</h1>
    <p>Recherchez n'importe quel film ou série ci-dessous.</p>
</section>

<div class="search-container">
    <input type="text" id="search-input" placeholder="Titre en anglais (ex: Batman)...">
    <button onclick="searchMovies()">Rechercher</button>
</div>

<section class="movies" id="movie-results">
    </section>

<div id="player-modal">
    <div class="close-btn" onclick="closePlayer()">FERMER LE LECTEUR X</div>
    <iframe id="main-player" src="" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin allow-top-navigation"></iframe>
</div>

<script>
const API_KEY = 'ded42c99';

async function searchMovies() {
    const query = document.getElementById('search-input').value;
    if(!query) return;

    const url = `https://www.omdbapi.com/?s=${encodeURIComponent(query)}&apikey=${API_KEY}`;
    const response = await fetch(url);
    const data = await response.json();

    const resultsDiv = document.getElementById('movie-results');
    resultsDiv.innerHTML = '';

    if(data.Search) {
        data.Search.forEach(movie => {
            if(movie.Poster !== "N/A") {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="${movie.Poster}" alt="${movie.Title}">
                    <div class="title">${movie.Title}</div>
                `;
                card.onclick = () => openPlayer(movie.imdbID);
                resultsDiv.appendChild(card);
            }
        });
    } else {
        resultsDiv.innerHTML = "<p>Aucun film trouvé. Essayez un nom en anglais !</p>";
    }
}

function openPlayer(id) {
    const modal = document.getElementById('player-modal');
    const iframe = document.getElementById('main-player');
    // On utilise Vidsrc pour la recherche automatique de lien
    iframe.src = `https://vidsrc.me/embed/movie/${id}`;
    modal.style.display = 'flex';
}

function closePlayer() {
    const modal = document.getElementById('player-modal');
    const iframe = document.getElementById('main-player');
    modal.style.display = 'none';
    iframe.src = ''; // Arrête la vidéo
}

// Recherche avec la touche Entrée
document.getElementById('search-input').addEventListener('keypress', (e) => {
    if(e.key === 'Enter') searchMovies();
});
</script>

</body>
</html>
