<!-- CODE À AJOUTER DANS index.html -->
<div class="codebox">
  <input type="text" id="code" placeholder="Entrer le code">
  <button onclick="unlock()">Valider</button>
  <p id="msg"></p>
</div>

<!-- Lien normal Medicopter (toujours visible) -->
<a id="medicopterLink" href="mediopter.html">
  <button class="play">▶ Medicopter 117</button>
</a>

<!-- Lien VIP Medicopter (caché par défaut) -->
<a id="vipMedicopter" href="vipmedicopter.html" style="display:none;">
  <button class="play">🔥 Medicopter VIP</button>
</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const CODE = "MEDICOPTER";

// Débloquer le code
window.unlock = async () => {
  const input = document.getElementById("code").value.trim();
  const user = auth.currentUser;

  if(!user){
    alert("Connecte-toi !");
    return;
  }

  // Si code correct
  if(input === CODE){
    // Sauvegarder dans Firestore
    await setDoc(doc(db, "users", user.uid), {
      medicopterVIP: true
    }, { merge: true });

    document.getElementById("msg").innerText = "Code validé 🔥";
    checkAccess(user);
  } else {
    document.getElementById("msg").innerText = "Code invalide ❌";
  }
};

// Vérifier accès utilisateur et afficher VIP si débloqué
async function checkAccess(user){
  const docRef = doc(db, "users", user.uid);
  const docSnap = await getDoc(docRef);

  if(docSnap.exists()){
    const data = docSnap.data();
    if(data.medicopterVIP){
      document.getElementById("vipMedicopter").style.display = "block"; // montre VIP
      document.getElementById("msg").innerText = "Accès VIP déjà débloqué !"; // plus besoin de code
    }
  }
}

// Charger état utilisateur au chargement
onAuthStateChanged(auth, (user) => {
  if(user){
    checkAccess(user);
  }
});
</script>
