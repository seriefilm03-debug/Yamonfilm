<!DOCTYPE html>
<html lang="fr">
<head>

<title>YAMONFILM</title>

<style>
body{margin:0;font-family:Arial;background:#141414;color:white;}
.navbar{
  position:fixed;top:0;width:100%;height:60px;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 20px;background:rgba(0,0,0,0.9);
}
.logo{color:#e50914;font-size:22px;font-weight:bold;}
.menu-btn{font-size:25px;cursor:pointer;}

.hero{
  height:100vh;
  display:flex;flex-direction:column;justify-content:center;
  padding:0 5%;
  background:url("s-l1200.jpg") center/cover;
  margin-top:60px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">YAMONFILM</div>
  <div class="menu-btn">☰</div>
</div>

<section class="hero">
  <h1>Bienvenue</h1>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
});

const auth = getAuth(app);

// 🔥 SOLUTION ANTI-BOUCLE
let firstCheck = true;

onAuthStateChanged(auth,(user)=>{
  if(user){
    console.log("Connecté :", user.email);
  } else {
    if(!firstCheck){
      window.location.href="login.html";
    }
  }
  firstCheck = false;
});
</script>

</body>
