<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAMONFILM</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
body{ background:#141414; color:white; overflow-x:hidden; }

/* NAV */
.navbar{
  position:fixed; top:0; left:0; width:100%; height:60px;
  display:flex; justify-content:space-between; align-items:center;
  padding:0 20px;
  background:rgba(0,0,0,0.8);
  z-index:1000;
}

.logo{
  color:#e50914;
  font-size:28px;
  font-weight:bold;
  text-decoration:none;
}

.menu-btn{ font-size:28px; cursor:pointer; }

/* MENU */
.overlay{
  position:fixed; inset:0;
  background:rgba(0,0,0,0.6);
  opacity:0; pointer-events:none;
  transition:0.3s;
  z-index:1500;
}

.overlay.show{ opacity:1; pointer-events:auto; }

.side-menu{
  position:fixed;
  top:0; right:-100%;
  width:280px; height:100%;
  background:#111;
  padding:80px 20px;
  display:flex;
  flex-direction:column;
  gap:15px;
  transition:0.3s;
  z-index:2000;
}

.side-menu.open{ right:0; }

.side-menu a, .side-menu button{
  color:white;
  text-decoration:none;
  background:none;
  border:none;
  font-size:18px;
  padding:10px 0;
  cursor:pointer;
  text-align:left;
  border-bottom:1px solid #222;
}

/* CONTENU */
.container{
  padding:100px 20px;
}

.card{
  display:inline-block;
  width:200px;
  height:120px;
  margin:10px;
  border-radius:8px;
  background:#222;
  padding:10px;
  text-decoration:none;
  color:white;
}
.card:hover{ background:#333; }

/* 🔥 BARRE CODE VIP */
#codeBox{
  position:fixed;
  top:15px;
  right:80px;
  z-index:9999;
}

#vipInput{
  background:#222;
  border:1px solid #444;
  color:white;
  padding:8px 12px;
  border-radius:6px;
  outline:none;
  width:160px;
}

#vipInput:focus{
  border-color:#e50914;
}
</style>
</head>

<body>

<!-- 🔥 BARRE CODE VIP -->
<div id="codeBox">
  <input id="vipInput" type="text" placeholder="Entrer code VIP..." />
</div>

<div class="navbar">
  <a href="index.html" class="logo">YAMONFILM</a>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="side-menu" id="menu">
    <a href="account.html">Mon compte</a>
    <a href="series.html">Mes séries</a>
    <a href="debloquer.html">Activer un code</a>
    <button id="logoutBtn">Déconnexion</button>
</div>

<div class="container">
    <h1>🎬 Nos séries</h1>

    <a id="medicCard" href="#" class="card">Medicopter 117</a>
    <a id="clownCard" href="le clown.html" class="card">Le Clown</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
authDomain: "yamonfilm-fead8.firebaseapp.com",
projectId: "yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* MENU */
window.toggleMenu = () => {
  document.getElementById("menu").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth).then(() => window.location.href = "login.html");
};

/* 🔥 UPDATE UI */
function updateUI(unlocked) {

  const currentPage = window.location.pathname.split("/").pop();

  if (unlocked.includes("MEDICOPTER")) {
    document.getElementById("medicCard").href = "vipmedicopter.html";

    if (currentPage === "medicopter.html") {
      window.location.replace("vipmedicopter.html");
    }
  } else {
    document.getElementById("medicCard").href = "medicopter.html";
  }

  if (unlocked.includes("LECLOWN")) {
    document.getElementById("clownCard").href = "vipleclown.html";

    if (currentPage === "le clown.html") {
      window.location.replace("vipleclown.html");
    }
  }
}

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);

  if (!snap.exists()) return;

  let unlocked = snap.data().seriesUnlocked || [];

  updateUI(unlocked);

  const vipInput = document.getElementById("vipInput");

  /* 🔥 CODE VIP */
  vipInput.addEventListener("keydown", async (e) => {
    if (e.key !== "Enter") return;

    const code = vipInput.value.trim().toUpperCase();

    let changed = false;

    if (code === "MEDICOPTER" && !unlocked.includes("MEDICOPTER")) {
      await updateDoc(userRef, {
        seriesUnlocked: arrayUnion("MEDICOPTER")
      });
      unlocked.push("MEDICOPTER");
      alert("🎉 MEDICOPTER débloqué !");
      changed = true;
    }

    else if (code === "LECLOWN" && !unlocked.includes("LECLOWN")) {
      await updateDoc(userRef, {
        seriesUnlocked: arrayUnion("LECLOWN")
      });
      unlocked.push("LECLOWN");
      alert("🎉 LE CLOWN débloqué !");
      changed = true;
    }

    else {
      alert("❌ Code invalide ou déjà utilisé");
    }

    vipInput.value = "";

    if (changed) {
      updateUI(unlocked);
    }
  });

});
</script>

</body>
</html>
