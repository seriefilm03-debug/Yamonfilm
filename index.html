<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAMONFILM</title>

<style>
/* --- TON STYLE CONSERVÉ --- */
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:Arial, sans-serif; background:#141414; color:white; }

.navbar{
    position:fixed; top:0; width:100%; padding:20px 5%;
    font-size:clamp(18px, 3vw, 30px); font-weight:bold; color:#e50914;
    background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); z-index:1000;
}

.hero{
    position:relative; width:100%; height:80vh; display:flex;
    flex-direction:column; justify-content:center; align-items:flex-start;
    padding:0 5%; background: linear-gradient(to right, rgba(0,0,0,0.85), rgba(0,0,0,0.3)), url("s-l1200.jpg");
    background-size: cover; background-position: center;
}

.hero::after{
    content:""; position:absolute; bottom:0; left:0; width:100%; height:20vh;
    background:linear-gradient(to top, #141414, transparent);
}

.hero h1{ font-size:clamp(26px, 5vw, 70px); max-width:700px; z-index:2; }
.hero p{ margin-top:20px; font-size:clamp(14px, 2vw, 22px); max-width:500px; z-index:2; }

/* --- BARRE DE RECHERCHE DISCRÈTE --- */
.search-bar {
    padding: 20px 5%;
    display: flex;
    gap: 10px;
}
input#search-input {
    flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #333;
    background: #222; color: white; outline: none;
}
button.search-btn {
    padding: 12px 25px; background: #e50914; color: white;
    border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
}

/* --- SECTION FILMS (DYNAMIQUE) --- */
.movies{
    padding:30px 5%;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:20px;
}

.movie {
    height: 250px; border-radius: 8px; display: flex; align-items: flex-end;
    justify-content: center; text-decoration: none; color: white;
    font-weight: bold; transition: 0.3s; position: relative;
    overflow: hidden; background-size: cover; background-position: center;
    cursor: pointer;
}

.movie span { position: absolute; bottom: 10px; left: 10px; z-index: 2; font-size: 14px; text-shadow: 2px 2px 4px black; }
.movie::after { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
.movie:hover { transform: scale(1.05); }

/* --- LECTEUR OVERLAY --- */
#player-modal {
    display: none; position: fixed; inset: 0; background: black;
    z-index: 2000; justify-content: center; align-items: center;
}
.close-player { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; cursor: pointer; z-index: 2001; }
iframe { width: 100%; height: 100%; border: none; }
</style>
</head>

<body>

<div class="navbar">YAMONFILM</div>

<section class="hero">
    <h1>Medicopter 117</h1>
    <p>Recherchez et regardez vos films instantanément.</p>
</section>

<div class="search-bar">
    <input type="text" id="search-input" placeholder="Tapez un film (ex: Batman, Spiderman)...">
    <button class="search-btn" onclick="searchMovies()">RECHERCHER</button>
</div>

<section class="movies" id="movie-list">
    </section>

<div id="player-modal">
    <span class="close-player" onclick="closePlayer()">&times; FERMER</span>
    <iframe id="video-frame" src="" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin allow-top-navigation"></iframe>
</div>

<script>
const MY_KEY = 'ded42c99'; // Ta clé API OMDb

async function searchMovies() {
    const query = document.getElementById('search-input').value;
    if(!query) return;

    const resp = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(query)}&apikey=${MY_KEY}`);
    const data = await resp.json();
    const list = document.getElementById('movie-list');
    list.innerHTML = '';

    if(data.Search) {
        data.Search.forEach(m => {
            if(m.Poster !== "N/A") {
                const item = document.createElement('div');
                item.className = 'movie';
                item.style.backgroundImage = `url('${m.Poster}')`;
                item.innerHTML = `<span>${m.Title}</span>`;
                item.onclick = () => openPlayer(m.imdbID);
                list.appendChild(item);
            }
        });
    }
}

function openPlayer(imdbID) {
    const modal = document.getElementById('player-modal');
    const frame = document.getElementById('video-frame');
    // On utilise Vidsrc.me pour éviter un max de pubs
    frame.src = `https://vidsrc.me/embed/movie/${imdbID}`;
    modal.style.display = 'flex';
}

function closePlayer() {
    const modal = document.getElementById('player-modal');
    const frame = document.getElementById('video-frame');
    modal.style.display = 'none';
    frame.src = ''; 
}

// Touche Entrée pour chercher
document.getElementById('search-input').addEventListener('keypress', (e) => {
    if(e.key === 'Enter') searchMovies();
});

// Charger des films au démarrage (Optionnel)
window.onload = () => {
    document.getElementById('search-input').value = 'Action';
    searchMovies();
};
</script>

</body>
</html>
