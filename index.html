<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAMONFILM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#141414;color:white;overflow-x:hidden;}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
  background:rgba(0,0,0,0.9);
  z-index:1000;
}

.logo{
  color:#e50914;
  font-size:22px;
  font-weight:bold;
}

/* MENU SIMPLE */
.side-menu{
  position:fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#111;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input{
  padding:10px;
  border:none;
  border-radius:5px;
  outline:none;
}

button{
  padding:10px;
  border:none;
  border-radius:5px;
  background:#e50914;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#ff2e2e;
}

/* HERO */
.hero{
  margin-top:80px;
  padding:30px;
}

.play{
  margin-top:15px;
  padding:10px 20px;
  background:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
  border-radius:5px;
}

.play:hover{
  background:#e50914;
  color:white;
}

#msg{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">YAMONFILM</div>
</div>

<div class="side-menu">
  <input type="text" id="code" placeholder="Code série">
  <button onclick="unlock()">Valider</button>
  <p id="msg"></p>
</div>

<section class="hero">
  <h1>Medicopter 117</h1>
  <p>Regarde la série maintenant</p>

  <a href="medicopter.html">
    <button class="play">▶ Voir Medicopter</button>
  </a>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
});

const auth = getAuth(app);
const db = getFirestore(app);

let userGlobal = null;

/* 🔥 AUTH SAFE */
onAuthStateChanged(auth, (user) => {
  userGlobal = user || null;
});

/* 🔥 UNLOCK SAFE */
window.unlock = async () => {

  const input = document.getElementById("code").value.trim().toUpperCase();
  const msg = document.getElementById("msg");

  if (!userGlobal) {
    msg.innerText = "Non connecté ❌";
    return;
  }

  const codes = {
    "MEDICOPTER": "MEDICOPTER"
  };

  if (!codes[input]) {
    msg.innerText = "Code incorrect ❌";
    return;
  }

  try {
    const userRef = doc(db, "users", userGlobal.uid);
    const snap = await getDoc(userRef);

    if (snap.exists()) {
      await updateDoc(userRef, {
        seriesUnlocked: arrayUnion(codes[input])
      });
    } else {
      await setDoc(userRef, {
        seriesUnlocked: [codes[input]]
      });
    }

    msg.innerText = "Débloqué 🔥";

  } catch (error) {
    console.error(error);
    msg.innerText = "Erreur Firebase ❌";
  }
};
</script>

</body>
</html>
