<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>YAMONFILM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#141414;
  color:white;
}

.navbar{
  padding:20px;
  color:#e50914;
  font-size:24px;
  font-weight:bold;
}

button{
  padding:8px 15px;
  background:#e50914;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

.movies{
  padding:20px;
}

.box{
  padding:20px;
}
</style>
</head>

<body>

<div class="navbar">
  YAMONFILM
  <button onclick="logout()" style="float:right;">Déconnexion</button>
</div>

<div class="box">
  <input type="text" id="code" placeholder="Entrer un code">
  <button onclick="unlock()">Débloquer</button>
  <p id="msg"></p>
</div>

<div class="movies">

  <!-- Toujours visible -->
  <a href="mediopter.html">🎬 Medicopter 117</a><br><br>

  <!-- Série verrouillée -->
  <div id="serie1" style="display:none;">
    <a href="serie1.html">🔥 Série VIP</a>
  </div>

  <div id="serie2" style="display:none;">
    <a href="serie2.html">⭐ Série Premium</a>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🎯 CODES
const validCodes = {
  "VIP123": "serie1",
  "FILM2024": "serie2"
};

// 🔓 Débloquer
window.unlock = async () => {
  const code = document.getElementById("code").value;
  const user = auth.currentUser;

  if(!user){
    alert("Connecte-toi !");
    return;
  }

  if(validCodes[code]){
    const serie = validCodes[code];

    await setDoc(doc(db, "users", user.uid), {
      [serie]: true
    }, { merge: true });

    document.getElementById("msg").innerText = "Code validé 🎉";
    checkAccess(user);
  } else {
    document.getElementById("msg").innerText = "Code invalide ❌";
  }
};

// 🔍 Vérifier accès
async function checkAccess(user){
  const docRef = doc(db, "users", user.uid);
  const docSnap = await getDoc(docRef);

  if(docSnap.exists()){
    const data = docSnap.data();

    if(data.serie1){
      document.getElementById("serie1").style.display = "block";
    }

    if(data.serie2){
      document.getElementById("serie2").style.display = "block";
    }
  }
}

// 🔒 Bloquer si pas connecté
onAuthStateChanged(auth, (user) => {
  if(!user){
    window.location.href = "login.html";
  } else {
    checkAccess(user);
  }
});

// 🚪 Déconnexion
window.logout = () => {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>

</body>
</html>
