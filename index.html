<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supercross - YAMONFILM</title>
    <style>
        /* --- STYLE STYLE NETFLIX --- */
        *{ box-sizing:border-box; margin:0; padding:0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body{ background:#141414; color:white; overflow-x:hidden; }
        
        /* NAVBAR */
        header { 
            position: fixed; top: 0; width: 100%; padding: 15px 5%; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .logo { color:#e50914; font-size:24px; font-weight:bold; text-decoration:none; }
        .back-link { color: white; text-decoration: none; font-size: 14px; background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 4px; }

        /* HERO SECTION - CORRECTION IMAGE PC/MOBILE */
        .hero { 
            height: 100vh; width: 100%; 
            background-size: cover; /* Remplit l'écran */
            background-position: center top; /* Garde les visages visibles */
            display: flex; align-items: center; padding: 5%; position: relative; 
        }
        
        /* Ajustement spécial pour PC pour ne pas couper l'image */
        @media (min-width: 1024px) {
            .hero { 
                background-size: 100% auto; /* Affiche toute la largeur sur PC */
                background-position: center center;
            }
        }

        .hero::after { 
            content: ""; position: absolute; inset: 0; 
            background: linear-gradient(to top, #141414 10%, transparent 90%), 
                        linear-gradient(to right, #141414 20%, transparent); 
        }

        .hero-content { position: relative; z-index: 10; max-width: 800px; }
        .hero h1 { font-size: clamp(40px, 8vw, 80px); margin-bottom: 15px; font-weight: bold; }
        .hero p { color: #ccc; line-height: 1.4; font-size: 18px; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        /* BOUTON LECTURE */
        .play-btn { 
            display: inline-flex; align-items: center; background: white; color: black; 
            text-decoration: none; padding: 15px 40px; border-radius: 4px; font-weight: bold; 
            font-size: 20px; transition: 0.3s; border: none; cursor: pointer;
        }
        .play-btn:hover { background: #e50914; color: white; transform: scale(1.05); }

        /* LECTEUR PLEIN ÉCRAN (OVERLAY) */
        #video-overlay { 
            display: none; position: fixed; inset: 0; background: black; z-index: 3000; 
        }
        .close-video { position: absolute; top: 20px; right: 20px; font-size: 40px; cursor: pointer; color: white; z-index: 3001; font-weight: bold; }
        #video-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">YAMONFILM</a>
    <a href="index.html" class="back-link">← Retour</a>
</header>

<section class="hero" id="hero-bg">
    <div class="hero-content">
        <h1 id="movie-title">Supercross</h1>
        <p id="movie-desc">Chargement du résumé...</p>
        <button class="play-btn" onclick="openPlayer()">▶ Lecture</button>
    </div>
</section>

<div id="video-overlay">
    <span class="close-video" onclick="closePlayer()">✕</span>
    <iframe 
        id="video-frame"
        src="" 
        allow="fullscreen" 
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms">
    </iframe>
</div>

<script>
    const TMDB_KEY = "182c7173698e34803715eacab5c693a7";
    const MOVIE_ID = "17186";
    const VIDEO_URL = "https://clip.place/videos/embed/1NHGrUazqLKi5GGT4Ak3A4";

    async function loadMovieData() {
        try {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${MOVIE_ID}?api_key=${TMDB_KEY}&language=fr-FR`);
            const data = await res.json();

            document.getElementById("movie-title").innerText = data.title;
            document.getElementById("movie-desc").innerText = data.overview || "Deux frères s'affrontent dans une compétition de Supercross de haut niveau.";
            
            // Image de fond haute qualité
            const bgUrl = `https://image.tmdb.org/t/p/original${data.backdrop_path}`;
            document.getElementById("hero-bg").style.backgroundImage = `url(${bgUrl})`;
        } catch (error) {
            console.error("Erreur TMDB:", error);
        }
    }

    function openPlayer() {
        document.getElementById("video-frame").src = VIDEO_URL;
        document.getElementById("video-overlay").style.display = "block";
        document.body.style.overflow = "hidden"; // Bloque le scroll
    }

    function closePlayer() {
        document.getElementById("video-frame").src = "";
        document.getElementById("video-overlay").style.display = "none";
        document.body.style.overflow = "auto"; // Réactive le scroll
    }

    loadMovieData();
</script>

</body>
</html>
