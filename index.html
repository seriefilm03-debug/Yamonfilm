<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut,
  setPersistence,
  browserSessionPersistence
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  updateDoc,
  getDoc,
  arrayUnion,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE INIT */
const app = initializeApp({
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* 🔥 IMPORTANT FIX : session locale seulement */
setPersistence(auth, browserSessionPersistence);

/* MENU */
const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");

window.toggleMenu = () => {
  menu.classList.toggle("open");
  overlay.classList.toggle("show");
};

overlay.onclick = () => {
  menu.classList.remove("open");
  overlay.classList.remove("show");
};

/* AUTH STATE */
onAuthStateChanged(auth, (user) => {

  if (!user) {
    console.log("👤 Visiteur (non connecté)");
    return;
  }

  console.log("✅ Connecté :", user.uid);
  checkAccess(user);
});

/* UNLOCK VIP */
window.unlock = async () => {
  const user = auth.currentUser;
  const input = document.getElementById("code").value.trim();

  if (!user) {
    document.getElementById("msg").innerText = "Non connecté ❌";
    return;
  }

  if (input !== "MEDICOPTER") {
    document.getElementById("msg").innerText = "Code incorrect ❌";
    return;
  }

  const userRef = doc(db, "users", user.uid);

  try {
    await updateDoc(userRef, {
      seriesUnlocked: arrayUnion("MEDICOPTER")
    });
  } catch (e) {
    await setDoc(userRef, {
      seriesUnlocked: ["MEDICOPTER"]
    }, { merge: true });
  }

  document.getElementById("msg").innerText = "Débloqué 🔥";
  applyVIP();
};

/* CHECK ACCESS */
async function checkAccess(user) {
  const snap = await getDoc(doc(db, "users", user.uid));

  if (snap.exists() && snap.data().seriesUnlocked?.includes("MEDICOPTER")) {
    applyVIP();
  }
}

/* VIP MODE */
function applyVIP() {
  document.getElementById("normalSection").classList.add("hidden");
  document.getElementById("normalCard").classList.add("hidden");

  document.getElementById("vipSection").classList.remove("hidden");
  document.getElementById("vipCard").classList.remove("hidden");
}

/* LOGOUT */
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>
