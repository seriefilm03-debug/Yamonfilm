<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAMONFILM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#141414;color:white;overflow-x:hidden;}

.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
  background:rgba(0,0,0,0.9);
}

.logo{color:#e50914;font-size:22px;font-weight:bold;}

.side-menu{
  position:fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#111;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input,button{
  padding:10px;
  border:none;
  border-radius:5px;
}

button{
  background:#e50914;
  color:white;
  cursor:pointer;
}

.hidden{display:none;}

.hero{
  margin-top:80px;
  padding:30px;
}

.play{
  margin-top:15px;
  padding:10px 20px;
  background:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">YAMONFILM</div>
</div>

<div class="side-menu">
  <input type="text" id="code" placeholder="Code série">
  <button onclick="unlock()">Valider</button>
  <p id="msg"></p>
</div>

<section class="hero">

  <h1>Medicopter 117</h1>
  <p>Regarde la série maintenant</p>

  <a href="medicopter.html">
    <button class="play">▶ Voir Medicopter</button>
  </a>

</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
});

const auth = getAuth(app);
const db = getFirestore(app);

let userGlobal = null;

onAuthStateChanged(auth,(user)=>{
  userGlobal = user;
});

window.unlock = async () => {
  const input = document.getElementById("code").value.trim().toUpperCase();

  if(!userGlobal){
    document.getElementById("msg").innerText = "Pas connecté ❌";
    return;
  }

  const codes = {
    MEDICOPTER: "MEDICOPTER"
  };

  if(!codes[input]){
    document.getElementById("msg").innerText = "Code incorrect ❌";
    return;
  }

  const userRef = doc(db,"users",userGlobal.uid);

  try {
    await updateDoc(userRef,{
      seriesUnlocked: arrayUnion(codes[input])
    });
  } catch(e){
    await setDoc(userRef,{
      seriesUnlocked:[codes[input]]
    },{merge:true});
  }

  document.getElementById("msg").innerText = "Débloqué 🔥";
};
</script>

</body>
</html>
