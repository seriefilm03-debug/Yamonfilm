<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAMONFILM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#141414;color:white;overflow-x:hidden;}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
  background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
  z-index:1000;
}

.logo{color:#e50914;font-size:22px;font-weight:bold;}
.menu-btn{font-size:26px;cursor:pointer;}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}
.overlay.show{opacity:1;pointer-events:auto;}

/* MENU */
.side-menu{
  position:fixed;
  top:0;
  right:-100%;
  width:280px;
  max-width:85%;
  height:100%;
  background:#111;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
  transition:0.3s;
  z-index:2000;
}
.side-menu.open{right:0;}

.side-menu a, .side-menu button{
  color:white;
  text-decoration:none;
  border:none;
  background:none;
  font-size:16px;
  cursor:pointer;
  padding:10px 0;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:0 5%;
  background:
    linear-gradient(to right, rgba(0,0,0,0.85), rgba(0,0,0,0.3)),
    url("s-l1200.jpg");
  background-size:cover;
  margin-top:60px;
}

.hero h1{font-size:clamp(28px,6vw,60px);}
.hero p{margin-top:15px;font-size:clamp(14px,3vw,18px);}

/* BOUTONS */
.play{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:5px;
  background:white;
  font-weight:bold;
  cursor:pointer;
}

.play:hover{
  background:#e50914;
  color:white;
}

/* FILMS */
.movies{
  padding:20px 5%;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:15px;
}

.movie{
  height:180px;
  background-size:cover;
  border-radius:8px;
  display:flex;
  align-items:flex-end;
  padding:10px;
}

/* MOBILE */
@media(max-width:600px){
  .side-menu{width:100%;max-width:100%;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">YAMONFILM</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- MENU -->
<div class="side-menu" id="menu">
  <a href="account.html">Mon compte</a>
  <a href="series.html">Mes séries</a>
  <button id="logoutBtn">Déconnexion</button>

  <input type="text" id="code" placeholder="Code">
  <button onclick="unlock()">Valider</button>
  <p id="msg"></p>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Medicopter 117</h1>
  <p>Découvrez la série la plus regardée</p>

  <!-- 🔥 BOUTON AJOUTÉ -->
  <a href="medicopter.html">
    <button class="play">▶ Voir Medicopter</button>
  </a>

  <!-- bouton série complète -->
  <a id="serieCompleteLink" href="vipmedicopter.html" style="display:none;">
    <button class="play">🔥 Série Complète</button>
  </a>
</section>

<!-- FILMS -->
<section class="movies">
  <a href="medicopter.html" class="movie" style="background-image:url('s-l1200.jpg')">
    <span>Medicopter</span>
  </a>

  <a id="serieCompleteCard" href="vipmedicopter.html" class="movie" style="background-image:url('s-l1200.jpg'); display:none;">
    <span>Série Complète</span>
  </a>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, updateDoc, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
});

const auth = getAuth(app);
const db = getFirestore(app);

const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");

window.toggleMenu = ()=>{
  menu.classList.toggle("open");
  overlay.classList.toggle("show");
};

overlay.onclick = ()=>{
  menu.classList.remove("open");
  overlay.classList.remove("show");
};

// AUTH FIX
let loaded = false;

onAuthStateChanged(auth,(user)=>{
  if(user){
    loaded = true;
    checkAccess(user);
  } else if(loaded){
    window.location.href="login.html";
  }
});

// CODE
window.unlock = async ()=>{
  const user = auth.currentUser;
  const input = document.getElementById("code").value;

  if(input === "MEDICOPTER"){
    await updateDoc(doc(db,"users",user.uid), {
      seriesUnlocked: arrayUnion("MEDICOPTER")
    });
    document.getElementById("msg").innerText="OK 🔥";
    checkAccess(user);
  }
};

async function checkAccess(user){
  const snap = await getDoc(doc(db,"users",user.uid));
  if(snap.exists()){
    if(snap.data().seriesUnlocked?.includes("MEDICOPTER")){
      document.getElementById("serieCompleteLink").style.display="block";
      document.getElementById("serieCompleteCard").style.display="block";
    }
  }
}

document.getElementById("logoutBtn").onclick = ()=>{
  signOut(auth).then(()=> window.location.href="login.html");
};
</script>

</body>
</html>
