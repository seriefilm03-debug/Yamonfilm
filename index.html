<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAMONFILM</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
body{ background:#141414; color:white; }

/* BARRE CODE */
#codeBox{
  position:fixed;
  top:15px;
  right:20px;
  display:flex;
  gap:5px;
  z-index:9999;
}

#vipInput{
  padding:8px;
  background:#222;
  border:1px solid #444;
  color:white;
  border-radius:6px;
  width:160px;
  outline:none;
}

#vipBtn{
  padding:8px 10px;
  background:red;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* SERIES */
.card{
  display:inline-block;
  width:200px;
  height:120px;
  margin:10px;
  background:#222;
  color:white;
  text-decoration:none;
  padding:10px;
  border-radius:8px;
  border:2px solid transparent;
  transition:0.2s;
}

.card.vip{
  border:2px solid red;
}
</style>
</head>

<body>

<!-- CODE VIP -->
<div id="codeBox">
  <input id="vipInput" placeholder="Code VIP">
  <button id="vipBtn">OK</button>
</div>

<h1>🎬 Séries</h1>

<a id="medicCard" href="medicopter.html" class="card">Medicopter 117</a>
<a id="clownCard" href="le clown.html" class="card">Le Clown</a>

<!-- 🔥 FIREBASE COMPAT (IMPORTANT) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
console.log("SCRIPT OK");

const firebaseConfig = {
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userRef;
let unlocked = [];

/* 🔥 UPDATE UI */
function updateUI(){

  if (unlocked.includes("MEDICOPTER")) {
    document.getElementById("medicCard").classList.add("vip");
    document.getElementById("medicCard").href = "vipmedicopter.html";
  }

  if (unlocked.includes("LECLOWN")) {
    document.getElementById("clownCard").classList.add("vip");
    document.getElementById("clownCard").href = "vipleclown.html";
  }
}

/* 🔥 LOGIN */
auth.onAuthStateChanged(async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  userRef = db.collection("users").doc(user.uid);

  const snap = await userRef.get();

  if (!snap.exists) return;

  unlocked = snap.data().seriesUnlocked || [];

  updateUI();
});

/* 🔥 CHECK CODE */
async function checkCode(){

  console.log("CLICK OK");

  const code = document.getElementById("vipInput").value.trim().toUpperCase();

  const snap = await userRef.get();
  unlocked = snap.data().seriesUnlocked || [];

  if (code === "MEDICOPTER" && !unlocked.includes("MEDICOPTER")) {

    await userRef.update({
      seriesUnlocked: firebase.firestore.FieldValue.arrayUnion("MEDICOPTER")
    });

    unlocked.push("MEDICOPTER");

    alert("🎉 MEDICOPTER débloqué !");
  }

  else if (code === "LECLOWN" && !unlocked.includes("LECLOWN")) {

    await userRef.update({
      seriesUnlocked: firebase.firestore.FieldValue.arrayUnion("LECLOWN")
    });

    unlocked.push("LECLOWN");

    alert("🎉 LE CLOWN débloqué !");
  }

  else {
    alert("❌ Code invalide ou déjà utilisé");
  }

  document.getElementById("vipInput").value = "";
  updateUI();
}

/* BUTTON + ENTER */
document.getElementById("vipBtn").addEventListener("click", checkCode);

document.getElementById("vipInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") checkCode();
});
</script>

</body>
</html>
