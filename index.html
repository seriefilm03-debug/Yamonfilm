<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged, 
  signOut 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  getDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
  authDomain: "yamonfilm-fead8.firebaseapp.com",
  projectId: "yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* MENU */
window.toggleMenu = () => {
  document.getElementById("menu").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth).then(() => window.location.href = "login.html");
};

/* CARROUSEL */
let currentSlide = 0;
const slides = document.querySelectorAll('.hero-slide');

setInterval(() => {
  slides[currentSlide].classList.remove('active');
  currentSlide = (currentSlide + 1) % slides.length;
  slides[currentSlide].classList.add('active');
}, 6000);

/* FIREBASE LOGIN */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);

  if (!snap.exists()) return;

  const data = snap.data();
  const unlocked = data.seriesUnlocked || [];

  /* 🔥 LE CLOWN */
  if (unlocked.includes("LECLOWN")) {
    document.getElementById("heroClownBtn").href = "vipleclown.html";
    const card = document.getElementById("cardClown");
    card.href = "vipleclown.html";
    card.innerText = "Le Clown VIP 🔥";
    card.classList.add("vip");
  }

  /* 🔥 MEDICOPTER */
  if (unlocked.includes("MEDICOPTER")) {
    document.getElementById("heroMedicBtn").href = "vipmedicopter.html";
    const card = document.getElementById("cardMedic");
    card.href = "vipmedicopter.html";
    card.innerText = "Medicopter VIP 🔥";
    card.classList.add("vip");
  }

  /* CONTINUE WATCHING */
  if (data.progress?.lastBySerie) {
    displayContinue(data.progress.lastBySerie, unlocked);
  }

});

/* CONTINUE WATCHING */
function displayContinue(lastBySerie, unlocked) {

  const container = document.getElementById("continue-container");
  const section = document.getElementById("continue-watching");

  container.innerHTML = "";

  const items = Object.values(lastBySerie).sort((a, b) => b.timestamp - a.timestamp);

  if (items.length > 0) {
    section.style.display = "block";
  }

  items.forEach(item => {

    const imgUrl = item.img?.startsWith('http')
      ? item.img
      : `https://image.tmdb.org/t/p/w300${item.img}`;

    let finalLink = item.link;

    if (item.serieName === "Le Clown" && unlocked.includes("LECLOWN")) {
      finalLink = "vipleclown.html";
    }

    if (item.serieName === "Medicopter 117" && unlocked.includes("MEDICOPTER")) {
      finalLink = "vipmedicopter.html";
    }

    const card = document.createElement("a");
    card.href = finalLink;
    card.className = "continue-card";

    card.innerHTML = `
      <div class="img-container">
        <img src="${imgUrl}">
        <div class="progress-bar"></div>
      </div>
      <div style="margin-top:10px;">
        <b>${item.serieName}</b><br>
        <span style="font-size:12px; color:#aaa;">
          S${item.s} : E${item.e} - ${item.title}
        </span>
      </div>
    `;

    container.appendChild(card);
  });
}
</script>
