<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicopter 117 - YAMONFILM</title>

<style>
*{ box-sizing:border-box; margin:0; padding:0; font-family:Arial,sans-serif; }
body{ background:#0f0f0f; color:white; overflow-x:hidden; }

/* --- POPUP --- */
#popup-unlock {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 5000;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}
.popup-content {
    background: #1c1c1c;
    padding: 40px;
    border-radius: 15px;
    border: 1px solid #e50914;
    max-width: 500px;
}
.popup-content h2 { font-size: 24px; margin-bottom: 15px; }
.popup-content p { color: #ccc; margin-bottom: 25px; }

.navbar{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
z-index:1000;
}

.logo{
color:#e50914;
font-size:28px;
font-weight:bold;
text-decoration:none;
}

.menu-btn{ font-size:28px; cursor:pointer; }

.hero{
height:65vh;
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:40px 5%;
}

.episodes{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:20px 5%;
}

.card{
background:#1c1c1c;
border-radius:8px;
overflow:hidden;
cursor:pointer;
}

.card img{ width:100%; height:140px; object-fit:cover; }

</style>
</head>

<body>

<!-- POPUP -->
<div id="popup-unlock">
    <div class="popup-content">
        <h2>Félicitations !</h2>
        <p>Vous venez de débloquer la série complète.</p>
        <button id="unlock-btn" class="btn-main">Bon visionnage</button>
    </div>
</div>

<div class="navbar">
<a href="index.html" class="logo">YAMONFILM</a>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<section class="hero" id="hero">
<div class="hero-content">
<h1 id="title">Medicopter 117</h1>
<p id="overview"></p>
</div>
</section>

<div class="episodes" id="episodes"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE",
authDomain:"yamonfilm-fead8.firebaseapp.com",
projectId:"yamonfilm-fead8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ========================= */
/* 🔥 UNLOCK FIREBASE SYSTEM */
/* ========================= */

const popup = document.getElementById("popup-unlock");
const unlockBtn = document.getElementById("unlock-btn");
const titleElem = document.getElementById("title");

const serieId = "MEDICOPTER";
let currentUser = null;

function applyVIP() {
    titleElem.innerText = "VIP Medicopter pour HL";
}

async function checkUnlock(user) {
    const ref = doc(db, "users", user.uid, "unlocks", serieId);
    const snap = await getDoc(ref);

    if (snap.exists() && snap.data().unlocked === true) {
        applyVIP();
        return;
    }

    popup.style.display = "flex";
}

unlockBtn.onclick = async () => {
    if (!currentUser) return;

    const ref = doc(db, "users", currentUser.uid, "unlocks", serieId);

    await setDoc(ref, {
        unlocked: true,
        timestamp: Date.now()
    });

    popup.style.display = "none";
    applyVIP();
};

/* ========================= */
/* AUTH */
/* ========================= */

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    currentUser = user;
    await checkUnlock(user);
});

/* ========================= */
/* RESTE DU SITE (INCHANGÉ) */
/* ========================= */

window.toggleMenu = () => {
    console.log("menu");
};

</script>

</body>
</html>
