<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ================= FIREBASE ================= */

const firebaseConfig = {
    apiKey: "TON_API_KEY",
    authDomain: "TON_AUTH_DOMAIN",
    projectId: "TON_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= TMDB ================= */

const apiKey = "TA_CLE_TMDB";
const tmdbId = 123456;

/* ================= VARIABLES ================= */

const serieId = "LECLOWN";

let currentS = 1;
let currentEpisodes = [];

let userProgress = {
    watched: [],
    lastBySerie: {}
};

/* ================= VIDEAS ================= */
/* 👉 MET TES LIENS ICI */

const videasSources = {

    1: {
        1: "LIEN_EP1_S1",
        2: "LIEN_EP2_S1",
        3: "LIEN_EP3_S1",
        4: "LIEN_EP4_S1",
        5: "LIEN_EP5_S1",
        6: "LIEN_EP6_S1"
    },

    2: {
        1: "LIEN_EP1_S2",
        2: "LIEN_EP2_S2",
        3: "LIEN_EP3_S2",
        4: "LIEN_EP4_S2",
        5: "LIEN_EP5_S2",
        6: "LIEN_EP6_S2"
    }

};

/* ================= MENU ================= */

window.toggleMenu = () => {
    document.getElementById("menu").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
};

/* ================= LOGIN ================= */

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    const userDoc = await getDoc(doc(db, "users", user.uid));

    if (userDoc.exists()) {
        userProgress = userDoc.data().progress || userProgress;

        if (!userProgress.lastBySerie) {
            userProgress.lastBySerie = {};
        }
    }

    loadSeries();
});

/* ================= LOGOUT ================= */

document.getElementById("logoutBtn").onclick = () => {
    signOut(auth).then(() => location.href = "login.html");
};

/* ================= SAVE PROGRESS ================= */

window.saveProgress = async (s, e, title, img) => {

    const user = auth.currentUser;
    if (!user) return;

    const epKey = `${serieId}-S${s}E${e}`;

    if (!userProgress.watched.includes(epKey)) {
        userProgress.watched.push(epKey);
    }

    userProgress.lastBySerie[serieId] = { s, e, title, img };

    await setDoc(doc(db, "users", user.uid), {
        progress: userProgress
    }, { merge: true });

    renderEpisodes();
    checkResume();
};

/* ================= RESUME ================= */

function checkResume() {

    const last = userProgress.lastBySerie[serieId];
    if (!last) return;

    const btn = document.getElementById("resumeBtn");

    btn.style.display = "inline-flex";
    btn.innerText = `▶ Reprendre S${last.s}E${last.e}`;

    btn.onclick = () => {
        window.openVideo(last.s, last.e, last.title, null);
    };
}

/* ================= LOAD SERIES ================= */

async function loadSeries() {

    const res = await fetch(
        `https://api.themoviedb.org/3/tv/${tmdbId}?api_key=${apiKey}&language=fr-FR`
    );

    const data = await res.json();

    document.getElementById("overview").innerText = data.overview;

    document.getElementById("hero").style.backgroundImage =
        `url(https://image.tmdb.org/t/p/original${data.backdrop_path})`;

    const menu = document.getElementById("seasonMenu");
    menu.innerHTML = "";

    for (let i = 1; i <= data.number_of_seasons; i++) {

        const div = document.createElement("div");
        div.innerText = "Saison " + i;

        div.onclick = () => {
            currentS = i;
            document.getElementById("seasonBtn").innerText = "Saison " + i + " ▼";
            loadEpisodes(i);
            menu.classList.remove("show");
        };

        menu.appendChild(div);
    }

    loadEpisodes(1);
}

/* ================= LOAD EPISODES ================= */

async function loadEpisodes(s) {

    const res = await fetch(
        `https://api.themoviedb.org/3/tv/${tmdbId}/season/${s}?api_key=${apiKey}&language=fr-FR`
    );

    const data = await res.json();

    currentEpisodes = data.episodes;

    renderEpisodes();
}

/* ================= RENDER EPISODES ================= */

function renderEpisodes() {

    const container = document.getElementById("episodes");
    container.innerHTML = "";

    currentEpisodes.forEach(ep => {

        const epKey = `${serieId}-S${currentS}E${ep.episode_number}`;
        const watched = userProgress.watched.includes(epKey);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="https://image.tmdb.org/t/p/w300${ep.still_path}">
            ${watched ? '<div class="watched-tag">VU</div>' : ''}
            <div class="progress-bar" style="width:${watched ? '100%' : '0%'}"></div>
            <div style="padding:10px;">
                <b>E${ep.episode_number}</b> - ${ep.name}
            </div>
        `;

        card.onclick = () => {
            window.openVideo(currentS, ep.episode_number, ep.name, ep.still_path);
        };

        container.appendChild(card);
    });
}

/* ================= OPEN VIDEO ================= */

window.openVideo = (s, e, title, img) => {

    const url = videasSources[s]?.[e];

    if (!url) {
        alert("Vidéo pas encore ajoutée pour cet épisode.");
        return;
    }

    document.getElementById("video-iframe").src = url;
    document.getElementById("video-overlay").style.display = "flex";

    window.saveProgress(s, e, title, img);
};

/* ================= CLOSE VIDEO ================= */

window.closeVideo = () => {
    document.getElementById("video-overlay").style.display = "none";
    document.getElementById("video-iframe").src = "";
};

/* ================= SEASON MENU ================= */

document.getElementById("seasonBtn").onclick = () => {
    document.getElementById("seasonMenu").classList.toggle("show");
};

</script>
