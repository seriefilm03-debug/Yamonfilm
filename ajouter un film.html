<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demander un contenu - YAMONFILM</title>

<style>
/* --- STYLE DE BASE --- */
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
body{ background:#141414; color:white; overflow-x:hidden; padding-top: 80px; }

/* NAV */
.navbar{
  position:fixed; top:0; left:0; width:100%; height:60px;
  display:flex; justify-content:space-between; align-items:center;
  padding:0 20px; background: rgba(0,0,0,0.9);
  z-index:1000; border-bottom: 1px solid #222;
}
.logo{ color:#e50914; font-size:28px; font-weight:bold; text-decoration:none;}
.back-btn { color: white; text-decoration: none; font-size: 16px; background: #222; padding: 8px 15px; border-radius: 4px; }

/* CONTENEUR PRINCIPAL */
.container { max-width: 1000px; margin: 0 auto; padding: 20px; text-align: center; }
h1 { font-size: 32px; margin-bottom: 10px; }
p { color: #aaa; margin-bottom: 30px; }

/* BARRE DE RECHERCHE */
.search-box { position: relative; max-width: 500px; margin: 0 auto 40px; }
.search-input { width: 100%; padding: 15px 20px; background: #222; border: 2px solid #444; color: white; border-radius: 30px; font-size: 16px; outline: none; transition: 0.3s; }
.search-input:focus { border-color: #e50914; background: #2a2a2a; }

/* RÉSULTATS DE RECHERCHE */
.results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 10px 0; margin-bottom: 50px; }
.media-card { background: #1f1f1f; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid transparent; display: flex; flex-direction: column; text-align: left; position: relative; }
.media-card:hover { transform: translateY(-5px); border-color: #e50914; }
.media-poster { width: 100%; height: 240px; object-fit: cover; background: #333; }
.media-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
.media-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.media-type { font-size: 11px; color: #e50914; text-transform: uppercase; font-weight: bold; }
.media-date { font-size: 12px; color: #777; }

/* ÉTAT "DÉJÀ DEMANDÉ" / DESACTIVÉ */
.media-card.already-requested { cursor: not-allowed; opacity: 0.6; border-color: #2ecc71; }
.media-card.already-requested:hover { transform: none; }
.status-badge { position: absolute; top: 10px; right: 10px; background: #2ecc71; color: white; font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
.status-badge.pending { background: #e67e22; }

/* SECTION LISTE DES DEMANDES DE L'UTILISATEUR */
.requests-section { margin-top: 50px; text-align: left; border-top: 1px solid #222; padding-top: 40px; }
.requests-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.tabs { display: flex; gap: 10px; }
.tab-btn { background: #222; border: none; color: #aaa; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; }
.tab-btn.active { background: #e50914; color: white; }

/* MODAL DE CONFIRMATION */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 2000; }
.modal.show { opacity: 1; pointer-events: auto; }
.modal-content { background: #181818; padding: 30px; border-radius: 8px; max-width: 400px; width: 90%; text-align: center; border: 1px solid #333; }
.modal-buttons { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
.btn { padding: 10px 20px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; }
.btn-confirm { background: #e50914; color: white; }
.btn-cancel { background: #333; color: white; }

/* NOTIFICATION DE SUCCÈS */
.toast { position: fixed; bottom: 20px; right: 20px; background: #2ecc71; color: white; padding: 15px 25px; border-radius: 4px; font-weight: bold; transform: translateY(100px); opacity: 0; transition: 0.3s; z-index: 3000; }
.toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="navbar">
  <a href="index.html" class="logo">YAMONFILM</a>
  <a href="index.html" class="back-btn">Retour</a>
</div>

<div class="container">
    <h1>Une idée ? Une envie ?</h1>
    <p>Recherche un film ou une série via TMDB pour nous envoyer ta demande !</p>
    
    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="Tape le nom d'un film ou d'une série...">
    </div>

    <!-- Grille de résultats de recherche -->
    <div id="resultsGrid" class="results-grid"></div>

    <!-- Section : Suivi des demandes existantes -->
    <div class="requests-section">
        <div class="requests-header">
            <h2>Demandes de la communauté</h2>
            <div class="tabs">
                <button class="tab-btn active" id="tab-movie" onclick="switchTab('movie')">Films</button>
                <button class="tab-btn" id="tab-tv" onclick="switchTab('tv')">Séries</button>
            </div>
        </div>
        <div id="existingRequestsGrid" class="results-grid">
            <!-- Les demandes existantes chargées de Firebase s'afficheront ici -->
        </div>
    </div>
</div>

<!-- Modal de demande -->
<div id="requestModal" class="modal">
    <div class="modal-content">
        <h3 id="modalMediaTitle">Titre du film</h3>
        <p style="margin: 10px 0 20px; font-size: 14px;">Souhaites-tu envoyer une demande pour ajouter ce contenu ?</p>
        <div class="modal-buttons">
            <button class="btn btn-cancel" onclick="closeModal()">Annuler</button>
            <button id="submitRequestBtn" class="btn btn-confirm">Envoyer la demande</button>
        </div>
    </div>
</div>

<!-- Notification -->
<div id="toast" class="toast">Demande envoyée avec succès ! 🎉</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// Configuration Firebase (Identique à ton projet)
const firebaseConfig = { 
    apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE", 
    authDomain: "yamonfilm-fead8.firebaseapp.com", 
    projectId: "yamonfilm-fead8",
    databaseURL: "https://yamonfilm-fead8-default-rtdb.firebaseio.com"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// Configuration TMDB
const TMDB_API_KEY = "182c7173698e34803715eacab5c693a7";

let currentUser = null;
let selectedMedia = null;
let searchTimeout = null;

let dbRequests = []; 
let currentTab = 'movie'; 
let lastSearchQuery = ""; 

// Vérification de la connexion
onAuthStateChanged(auth, (user) => {
    if (!user) { 
        window.location.href = "login.html"; 
    } else { 
        currentUser = user; 
        console.log("Utilisateur connecté :", currentUser.email);
    }
});

// ÉCOUTE EN TEMPS RÉEL SUR REALTIME DATABASE
const requestsRef = ref(db, 'requests');
onValue(requestsRef, (snapshot) => {
    dbRequests = [];
    const data = snapshot.val();
    if (data) {
        Object.keys(data).forEach((key) => {
            dbRequests.push({ id: key, ...data[key] });
        });
        dbRequests.sort((a, b) => b.timestamp - a.timestamp);
    }
    
    renderExistingRequests();

    if (lastSearchQuery.length >= 2) {
        searchTMDB(lastSearchQuery);
    }
});

// Écouteur sur la barre de recherche
document.getElementById("searchInput").addEventListener("input", (e) => {
    clearTimeout(searchTimeout);
    const queryStr = e.target.value.trim();
    lastSearchQuery = queryStr;
    
    if (queryStr.length < 2) {
        document.getElementById("resultsGrid").innerHTML = "";
        return;
    }

    searchTimeout = setTimeout(() => {
        searchTMDB(queryStr);
    }, 400);
});

async function searchTMDB(queryStr) {
    const url = `https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&language=fr-FR&query=${encodeURIComponent(queryStr)}&page=1&include_adult=false`;
    
    try {
        const response = await fetch(url);
        const data = await response.json();
        displayResults(data.results);
    } catch (error) {
        console.error("Erreur TMDB :", error);
    }
}

function displayResults(results) {
    const grid = document.getElementById("resultsGrid");
    grid.innerHTML = "";

    const filteredResults = results.filter(item => item.media_type === "movie" || item.media_type === "tv");

    if (filteredResults.length === 0) {
        grid.innerHTML = `<p style="grid-column: 1/-1; color: #555;">Aucun résultat trouvé.</p>`;
        return;
    }

    filteredResults.forEach(item => {
        const isMovie = item.media_type === "movie";
        const title = isMovie ? item.title : item.name;
        const date = isMovie ? (item.release_date ? item.release_date.substring(0, 4) : 'N/A') : (item.first_air_date ? item.first_air_date.substring(0, 4) : 'N/A');
        const poster = item.poster_path ? `https://image.tmdb.org/t/p/w300${item.poster_path}` : 'https://via.placeholder.com/300x450/222/fff?text=Pas+d%27image';

        // Recherche si cet élément exact existe déjà dans la Realtime Database
        const isAlreadyRequested = dbRequests.find(req => Number(req.tmdbId) === Number(item.id) && req.type === item.media_type);

        const card = document.createElement("div");
        card.className = "media-card";
        
        let badgeHTML = "";
        if (isAlreadyRequested) {
            card.classList.add("already-requested");
            const statusLabel = isAlreadyRequested.status || "En attente";
            const badgeClass = statusLabel === "En attente" ? "status-badge pending" : "status-badge";
            badgeHTML = `<span class="${badgeClass}">${statusLabel}</span>`;
        }

        card.innerHTML = `
            ${badgeHTML}
            <img class="media-poster" src="${poster}" alt="${title}">
            <div class="media-info">
                <div class="media-title">${title}</div>
                <div>
                    <span class="media-type">${isMovie ? 'Film' : 'Série'}</span>
                    <span class="media-date"> • ${date}</span>
                </div>
            </div>
        `;

        if (!isAlreadyRequested) {
            card.onclick = () => openModal(item, title);
        } else {
            card.onclick = () => alert(`"${title}" a déjà été demandé et est actuellement : ${isAlreadyRequested.status || 'En attente'}`);
        }
        
        grid.appendChild(card);
    });
}

function renderExistingRequests() {
    const grid = document.getElementById("existingRequestsGrid");
    grid.innerHTML = "";

    const filtered = dbRequests.filter(req => req.type === currentTab);

    if (filtered.length === 0) {
        grid.innerHTML = `<p style="grid-column: 1/-1; color: #555; text-align:center; padding: 20px;">Aucune demande de ${currentTab === 'movie' ? 'film' : 'série'} pour le moment.</p>`;
        return;
    }

    filtered.forEach(req => {
        const poster = req.posterPath ? `https://image.tmdb.org/t/p/w300${req.posterPath}` : 'https://via.placeholder.com/300x450/222/fff?text=Pas+d%27image';
        const statusLabel = req.status || "En attente";
        const badgeClass = statusLabel === "En attente" ? "status-badge pending" : "status-badge";

        const card = document.createElement("div");
        card.className = "media-card already-requested";
        card.innerHTML = `
            <span class="${badgeClass}">${statusLabel}</span>
            <img class="media-poster" src="${poster}" alt="${req.title}">
            <div class="media-info">
                <div class="media-title">${req.title}</div>
                <div>
                    <span class="media-type">${req.type === 'movie' ? 'Film' : 'Série'}</span>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
}

// Fonction de bascule des onglets
window.switchTab = (type) => {
    currentTab = type;
    document.getElementById("tab-movie").classList.remove("active");
    document.getElementById("tab-tv").classList.remove("active");
    
    if(type === 'movie') {
        document.getElementById("tab-movie").classList.add("active");
    } else {
        document.getElementById("tab-tv").classList.add("active");
    }
    renderExistingRequests();
};

window.openModal = (item, title) => {
    selectedMedia = item;
    document.getElementById("modalMediaTitle").innerText = title;
    document.getElementById("requestModal").classList.add("show");
};

window.closeModal = () => {
    document.getElementById("requestModal").classList.remove("show");
    selectedMedia = null;
};

// Envoi de la demande dans Realtime Database avec logs et alertes de secours
document.getElementById("submitRequestBtn").onclick = async () => {
    if (!selectedMedia) {
        alert("Erreur : Aucun film ou série n'a été sélectionné.");
        return;
    }

    if (!currentUser) {
        alert("Erreur : Tu n'es pas connecté ! Tu dois être connecté pour faire une demande.");
        return;
    }

    const isMovie = selectedMedia.media_type === "movie";
    
    try {
        console.log("Tentative d'envoi à la base de données...", selectedMedia);
        
        await push(ref(db, 'requests'), {
            userId: currentUser.uid,
            userEmail: currentUser.email,
            tmdbId: selectedMedia.id,
            title: isMovie ? selectedMedia.title : selectedMedia.name,
            type: selectedMedia.media_type,
            posterPath: selectedMedia.poster_path,
            status: "En attente",
            timestamp: serverTimestamp()
        });

        console.log("Demande enregistrée avec succès !");
        closeModal();
        showToast();
        
        // On vide la recherche pour voir la grille se mettre à jour directement en dessous
        document.getElementById("searchInput").value = "";
        document.getElementById("resultsGrid").innerHTML = "";
        lastSearchQuery = "";
    } catch (error) {
        alert("Firebase a refusé la demande. Vérifie tes règles de sécurité (Rules). Erreur : " + error.message);
        console.error(error);
    }
};

function showToast() {
    const toast = document.getElementById("toast");
    toast.classList.add("show");
    setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}
</script>
</body>
</html>
