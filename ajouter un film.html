<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demander un contenu - YAMONFILM</title>

<style>
/* --- STYLE DE BASE (Harmonisé avec ton index.html) --- */
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
body{ background:#141414; color:white; overflow-x:hidden; padding-top: 80px; }

/* NAV */
.navbar{
  position:fixed; top:0; left:0; width:100%; height:60px;
  display:flex; justify-content:space-between; align-items:center;
  padding:0 20px; background: rgba(0,0,0,0.9);
  z-index:1000; border-bottom: 1px solid #222;
}
.logo{ color:#e50914; font-size:28px; font-weight:bold; text-decoration:none;}
.back-btn { color: white; text-decoration: none; font-size: 16px; background: #222; padding: 8px 15px; border-radius: 4px; }

/* CONTENEUR PRINCIPAL */
.container { max-width: 800px; margin: 0 auto; padding: 20px; text-align: center; }
h1 { font-size: 32px; margin-bottom: 10px; }
p { color: #aaa; margin-bottom: 30px; }

/* BARRE DE RECHERCHE */
.search-box { position: relative; max-width: 500px; margin: 0 auto 40px; }
.search-input { width: 100%; padding: 15px 20px; background: #222; border: 2px solid #444; color: white; border-radius: 30px; font-size: 16px; outline: none; transition: 0.3s; }
.search-input:focus { border-color: #e50914; background: #2a2a2a; }

/* RÉSULTATS DE RECHERCHE */
.results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 10px 0; }
.media-card { background: #1f1f1f; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid transparent; display: flex; flex-direction: column; text-align: left; }
.media-card:hover { transform: translateY(-5px); border-color: #e50914; }
.media-poster { width: 100%; height: 240px; object-fit: cover; background: #333; }
.media-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
.media-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.media-type { font-size: 11px; color: #e50914; text-transform: uppercase; font-weight: bold; }
.media-date { font-size: 12px; color: #777; }

/* MODAL DE CONFIRMATION */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 2000; }
.modal.show { opacity: 1; pointer-events: auto; }
.modal-content { background: #181818; padding: 30px; border-radius: 8px; max-width: 400px; width: 90%; text-align: center; border: 1px solid #333; }
.modal-buttons { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
.btn { padding: 10px 20px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; }
.btn-confirm { background: #e50914; color: white; }
.btn-cancel { background: #333; color: white; }

/* NOTIFICATION DE SUCCÈS */
.toast { position: fixed; bottom: 20px; right: 20px; background: #2ecc71; color: white; padding: 15px 25px; border-radius: 4px; font-weight: bold; transform: translateY(100px); opacity: 0; transition: 0.3s; z-index: 3000; }
.toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="navbar">
  <a href="index.html" class="logo">YAMONFILM</a>
  <a href="index.html" class="back-btn">Retour</a>
</div>

<div class="container">
    <h1>Une idée ? Une envie ?</h1>
    <p>Recherche un film ou une série via TMDB pour nous envoyer ta demande !</p>
    
    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="Tape le nom d'un film ou d'une série...">
    </div>

    <div id="resultsGrid" class="results-grid"></div>
</div>

<!-- Modal de demande -->
<div id="requestModal" class="modal">
    <div class="modal-content">
        <h3 id="modalMediaTitle">Titre du film</h3>
        <p style="margin: 10px 0 20px; font-size: 14px;">Souhaites-tu envoyer une demande pour ajouter ce contenu ?</p>
        <div class="modal-buttons">
            <button class="btn btn-cancel" onclick="closeModal()">Annuler</button>
            <button id="submitRequestBtn" class="btn btn-confirm">Envoyer la demande</button>
        </div>
    </div>
</div>

<!-- Notification -->
<div id="toast" class="toast">Demande envoyée avec succès ! 🎉</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Configuration Firebase (Identique à ton projet)
const firebaseConfig = { apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE", authDomain: "yamonfilm-fead8.firebaseapp.com", projectId: "yamonfilm-fead8" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Configuration TMDB
const TMDB_API_KEY = "182c7173698e34803715eacab5c693a7";

let currentUser = null;
let selectedMedia = null;
let searchTimeout = null;

// Vérification de la connexion
onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "login.html"; } 
    else { currentUser = user; }
});

// Écouteur sur la barre de recherche (avec un "debounce" pour éviter de saturer l'API à chaque lettre)
document.getElementById("searchInput").addEventListener("input", (e) => {
    clearTimeout(searchTimeout);
    const query = e.target.value.trim();
    
    if (query.length < 2) {
        document.getElementById("resultsGrid").innerHTML = "";
        return;
    }

    searchTimeout = setTimeout(() => {
        searchTMDB(query);
    }, 400); // Attend 400ms sans frappe avant de lancer la recherche
});

// Fonction pour interroger l'API TMDB en "multi-search" (films + séries en même temps)
async function searchTMDB(query) {
    const url = `https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&language=fr-FR&query=${encodeURIComponent(query)}&page=1&include_adult=false`;
    
    try {
        const response = await fetch(url);
        const data = await response.json();
        displayResults(data.results);
    } catch (error) {
        console.error("Erreur TMDB :", error);
    }
}

// Affichage des résultats trouvés
function displayResults(results) {
    const grid = document.getElementById("resultsGrid");
    grid.innerHTML = "";

    // On filtre pour ne garder que les films (movie) et les séries (tv)
    const filteredResults = results.filter(item => item.media_type === "movie" || item.media_type === "tv");

    if (filteredResults.length === 0) {
        grid.innerHTML = `<p style="grid-column: 1/-1; color: #555;">Aucun résultat trouvé.</p>`;
        return;
    }

    filteredResults.forEach(item => {
        const isMovie = item.media_type === "movie";
        const title = isMovie ? item.title : item.name;
        const date = isMovie ? (item.release_date ? item.release_date.substring(0, 4) : 'N/A') : (item.first_air_date ? item.first_air_date.substring(0, 4) : 'N/A');
        const poster = item.poster_path ? `https://image.tmdb.org/t/p/w300${item.poster_path}` : 'https://via.placeholder.com/300x450/222/fff?text=Pas+d%27image';

        const card = document.createElement("div");
        card.className = "media-card";
        card.innerHTML = `
            <img class="media-poster" src="${poster}" alt="${title}">
            <div class="media-info">
                <div class="media-title">${title}</div>
                <div>
                    <span class="media-type">${isMovie ? 'Film' : 'Série'}</span>
                    <span class="media-date"> • ${date}</span>
                </div>
            </div>
        `;

        // Événement au clic sur un film/série
        card.onclick = () => openModal(item, title);
        grid.appendChild(card);
    });
}

// Fonctions du Modal
window.openModal = (item, title) => {
    selectedMedia = item;
    document.getElementById("modalMediaTitle").innerText = title;
    document.getElementById("requestModal").classList.add("show");
};

window.closeModal = () => {
    document.getElementById("requestModal").classList.remove("show");
    selectedMedia = null;
};

// Envoi de la demande dans Firestore
document.getElementById("submitRequestBtn").onclick = async () => {
    if (!selectedMedia || !currentUser) return;

    const isMovie = selectedMedia.media_type === "movie";
    
    try {
        // Enregistre la demande dans la collection "requests"
        await addDoc(collection(db, "requests"), {
            userId: currentUser.uid,
            userEmail: currentUser.email,
            tmdbId: selectedMedia.id,
            title: isMovie ? selectedMedia.title : selectedMedia.name,
            type: selectedMedia.media_type,
            posterPath: selectedMedia.poster_path,
            status: "En attente", // Permet de suivre l'avancement (En attente, Ajouté, etc.)
            timestamp: serverTimestamp()
        });

        closeModal();
        showToast();
        document.getElementById("searchInput").value = "";
        document.getElementById("resultsGrid").innerHTML = "";
    } catch (error) {
        alert("Erreur lors de l'envoi de la demande : " + error.message);
    }
};

function showToast() {
    const toast = document.getElementById("toast");
    toast.classList.add("show");
    setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}
</script>
</body>
</html>
