<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NakaStream Clone - Streaming Gratuit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#E50914', // Rouge Netflix/Stream
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-zinc-950 text-stone-100 min-h-screen font-sans">

    <header class="sticky top-0 z-50 bg-zinc-950/95 backdrop-blur-md border-b border-zinc-900 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-8">
            <h1 class="text-2xl font-black text-brand tracking-widest cursor-pointer" onclick="showHome()">NAKASTREAM</h1>
            <nav class="hidden md:flex gap-6 text-sm font-medium text-zinc-400">
                <a href="#" class="hover:text-white transition" onclick="showHome()">Accueil</a>
                <a href="#" class="hover:text-white transition">Films</a>
                <a href="#" class="hover:text-white transition">Séries</a>
            </nav>
        </div>
        
        <div class="relative w-full md:w-80">
            <input 
                type="text" 
                id="search-input"
                placeholder="Rechercher un film ou une série..." 
                class="w-full bg-zinc-900 border border-zinc-800 rounded-full py-2 px-5 pl-11 text-sm text-white placeholder-zinc-500 focus:outline-none focus:border-brand transition"
                onkeyup="handleSearch(event)"
            >
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 text-sm"></i>
        </div>
    </header>

    <section id="player-section" class="hidden max-w-5xl mx-auto px-4 py-8">
        <button onclick="showHome()" class="mb-4 flex items-center gap-2 text-zinc-400 hover:text-white transition text-sm">
            <i class="fa-solid fa-arrow-left"></i> Retour à l'accueil
        </button>
        
        <div class="relative w-full aspect-video rounded-xl overflow-hidden bg-black border border-zinc-800 shadow-2xl shadow-brand/5">
            <iframe 
                id="video-player"
                src="" 
                class="absolute top-0 left-0 w-full h-full" 
                allowfullscreen 
                scrolling="no">
            </iframe>
        </div>

        <div class="mt-6">
            <h2 id="player-title" class="text-3xl font-bold text-white">Nom du film</h2>
            <p id="player-desc" class="text-zinc-400 mt-2 text-sm md:text-base leading-relaxed">Description du film...</p>
        </div>
        <hr class="border-zinc-900 my-8">
    </section>

    <main id="catalog-section" class="max-w-7xl mx-auto px-6 py-8">
        <h2 id="section-title" class="text-xl font-bold mb-6 flex items-center gap-2">
            <span class="w-1.5 h-6 bg-brand rounded-full"></span> Films Populaires
        </h2>
        
        <div id="movies-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            </div>
    </main>

    <footer class="border-t border-zinc-900 py-8 text-center text-xs text-zinc-600 mt-20">
        <p>© 2026 Nakastream Clone. Tous droits réservés.</p>
        <p class="mt-1 text-zinc-700">Ce site est un clone d'apprentissage éducatif.</p>
    </footer>

    <script>
        // Clé API TMDB publique de test (utilisez la vôtre si vous le souhaitez)
        const TMDB_API_KEY = "15d2ea6d0dc1d476efbca3eba2b9a775"; 
        const TMDB_IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

        // Au chargement de la page, on affiche les films populaires
        window.onload = () => {
            fetchMovies('/movie/popular');
        };

        // Charger et afficher les films depuis TMDB
        async function fetchMovies(endpoint, query = '') {
            const url = `https://api.themoviedb.org/3${endpoint}?api_key=${TMDB_API_KEY}&language=fr-FR${query}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                displayMovies(data.results);
            } catch (error) {
                console.error("Erreur lors du chargement des films :", error);
            }
        }

        // Injecter les cartes de films dans la grille HTML
        function displayMovies(movies) {
            const grid = document.getElementById('movies-grid');
            grid.innerHTML = ''; // On vide l'ancienne liste

            if (movies.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center text-zinc-500 py-12">Aucun résultat trouvé.</p>';
                return;
            }

            movies.forEach(movie => {
                if(!movie.poster_path) return; // Ignore si pas d'affiche

                const card = document.createElement('div');
                card.className = "group cursor-pointer bg-zinc-900/50 rounded-lg overflow-hidden border border-zinc-900 hover:border-zinc-700 transition duration-300 shadow-lg";
                card.onclick = () => playMovie(movie.id, movie.title, movie.overview);

                card.innerHTML = `
                    <div class="relative overflow-hidden aspect-[2/3]">
                        <img 
                            src="${TMDB_IMAGE_BASE}${movie.poster_path}" 
                            alt="${movie.title || movie.name}" 
                            class="w-full h-full object-cover transition duration-500 group-hover:scale-105"
                            loading="lazy"
                        >
                        <div class="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                            <div class="w-12 h-12 rounded-full bg-brand flex items-center justify-center text-white text-lg shadow-lg transform translate-y-4 group-hover:translate-y-0 transition duration-300">
                                <i class="fa-solid fa-play ml-1"></i>
                            </div>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm truncate text-zinc-200 group-hover:text-white transition">${movie.title || movie.name}</h3>
                        <p class="text-xs text-zinc-500 mt-1">${new Date(movie.release_date || movie.first_air_date).getFullYear() || 'N/A'}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Lancer la lecture du film
        function playMovie(id, title, overview) {
            // Afficher la section lecteur et cacher l'accueil
            document.getElementById('catalog-section').classList.add('hidden');
            document.getElementById('player-section').classList.remove('hidden');

            // Configurer le lecteur vidéo vidsrc (lecteur de streaming automatique)
            const playerUrl = `https://vidsrc.to/embed/movie/${id}`;
            document.getElementById('video-player').src = playerUrl;

            // Mettre à jour les infos
            document.getElementById('player-title').innerText = title;
            document.getElementById('player-desc').innerText = overview || "Aucun résumé disponible pour ce film.";
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Retourner à l'accueil
        function showHome() {
            document.getElementById('player-section').classList.add('hidden');
            document.getElementById('video-player').src = ""; // Coupe le son de la vidéo
            document.getElementById('catalog-section').classList.remove('hidden');
            document.getElementById('search-input').value = "";
            document.getElementById('section-title').innerHTML = `<span class="w-1.5 h-6 bg-brand rounded-full"></span> Films Populaires`;
            fetchMovies('/movie/popular');
        }

        // Gérer la barre de recherche
        function handleSearch(event) {
            const query = event.target.value.trim();
            if (query.length > 2) {
                document.getElementById('section-title').innerHTML = `<span class="w-1.5 h-6 bg-brand rounded-full"></span> Résultats pour "${query}"`;
                fetchMovies('/search/movie', `&query=${encodeURIComponent(query)}`);
            } else if (query.length === 0) {
                showHome();
            }
        }
    </script>
</body>
</html>
