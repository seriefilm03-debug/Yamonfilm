<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">YAMONFILM - Lecteur</title>
    <style>
        /* --- DESIGN GLOBAL --- */
        *{ box-sizing:border-box; margin:0; padding:0; font-family:Arial, sans-serif; }
        body{ background:#0f0f0f; color:white; overflow-x:hidden; }
        
        header { 
            position: fixed; top: 0; width: 100%; padding: 15px 5%; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .logo { color:#e50914; font-size:24px; font-weight:bold; text-decoration:none; }
        .back-link { color: white; text-decoration: none; font-size: 14px; background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 4px; }

        /* --- HERO SECTION --- */
        .hero { 
            height: 70vh; width: 100%; background-size: cover; background-position: center; 
            display: flex; align-items: flex-end; padding: 5%; position: relative; 
        }
        .hero::after { 
            content: ""; position: absolute; inset: 0; 
            background: linear-gradient(to top, #0f0f0f, transparent 50%), linear-gradient(to right, #0f0f0f, transparent); 
        }
        .hero-content { position: relative; z-index: 10; max-width: 700px; }
        .hero h1 { font-size: clamp(30px, 5vw, 60px); margin-bottom: 10px; }
        .hero p { color: #ccc; line-height: 1.5; margin-bottom: 20px; font-size: 14px; }
        
        .btn-unlock { 
            display: inline-block; background: #e50914; color: white; 
            text-decoration: none; padding: 12px 30px; border-radius: 4px; font-weight: bold; 
        }

        /* --- SECTION EPISODES --- */
        .section-title { padding: 40px 5% 10px; font-size: 20px; font-weight: bold; }

        /* GRILLE ADAPTATIVE : Horizontal sur mobile, Grille sur PC */
        .episodes-container { 
            display: flex; gap: 20px; padding: 20px 5% 50px; 
            overflow-x: auto; scroll-snap-type: x mandatory;
        }

        .episode-card { 
            flex: 0 0 280px; background: #1c1c1c; border-radius: 8px; 
            overflow: hidden; cursor: pointer; transition: 0.3s; 
            border: 1px solid #333; scroll-snap-align: start;
        }
        .episode-card:hover { transform: scale(1.03); border-color: #e50914; }
        .episode-card img { width: 100%; height: 155px; object-fit: cover; }
        .ep-info { padding: 12px; }
        .ep-info b { font-size: 14px; display: block; margin-bottom: 5px; }
        
        /* Sur PC, on remet en grille */
        @media (min-width: 1024px) {
            .episodes-container { 
                display: grid; 
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
                flex-wrap: wrap; overflow-x: visible;
            }
        }

        /* --- POPUP & LECTEUR --- */
        .popup { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            display: none; justify-content: center; align-items: center; z-index: 2000; 
        }
        .popup-box { background: #181818; padding: 30px; border-radius: 10px; text-align: center; border: 1px solid #e50914; }
        
        #video-player { 
            display: none; position: fixed; inset: 0; background: black; z-index: 3000; 
        }
        .close-player { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; color: white; z-index: 3001; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">YAMONFILM</a>
    <a href="index.html" class="back-link">Retour</a>
</header>

<section class="hero" id="hero-bg">
    <div class="hero-content">
        <h1 id="serie-title">Chargement...</h1>
        <p id="serie-desc"></p>
        <div id="status-area"></div>
    </div>
</section>

<h3 class="section-title">Épisodes</h3>
<div class="episodes-container" id="episodes-list">
    </div>

<div class="popup" id="lock-popup">
    <div class="popup-box">
        <h3>Contenu VIP 🔥</h3><br>
        <p>Ce contenu est réservé aux membres VIP.</p><br>
        <a href="debloquer.html" class="btn-unlock">Activer un code</a>
        <button onclick="closePopup()" style="background:none; border:none; color:#888; margin-top:15px; cursor:pointer; display:block; width:100%;">Plus tard</button>
    </div>
</div>

<div id="video-player">
    <span class="close-player" onclick="stopVideo()">✕</span>
    <iframe id="video-frame" src="" allowfullscreen></iframe>
</div>

<script type="module">
    const TMDB_KEY = "182c7173698e34803715eacab5c693a7";
    
    // 1. Lire les infos dans l'adresse (URL)
    const params = new URLSearchParams(window.location.search);
    const tmdbId = params.get('id');    // ex: 16678
    const isVip = params.get('vip') === 'true'; // true ou false

    async function init() {
        if(!tmdbId) return;

        // Récupérer infos de la série
        const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}?api_key=${TMDB_KEY}&language=fr-FR`);
        const data = await res.json();

        document.getElementById("serie-title").innerText = data.name;
        document.getElementById("page-title").innerText = data.name + " - YAMONFILM";
        document.getElementById("serie-desc").innerText = data.overview || "Pas de description disponible.";
        document.getElementById("hero-bg").style.backgroundImage = `url(https://image.tmdb.org/t/p/original${data.backdrop_path})`;

        if(!isVip) {
            document.getElementById("status-area").innerHTML = `<a href="debloquer.html" class="btn-unlock">🔓 Débloquer la version VIP</a>`;
        }

        loadEpisodes();
    }

    async function loadEpisodes() {
        const list = document.getElementById("episodes-list");
        const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/1?api_key=${TMDB_KEY}&language=fr-FR`);
        const data = await res.json();

        data.episodes.forEach(ep => {
            const card = document.createElement("div");
            card.className = "episode-card";
            const img = ep.still_path ? `https://image.tmdb.org/t/p/w500${ep.still_path}` : `https://image.tmdb.org/t/p/w500${data.poster_path}`;

            card.innerHTML = `
                <img src="${img}">
                <div class="ep-info">
                    <b>S1 : E${ep.episode_number} - ${ep.name}</b>
                </div>
            `;

            // LOGIQUE DE CLIC
            card.onclick = () => {
                if (isVip) {
                    playVideo("LIEN_VIDEO_VIP_ICI"); // Tu mettras tes liens ici plus tard
                } else {
                    // Si gratuit, on autorise seulement l'épisode 1
                    if (ep.episode_number === 1) {
                        playVideo("https://www.youtube.com/embed/dQw4w9WgXcQ"); // Exemple gratuit
                    } else {
                        document.getElementById("lock-popup").style.display = "flex";
                    }
                }
            };
            list.appendChild(card);
        });
    }

    window.playVideo = (url) => {
        document.getElementById("video-frame").src = url;
        document.getElementById("video-player").style.display = "block";
    };

    window.stopVideo = () => {
        document.getElementById("video-frame").src = "";
        document.getElementById("video-player").style.display = "none";
    };

    window.closePopup = () => {
        document.getElementById("lock-popup").style.display = "none";
    };

    init();
</script>

</body>
</html>
