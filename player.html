<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">YAMONFILM - Player</title>
    <style>
        /* TOUT TON STYLE UNIQUE ICI (Design Medicopter/Clown) */
        *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
        body{background:#0f0f0f;color:white;overflow-x:hidden}
        header{position:fixed;top:0;width:100%;padding:15px 40px;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);display:flex;justify-content:space-between;align-items:center;z-index:1000}
        .logo{font-size:22px;font-weight:bold;color:#e50914;text-decoration:none}
        .hero{margin-top:0;height:70vh;background-size:cover;background-position:center;display:flex;align-items:flex-end;padding:80px;position:relative}
        .hero::after{content:"";position:absolute;bottom:0;left:0;width:100%;height:60%;background:linear-gradient(to top,#0f0f0f,transparent)}
        .hero-content{position:relative;z-index:2;max-width:600px}
        .hero h1{font-size:50px;margin-bottom:15px}
        .btn-main{display:inline-block;background:#e50914;color:white;text-decoration:none;padding:15px 35px;border-radius:8px;font-weight:bold;cursor:pointer;border:none}
        .season-section{padding:40px 80px 10px}
        .season-btn{background:#333;color:white;padding:10px 20px;border:none;border-radius:5px;cursor:pointer}
        .episodes{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;padding:20px 80px 80px}
        .card{background:#1c1c1c;border-radius:8px;overflow:hidden;cursor:pointer;transition:.3s;border:1px solid #333}
        .card:hover{transform:scale(1.05);border-color:#e50914}
        .card img{width:100%;height:150px;object-fit:cover}
        .card-content{padding:15px}
        
        /* POPUP */
        .popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:2000;opacity:0;pointer-events:none;transition:.3s}
        .popup.show{opacity:1;pointer-events:auto}
        .popup-box{background:#1c1c1c;padding:30px;border-radius:12px;text-align:center;max-width:400px;border:1px solid #e50914}
        
        /* LECTEUR VIDEO */
        #video-overlay{display:none;position:fixed;inset:0;background:black;z-index:3000;flex-direction:column}
        #video-iframe{width:100%;height:100%;border:none}
        .close-video{position:absolute;top:20px;right:20px;font-size:30px;cursor:pointer;z-index:3001}
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">YAMONFILM</a>
</header>

<section class="hero" id="hero">
    <div class="hero-content">
        <h1 id="title">Chargement...</h1>
        <p id="overview"></p>
        <div id="hero-actions" style="margin-top:20px;"></div>
    </div>
</section>

<div class="season-section">
    <button class="season-btn" id="seasonBtn">Saison 1 ▼</button>
</div>

<div class="episodes" id="episodes-container"></div>

<div id="video-overlay">
    <span class="close-video" onclick="closeVideo()">✕</span>
    <iframe id="video-iframe" src="" allowfullscreen></iframe>
</div>

<div id="popupMessage" class="popup">
    <div class="popup-box">
        <p id="popup-text">Pour voir la suite, débloquez la série.</p>
        <button class="btn-main" onclick="closePopup()" style="margin-top:20px">Fermer</button>
    </div>
</div>

<script type="module">
    // CONFIGURATION FIREBASE & API
    const apiKey = "182c7173698e34803715eacab5c693a7";
    const imgBase = "https://image.tmdb.org/t/p/original";

    // RECUPERATION DES INFOS DANS L'URL
    const urlParams = new URLSearchParams(window.location.search);
    const tmdbId = urlParams.get('id'); // ID TMDB
    const firebaseId = urlParams.get('fid'); // ID FIREBASE (ex: LECLOWN)
    const isVip = urlParams.get('vip') === 'true'; // Est-ce la version VIP ?

    async function loadContent() {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}?api_key=${apiKey}&language=fr-FR`);
        const data = await res.json();

        document.getElementById("title").textContent = data.name;
        document.getElementById("page-title").textContent = data.name + " - YAMONFILM";
        document.getElementById("overview").textContent = data.overview;
        document.getElementById("hero").style.backgroundImage = `url(${imgBase}${data.backdrop_path})`;

        // Si version gratuite, on met le bouton d'achat
        if(!isVip) {
            document.getElementById("hero-actions").innerHTML = `
                <a href="debloquer.html" class="btn-main">🔓 Débloquer la série complète</a>
            `;
        }

        loadEpisodes(1);
    }

    async function loadEpisodes(season) {
        const container = document.getElementById("episodes-container");
        container.innerHTML = "";
        const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${season}?api_key=${apiKey}&language=fr-FR`);
        const data = await res.json();

        data.episodes.forEach(ep => {
            const card = document.createElement("div");
            card.className = "card";
            const img = ep.still_path ? imgBase+ep.still_path : imgBase+data.poster_path;
            
            card.innerHTML = `
                <img src="${img}">
                <div class="card-content">
                    <h4>${ep.episode_number}. ${ep.name}</h4>
                </div>
            `;

            // LOGIQUE DE BLOCAGE
            if (isVip) {
                // Si c'est la page VIP, tout est cliquable (ajoute tes liens ici)
                card.onclick = () => alert("Lancer la vidéo VIP pour l'épisode " + ep.episode_number);
            } else {
                // Si c'est gratuit
                if (season == 1 && ep.episode_number == 1) {
                    card.onclick = () => alert("Lancer l'épisode 1 gratuit");
                } else {
                    card.onclick = () => document.getElementById("popupMessage").classList.add("show");
                }
            }
            container.appendChild(card);
        });
    }

    window.closePopup = () => document.getElementById("popupMessage").classList.remove("show");
    window.closeVideo = () => {
        document.getElementById("video-overlay").style.display = "none";
        document.getElementById("video-iframe").src = "";
    };

    loadContent();
</script>
</body>
</html>
