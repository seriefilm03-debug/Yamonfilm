<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAMONFILM - Lecteur</title>
    <style>
        body { background-color: #141414; color: white; font-family: Arial, sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 1000px; margin: 40px auto; }
        h1 { margin-bottom: 20px; font-size: 28px; color: #e50914; }
        .video-responsive { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; background: #000; border: 1px solid #333; }
        .video-responsive iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #ccc; text-decoration: none; font-size: 14px; }
        .back-btn:hover { color: #e50914; }
        .btn-server { background:#333; color:white; border:none; padding:8px 15px; margin:5px; cursor:pointer; border-radius:4px; font-weight:bold; }
        .btn-server:hover { background:#e50914; }
        .vip-badge { background: #e50914; color: white; padding: 5px 10px; border-radius: 4px; font-size: 14px; margin-left: 10px; font-weight: bold;}
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">← Retour à l'accueil</a>
        <h1><span id="movie-title">Chargement...</span><span id="vip-indicator" class="vip-badge" style="display:none;">Lecteur VIP 🔥</span></h1>

        <!-- Sélecteur automatique de serveurs -->
        <div style="margin-bottom: 15px;">
            <button class="btn-server" onclick="changerServeur(1)">Serveur 1 (VF/VOSTFR)</button>
            <button class="btn-server" onclick="changerServeur(2)">Serveur 2 (Backup)</button>
        </div>

        <div class="video-responsive">
            <iframe id="streaming-player" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = '182c7173698e34803715eacab5c693a7'; 

        // Récupération des paramètres cachés dans le lien (?id=...&type=...&vip=...)
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');
        const mediaType = urlParams.get('type') || 'movie'; 
        const isVip = urlParams.get('vip') === 'true';

        if (isVip) {
            document.getElementById('vip-indicator').style.display = 'inline-block';
        }

        // Liens de streaming automatiques configurés selon l'ID du film cliqué
        const serveurs = {
            1: mediaType === 'tv' ? `https://vidsrc.to/embed/tv/${movieId}/1/1` : `https://vidsrc.to/embed/movie/${movieId}`,
            2: mediaType === 'tv' ? `https://vidsrc.me/embed/tv?tmdb=${movieId}&sea=1&epi=1` : `https://vidsrc.me/embed/movie?tmdb=${movieId}`
        };

        if (movieId) {
            // On lance le premier lecteur automatique
            document.getElementById('streaming-player').src = serveurs[1];

            // On récupère dynamiquement le vrai nom du film/série en français pour l'afficher
            fetch(`https://api.themoviedb.org/3/${mediaType}/${movieId}?api_key=${TMDB_API_KEY}&language=fr-FR`)
                .then(response => response.json())
                .then(media => {
                    const nomDuMedia = media.title || media.name;
                    document.getElementById('movie-title').textContent = nomDuMedia;
                    document.title = `Regarder ${nomDuMedia} en Streaming`;
                });
        }

        window.changerServeur = (numero) => {
            if(serveurs[numero]) document.getElementById('streaming-player').src = serveurs[numero];
        };
    </script>
</body>
</html>
