<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAMONFILM - Visionnage</title>
    <style>
        *{ box-sizing:border-box; margin:0; padding:0; font-family:Arial, sans-serif; }
        body{ background:#0f0f0f; color:white; }
        header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); }
        .logo { color:#e50914; font-size:24px; font-weight:bold; text-decoration:none; }
        .hero { height: 60vh; width: 100%; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 5%; position: relative; }
        .hero::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to top, #0f0f0f, transparent); }
        .hero-content { position: relative; z-index: 10; }
        .btn-vip { background:#e50914; color:white; padding:12px 25px; text-decoration:none; border-radius:5px; font-weight:bold; display:inline-block; margin-top:15px; }
        
        .episodes { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 30px 5%; }
        .episode-card { background:#1c1c1c; border-radius:8px; overflow:hidden; cursor:pointer; border:1px solid #333; transition: 0.3s; }
        .episode-card:hover { border-color:#e50914; transform: scale(1.02); }
        .episode-card img { width:100%; height:140px; object-fit:cover; }
        .ep-info { padding:10px; font-size:14px; }

        /* MODAL / POPUP */
        #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center; }
        .popup-box { background:#181818; padding:30px; border-radius:10px; text-align:center; border:1px solid #e50914; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">YAMONFILM</a>
    <a href="index.html" style="color:white; text-decoration:none;">Retour</a>
</header>

<div class="hero" id="hero">
    <div class="hero-content">
        <h1 id="title">Chargement...</h1>
        <div id="vip-status"></div>
    </div>
</div>

<div class="episodes" id="ep-list"></div>

<div id="popup">
    <div class="popup-box">
        <h3>Contenu VIP 🔥</h3><br>
        <p>Activez votre code pour voir cet épisode.</p><br>
        <a href="debloquer.html" class="btn-vip">Activer un code</a>
        <button onclick="document.getElementById('popup').style.display='none'" style="margin-top:15px; background:none; color:grey; border:none; cursor:pointer;">Fermer</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAQnexePSWAJdgZc2WO2BFKL8Z_jnDKbqE", authDomain: "yamonfilm-fead8.firebaseapp.com", projectId: "yamonfilm-fead8" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const TMDB_KEY = "182c7173698e34803715eacab5c693a7";
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');    // ID TMDB (ex: 16678)
    const fid = params.get('fid');  // ID Firebase (ex: LECLOWN)

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href="login.html"; return; }
        
        // 1. On vérifie si la série est débloquée dans Firebase
        const snap = await getDoc(doc(db, "users", user.uid));
        const unlocked = snap.exists() ? (snap.data().seriesUnlocked || []) : [];
        const isVip = unlocked.includes(fid);

        // 2. On récupère les infos TMDB
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${TMDB_KEY}&language=fr-FR`);
        const data = await res.json();
        
        document.getElementById("title").innerText = data.name;
        document.getElementById("hero").style.backgroundImage = `url(https://image.tmdb.org/t/p/original${data.backdrop_path})`;
        
        if(!isVip) {
            document.getElementById("vip-status").innerHTML = `<a href="debloquer.html" class="btn-vip">🔓 Débloquer la série</a>`;
        }

        // 3. On charge les épisodes
        const epRes = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/1?api_key=${TMDB_KEY}&language=fr-FR`);
        const epData = await epRes.json();

        epData.episodes.forEach(ep => {
            const card = document.createElement("div");
            card.className = "episode-card";
            card.innerHTML = `
                <img src="https://image.tmdb.org/t/p/w500${ep.still_path || data.poster_path}">
                <div class="ep-info"><b>E${ep.episode_number} - ${ep.name}</b></div>
            `;
            
            card.onclick = () => {
                if (isVip || ep.episode_number === 1) {
                    alert("Lecture de l'épisode !"); // Ici tu mettras ton lien vidéo plus tard
                } else {
                    document.getElementById("popup").style.display = "flex";
                }
            };
            document.getElementById("ep-list").appendChild(card);
        });
    });
</script>
</body>
</html>
