<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supercross - YAMONFILM</title>
    <style>
        /* --- STYLE STYLE NETFLIX --- */
        *{ box-sizing:border-box; margin:0; padding:0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body{ background:#141414; color:white; overflow-x:hidden; }
        
        /* NAVBAR */
        header { 
            position: fixed; top: 0; width: 100%; padding: 15px 5%; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .logo { color:#e50914; font-size:24px; font-weight:bold; text-decoration:none; }
        .back-link { color: white; text-decoration: none; font-size: 14px; background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 4px; }

        /* HERO SECTION - IMAGE CENTRÉE */
        .hero { 
            height: 60vh; width: 100%; 
            background-size: cover; 
            background-position: center center; 
            display: flex; align-items: flex-end; padding: 5%; position: relative; 
        }
        .hero::after { 
            content: ""; position: absolute; inset: 0; 
            background: linear-gradient(to top, #141414, transparent 90%); 
        }
        .hero-content { position: relative; z-index: 10; max-width: 800px; margin-bottom: 20px; }
        .hero h1 { font-size: clamp(30px, 7vw, 60px); margin-bottom: 10px; }
        .hero p { color: #ccc; line-height: 1.4; font-size: 16px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        /* LECTEUR STYLE NETFLIX (RESPONSIVE) */
        .player-section { padding: 0 5% 50px; }
        .video-container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Ratio 16:9 */
            height: 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .label { color: #808080; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">YAMONFILM</a>
    <a href="index.html" class="back-link">← Retour</a>
</header>

<section class="hero" id="hero-bg">
    <div class="hero-content">
        <h1 id="movie-title">Supercross</h1>
        <p id="movie-desc">Chargement du résumé...</p>
    </div>
</section>

<div class="player-section">
    <p class="label">Lecture du film</p>
    <div class="video-container">
        <div class="video-wrapper">
            <iframe 
                title="Supercross" 
                src="https://clip.place/videos/embed/1NHGrUazqLKi5GGT4Ak3A4" 
                allow="fullscreen" 
                sandbox="allow-same-origin allow-scripts allow-popups allow-forms" 
                style="border: 0px;">
            </iframe>
        </div>
    </div>
</div>

<script>
    const TMDB_KEY = "182c7173698e34803715eacab5c693a7";
    const MOVIE_ID = "17186";

    async function loadMovieData() {
        try {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${MOVIE_ID}?api_key=${TMDB_KEY}&language=fr-FR`);
            const data = await res.json();

            document.getElementById("movie-title").innerText = data.title;
            document.getElementById("movie-desc").innerText = data.overview || "Deux frères s'affrontent dans une compétition de Supercross de haut niveau.";
            
            // Image de fond originale centrée
            const bgUrl = `https://image.tmdb.org/t/p/original${data.backdrop_path}`;
            document.getElementById("hero-bg").style.backgroundImage = `url(${bgUrl})`;
        } catch (error) {
            console.error("Erreur TMDB:", error);
        }
    }

    loadMovieData();
</script>

</body>
</html>
