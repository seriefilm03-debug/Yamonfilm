<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supercross - YAMONFILM</title>
    <style>
        /* --- STYLE GLOBAL --- */
        *{ box-sizing:border-box; margin:0; padding:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #141414; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        /* NAVBAR */
        header { position: fixed; top: 0; width: 100%; padding: 20px 5%; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .logo { color:#e50914; font-size: 24px; font-weight:bold; text-decoration:none; }
        .back-link { color: #aaa; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: white; }

        /* CONTENEUR PRINCIPAL (LA FICHE) */
        .movie-container {
            max-width: 1000px;
            width: 100%;
            background: #1f1f1f;
            border-radius: 12px;
            display: flex;
            flex-direction: row; /* Côte à côte sur PC */
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 60px;
        }

        /* PHOTO DU FILM (GAUCHE) */
        .movie-poster {
            flex: 0 0 350px; /* Largeur fixe de l'affiche sur PC */
            background-color: #000;
        }
        .movie-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* INFOS DU FILM (DROITE) */
        .movie-details {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
        }
        .movie-details h1 { font-size: 32px; margin-bottom: 15px; color: white; }
        .movie-details p { font-size: 16px; color: #ccc; line-height: 1.6; margin-bottom: 30px; }

        /* BOUTON LECTURE */
        .play-btn {
            background: #e50914;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
            width: fit-content;
        }
        .play-btn:hover { background: #b20710; transform: translateY(-2px); }

        /* --- ADAPTATION MOBILE --- */
        @media (max-width: 768px) {
            .movie-container { flex-direction: column; } /* L'un sur l'autre */
            .movie-poster { flex: 0 0 auto; height: 400px; }
            .movie-details { padding: 25px; text-align: center; }
            .play-btn { width: 100%; }
        }

        /* LECTEUR VIDÉO PLEIN ÉCRAN */
        #video-overlay { display: none; position: fixed; inset: 0; background: black; z-index: 3000; }
        .close-video { position: absolute; top: 20px; right: 20px; font-size: 40px; cursor: pointer; color: white; z-index: 3100; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">YAMONFILM</a>
    <a href="index.html" class="back-link">← Retour à l'accueil</a>
</header>

<div class="movie-container">
    <div class="movie-poster">
        <img id="poster-img" src="" alt="Affiche du film">
    </div>

    <div class="movie-details">
        <h1 id="movie-title">Chargement...</h1>
        <p id="movie-desc">Résumé en cours de chargement depuis la base de données...</p>
        <button class="play-btn" onclick="openPlayer()">▶ REGARDER LE FILM</button>
    </div>
</div>

<div id="video-overlay">
    <span class="close-video" onclick="closePlayer()">✕</span>
    <iframe id="video-frame" src="" allowfullscreen sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
</div>

<script>
    const TMDB_KEY = "182c7173698e34803715eacab5c693a7";
    const MOVIE_ID = "17186";
    const VIDEO_URL = "https://clip.place/videos/embed/1NHGrUazqLKi5GGT4Ak3A4";

    async function loadMovieData() {
        try {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${MOVIE_ID}?api_key=${TMDB_KEY}&language=fr-FR`);
            const data = await res.json();
            
            document.getElementById("movie-title").innerText = data.title;
            document.getElementById("movie-desc").innerText = data.overview || "Résumé non disponible.";
            
            // On récupère l'affiche verticale (poster_path)
            const posterUrl = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
            document.getElementById("poster-img").src = posterUrl;
        } catch (error) {
            console.error("Erreur TMDB:", error);
        }
    }

    function openPlayer() {
        document.getElementById("video-frame").src = VIDEO_URL;
        document.getElementById("video-overlay").style.display = "block";
    }

    function closePlayer() {
        document.getElementById("video-frame").src = "";
        document.getElementById("video-overlay").style.display = "none";
    }

    loadMovieData();
</script>

</body>
</html>
